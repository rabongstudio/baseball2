<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>경기 리포트 · ELITEREC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0c10;--panel:#181c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f2f5;--muted:#7a8294;--muted2:#4a5060;--brand:#e8ff47;--brand-dim:rgba(232,255,71,.12);--win:#4ade80;--win-bg:rgba(74,222,128,.1);--loss:#f87171;--loss-bg:rgba(248,113,113,.1);--draw:#94a3b8;--draw-bg:rgba(148,163,184,.1);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}
.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{max-width:480px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--brand);line-height:1}
.logo span{color:var(--text)}
.back-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-decoration:none}
.back-btn:hover{border-color:var(--brand);color:var(--brand)}
.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.5px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

/* 필터 */
.filter-bar{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.filter-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
select{width:100%;padding:12px 16px;border:1px solid var(--border2);border-radius:12px;font-size:14px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif;cursor:pointer}
select:focus{outline:none;border-color:var(--brand)}
select option{background:var(--panel)}
.kpi-row{display:flex;gap:10px;margin-top:12px}
.kpi{flex:1;background:var(--brand-dim);border-radius:12px;padding:12px;text-align:center}
.kpi .v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--brand);line-height:1}
.kpi .l{font-size:11px;font-weight:700;color:var(--brand);opacity:.8;margin-top:4px;letter-spacing:.5px}

/* 경기 목록 */
.game-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.game-card:hover{border-color:var(--border2)}
.result-badge{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;flex-shrink:0}
.result-badge.W{background:var(--win-bg);color:var(--win)} .result-badge.L{background:var(--loss-bg);color:var(--loss)} .result-badge.D{background:var(--draw-bg);color:var(--draw)}
.game-info{flex:1;min-width:0}
.game-vs{font-size:14px;font-weight:700}
.game-meta{font-size:12px;color:var(--muted);margin-top:3px}
.game-score-text{font-family:'Bebas Neue',sans-serif;font-size:22px;flex-shrink:0}

/* 상세 스코어 */
.score-hero{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px 16px;margin-bottom:12px;text-align:center}
.score-teams{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:12px}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1}
.score-sep{font-size:24px;color:var(--muted);font-weight:700}
.score-result-badge{display:inline-block;padding:6px 20px;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:20px;margin-bottom:16px}
.score-result-badge.W{background:var(--win-bg);color:var(--win)} .score-result-badge.L{background:var(--loss-bg);color:var(--loss)} .score-result-badge.D{background:var(--draw-bg);color:var(--draw)}

/* 정보 행 */
.info-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--muted)} .info-row .v{font-weight:700;text-align:right}

/* 선수 카드 */
.player-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.player-card:hover{border-color:var(--border2)}
.player-num{width:38px;height:38px;border-radius:10px;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--brand);flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:700}
.player-meta{font-size:12px;color:var(--muted);margin-top:3px}
.starter-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;flex-shrink:0}
.starter-pill.on{background:var(--win-bg);color:var(--win)}
.starter-pill.off{background:var(--draw-bg);color:var(--draw)}

/* 버튼 */
.btn{width:100%;margin-top:10px;padding:13px;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}.btn.ghost:hover{background:rgba(255,255,255,.05);border-color:var(--border2)}
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px}
.hint-text{font-size:12px;color:var(--muted);margin:8px 0}
.hidden{display:none!important}

/* 선수 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:flex-end}
.sheet{width:100%;max-height:88vh;background:var(--panel);border-radius:24px 24px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--panel)}
.sheet-head-name{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--brand)}
.sheet-head-sub{font-size:12px;color:var(--muted);margin-top:2px}
.sheet-close{padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.sheet-body{padding:16px;overflow-y:auto;background:var(--black);flex:1}
.stat-section{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.stat-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--brand);margin-bottom:12px;text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-box{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 4px;text-align:center;border:1px solid var(--border)}
.stat-box .v{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text)}
.stat-box .k{font-size:10px;color:var(--muted);margin-top:3px;font-weight:700}
.memo-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.memo-text{font-size:13px;color:var(--text);line-height:1.6;margin-top:8px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">ELITE<span>REC</span></div>
    <a href="index.html" class="back-btn">← 홈</a>
  </div>
</header>

<div class="container">

  <!-- 목록 -->
  <div id="viewList">
    <div class="page-title">경기 리포트</div>
    <div class="page-sub">대회별 성적 및 라인업 요약</div>

    <div class="filter-bar">
      <div class="filter-label">대회 필터</div>
      <select id="tournamentSel"></select>
      <div class="kpi-row">
        <div class="kpi"><div class="v" id="kpiGames">-</div><div class="l">TOTAL</div></div>
        <div class="kpi"><div class="v" id="kpiWLD">-</div><div class="l">W · L · D</div></div>
      </div>
    </div>

    <div class="section-label">경기 목록</div>
    <div class="hint-text" id="listHint">데이터를 불러오는 중...</div>
    <div id="gameList"></div>
  </div>

  <!-- 상세 -->
  <div id="viewDetail" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="page-title">경기 상세</div>
        <div class="page-sub" id="detailHeader">-</div>
      </div>
      <button class="back-btn" id="btnBack">← 뒤로</button>
    </div>

    <div class="score-hero">
      <div id="gResultBadge" class="score-result-badge D">-</div>
      <div class="score-teams">
        <div class="score-num" id="gScoreHome">-</div>
        <div class="score-sep">:</div>
        <div class="score-num" id="gScoreAway">-</div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-row"><span class="k">대회명</span><span class="v" id="gTournament">-</span></div>
      <div class="info-row"><span class="k">경기장</span><span class="v" id="gStadium">-</span></div>
      <div class="info-row"><span class="k">진행 이닝</span><span class="v" id="gInnings">-</span></div>
      <div class="info-row"><span class="k">날씨</span><span class="v" id="gWeather">-</span></div>
      <div class="info-row"><span class="k">안타 / 실책 / 홈런</span><span class="v" id="gTeamStats">-</span></div>
    </div>
    <button class="btn ghost" id="btnOpenInput">✏️ 경기 정보 수정</button>

    <div class="section-label">라인업 및 개인 기록</div>
    <div class="hint-text" id="recordsHint"></div>
    <div id="recordsList"></div>
    <div class="hint-text" style="text-align:center;margin-top:8px">💡 선수 카드를 탭하면 상세 기록을 볼 수 있어요</div>
  </div>
</div>

<!-- 선수 모달 -->
<div id="playerModal" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <div class="sheet-head-name" id="pmTitle">-</div>
        <div class="sheet-head-sub" id="pmSub">-</div>
      </div>
      <button class="sheet-close" id="pmClose">닫기</button>
    </div>
    <div class="sheet-body" id="pmBody"></div>
  </div>
</div>

<script>
const client=window.sb;
async function requireLogin(){const{data,error}=await client.auth.getSession();if(error||!data?.session){location.href=`auth.html?next=${encodeURIComponent(location.pathname.split('/').pop()+location.search)}`;return null;}return data.session;}
const el=(id)=>document.getElementById(id);
let currentGameId=null,currentFilter={tournament:null},gamesCache=[],isAdmin=false,myUserId=null,myPlayerId=null;
function show(viewId,push=true){['viewList','viewDetail'].forEach(v=>el(v).classList.add('hidden'));el(viewId).classList.remove('hidden');if(push)history.pushState({view:viewId,gameId:currentGameId,tournament:currentFilter.tournament},'',viewId==='viewDetail'?`report.html?game=${currentGameId}`:'report.html');}
function safe(v,fb='-'){return(v===null||v===undefined||v==='')? fb:v;}
function num(v){return Number.isFinite(Number(v))?Number(v):0;}

async function loadTournaments(){
  const{data}=await client.from('baseball_games').select('tournament').order('tournament');
  const sel=el('tournamentSel');sel.innerHTML='<option value="__ALL__">전체 대회 보기</option>';
  const set=new Set();(data||[]).forEach(r=>{if(r.tournament)set.add(r.tournament.trim());});
  [...set].sort().forEach(t=>{const opt=document.createElement('option');opt.value=t;opt.textContent=t;sel.appendChild(opt);});
}

async function loadGameList(){
  el('gameList').innerHTML='';el('listHint').textContent='경기를 불러오고 있습니다...';
  const tVal=el('tournamentSel').value;currentFilter.tournament=tVal!=='__ALL__'?tVal:null;
  let q=client.from('baseball_games').select('*').order('game_date',{ascending:false});
  if(currentFilter.tournament)q=q.eq('tournament',currentFilter.tournament);
  const{data,error}=await q;
  if(error){el('listHint').textContent='오류 발생: '+error.message;return;}
  gamesCache=data||[];
  el('listHint').textContent=gamesCache.length?'':'기록된 경기가 없습니다.';
  el('kpiGames').textContent=gamesCache.length;
  let w=0,l=0,d=0;gamesCache.forEach(g=>{if(g.result==='W')w++;else if(g.result==='L')l++;else d++;});
  el('kpiWLD').textContent=`${w}·${l}·${d}`;
  gamesCache.forEach(g=>{
    const item=document.createElement('div');item.className='game-card';
    const bc=g.result==='W'?'W':g.result==='L'?'L':'D';
    item.innerHTML=`<div class="result-badge ${bc}">${g.result||'D'}</div><div class="game-info"><div class="game-vs">vs ${g.opponent}</div><div class="game-meta">${g.game_date}${g.stadium?' · '+g.stadium:''}</div></div><div class="game-score-text">${g.our_score}<span style="color:var(--muted);font-size:16px">:</span>${g.opp_score}</div>`;
    item.onclick=()=>openDetail(g.id);el('gameList').appendChild(item);
  });
}

async function openDetail(gameId,push=true){
  currentGameId=gameId;show('viewDetail',push);el('recordsList').innerHTML='';
  const{data:g}=await client.from('baseball_games').select('*').eq('id',gameId).single();
  if(!g)return;
  el('detailHeader').textContent=`${g.game_date} vs ${g.opponent}`;
  el('gScoreHome').textContent=num(g.our_score);el('gScoreAway').textContent=num(g.opp_score);
  const res=g.result||'D';
  el('gResultBadge').textContent=res==='W'?'WIN':res==='L'?'LOSS':'DRAW';
  el('gResultBadge').className=`score-result-badge ${res}`;
  el('gTournament').textContent=safe(g.tournament);el('gStadium').textContent=safe(g.stadium);
  el('gInnings').textContent=safe(g.innings)+'이닝';el('gWeather').textContent=safe(g.weather);
  el('gTeamStats').textContent=`${num(g.our_hits)}안타 / ${num(g.our_errors)}실책 / ${num(g.our_hr)}홈런`;
  el('btnOpenInput').onclick=()=>location.href=`createGame.html?game=${gameId}`;
  el('btnOpenInput').style.display=isAdmin?'block':'none';
  const{data:records}=await client.from('baseball_game_player_records').select('*,baseball_players(*)').eq('game_id',gameId).order('batting_order');
  el('recordsHint').textContent=records?.length?'':'기록된 선수가 없습니다.';
  records?.forEach(rec=>{
    const p=rec.baseball_players||{};
    const item=document.createElement('div');item.className='player-card';
    const pnum=(p.jersey_number??'')!==''?p.jersey_number:'-';
    item.innerHTML=`<div class="player-num">${pnum}</div><div class="player-info"><div class="player-name">${p.name} <span style="color:var(--muted);font-size:12px">(${p.grade||'-'}학년)</span></div><div class="player-meta">${rec.batting_order||'-'}번 · ${rec.position||'-'} | ${num(rec.ab)}타 ${num(rec.h)}안 ${num(rec.rbi)}점 / ${num(rec.ip)}이닝 ${num(rec.pk)}K</div></div><div class="starter-pill ${rec.is_starter?'on':'off'}">${rec.is_starter?'선발':'교체'}</div>`;
    item.onclick=()=>{
    if(rec.player_id!==myPlayerId){
      alert('본인 기록만 확인할 수 있어요.');return;
    }
    openPlayerModal(g,rec);
  };
  el('recordsList').appendChild(item);
  });
}

function openPlayerModal(game,rec){
  const p=rec.baseball_players||{};
  const pnum=(p.jersey_number??'')!==''?`#${p.jersey_number}`:'#-';
  el('pmTitle').textContent=`${pnum} ${p.name}`;
  el('pmSub').textContent=`vs ${game.opponent} (${game.game_date})`;
  const body=el('pmBody');body.innerHTML='';

  const bSec=document.createElement('div');bSec.className='stat-section';
  bSec.innerHTML=`<div class="stat-section-title">⚾ Batting</div><div class="stat-grid"></div>`;
  [['타수',rec.ab],['안타',rec.h],['타점',rec.rbi],['득점',rec.r],['볼넷',rec.bb],['삼진',rec.so],['도루',rec.sb],['홈런',rec.hr]].forEach(([k,v])=>{
    bSec.querySelector('.stat-grid').innerHTML+=`<div class="stat-box"><div class="v">${num(v)}</div><div class="k">${k}</div></div>`;
  });body.appendChild(bSec);

  if(num(rec.ip)>0||num(rec.pitches)>0){
    const pSec=document.createElement('div');pSec.className='stat-section';
    pSec.innerHTML=`<div class="stat-section-title">🥎 Pitching</div><div class="stat-grid"></div>`;
    [['이닝',rec.ip],['자책',rec.er],['탈삼진',rec.pk],['볼넷',rec.pbb],['투구수',rec.pitches],['MAX',rec.max_vel]].forEach(([k,v])=>{
      pSec.querySelector('.stat-grid').innerHTML+=`<div class="stat-box"><div class="v">${safe(v,0)}</div><div class="k">${k}</div></div>`;
    });body.appendChild(pSec);
  }

  const mSec=document.createElement('div');mSec.className='memo-box';
  mSec.innerHTML=`<div class="stat-section-title">📝 Memo</div><div class="memo-text">${safe(rec.player_memo,'입력된 메모가 없습니다.')}</div>`;
  body.appendChild(mSec);

  el('playerModal').classList.remove('hidden');
}

el('pmClose').onclick=()=>el('playerModal').classList.add('hidden');
el('tournamentSel').addEventListener('change',loadGameList);
el('btnBack').onclick=()=>history.back();
window.onpopstate=(e)=>{if(!e.state||e.state.view==='viewList'){show('viewList',false);loadGameList();}else if(e.state.view==='viewDetail')openDetail(e.state.gameId,false);};

(async function init(){
  const session=await requireLogin();if(!session)return;
  // 내 프로필 로드 (병렬)
  const {data:{user}}=await client.auth.getUser();
  if(user){
    myUserId=user.id;
    const [profileRes,playerRes]=await Promise.all([
      client.from('baseball_profiles').select('role').eq('id',user.id).single(),
      client.from('baseball_players').select('id').eq('owner_user_id',user.id).maybeSingle()
    ]);
    if(profileRes.data) isAdmin=profileRes.data.role==='admin';
    if(playerRes.data) myPlayerId=playerRes.data.id;
  }
  await loadTournaments();
  const gid=new URLSearchParams(location.search).get('game');
  if(gid)openDetail(Number(gid),false);else{show('viewList',false);loadGameList();}
})();
</script>
</body>
</html>
