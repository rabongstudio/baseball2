
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>경기 리포트 · ELITEREC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0c10;--panel:#181c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f2f5;--muted:#7a8294;--muted2:#4a5060;--brand:#e8ff47;--brand-dim:rgba(232,255,71,.12);--win:#4ade80;--win-bg:rgba(74,222,128,.1);--loss:#f87171;--loss-bg:rgba(248,113,113,.1);--draw:#94a3b8;--draw-bg:rgba(148,163,184,.1);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px;min-height: calc(100vh + 1px);}
.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{max-width:480px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--brand);line-height:1}
.logo span{color:var(--text)}
.back-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-decoration:none}
.back-btn:hover{border-color:var(--brand);color:var(--brand)}
.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.5px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.filter-bar{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.filter-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
select{width:100%;padding:12px 16px;border:1px solid var(--border2);border-radius:12px;font-size:14px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif;cursor:pointer}
select:focus{outline:none;border-color:var(--brand)}
select option{background:var(--panel)}
.kpi-row{display:flex;gap:10px;margin-top:12px}
.kpi{flex:1;background:var(--brand-dim);border-radius:12px;padding:12px;text-align:center}
.kpi .v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--brand);line-height:1}
.kpi .l{font-size:11px;font-weight:700;color:var(--brand);opacity:.8;margin-top:4px;letter-spacing:.5px}
.game-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.game-card:hover{border-color:var(--border2)}
.result-badge{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;flex-shrink:0}
.result-badge.W{background:var(--win-bg);color:var(--win)} .result-badge.L{background:var(--loss-bg);color:var(--loss)} .result-badge.D{background:var(--draw-bg);color:var(--draw)}
.game-info{flex:1;min-width:0}
.game-vs{font-size:14px;font-weight:700}
.game-meta{font-size:12px;color:var(--muted);margin-top:3px}
.game-score-text{font-family:'Bebas Neue',sans-serif;font-size:22px;flex-shrink:0}
.score-hero{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px 16px;margin-bottom:12px;text-align:center}
.score-teams{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:12px}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1}
.score-sep{font-size:24px;color:var(--muted);font-weight:700}
.score-result-badge{display:inline-block;padding:6px 20px;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:20px;margin-bottom:16px}
.score-result-badge.W{background:var(--win-bg);color:var(--win)} .score-result-badge.L{background:var(--loss-bg);color:var(--loss)} .score-result-badge.D{background:var(--draw-bg);color:var(--draw)}
.info-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--muted)} .info-row .v{font-weight:700;text-align:right}
.player-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.player-num{width:38px;height:38px;border-radius:10px;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--brand);flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:700}
.player-meta{font-size:12px;color:var(--muted);margin-top:3px}
.starter-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;flex-shrink:0}
.starter-pill.on{background:var(--win-bg);color:var(--win)}
.starter-pill.off{background:var(--draw-bg);color:var(--draw)}
.btn{width:100%;margin-top:10px;padding:13px;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn.ghost:hover{background:rgba(255,255,255,.05);border-color:var(--border2)}
.btn.more{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text)}
.btn.more:hover{background:rgba(255,255,255,.06)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px}
.hint-text{font-size:12px;color:var(--muted);margin:8px 0}
.hidden{display:none!important}
.loading-box{padding:18px 14px;border:1px solid var(--border);border-radius:14px;background:var(--panel);font-size:13px;color:var(--muted);text-align:center}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">ELITE<span>REC</span></div>
    <a href="index.html" class="back-btn">← 홈</a>
  </div>
</header>

<div class="container">
  <div id="viewList">
    <div class="page-title">경기 리포트</div>
    <div class="page-sub">대회 선택 후 경기와 라인업을 확인하세요</div>

    <div class="filter-bar">
      <div class="filter-label">대회 필터</div>
      <select id="tournamentSel">
        <option value="">선택</option>
      </select>
      <div class="kpi-row">
        <div class="kpi"><div class="v" id="kpiGames">-</div><div class="l">TOTAL</div></div>
        <div class="kpi"><div class="v" id="kpiWLD">-</div><div class="l">W · L · D</div></div>
      </div>
    </div>

    <div class="section-label">경기 목록</div>
    <div class="hint-text" id="listHint">데이터를 불러오는 중...</div>
    <div id="gameList"></div>
    <button class="btn more hidden" id="btnMoreGames">더 보기</button>
  </div>

  <div id="viewDetail" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="page-title">경기 상세</div>
        <div class="page-sub" id="detailHeader">-</div>
      </div>
      <button class="back-btn" id="btnBack">← 뒤로</button>
    </div>

    <div class="score-hero">
      <div id="gResultBadge" class="score-result-badge D">-</div>
      <div class="score-teams">
        <div class="score-num" id="gScoreHome">-</div>
        <div class="score-sep">:</div>
        <div class="score-num" id="gScoreAway">-</div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-row"><span class="k">대회명</span><span class="v" id="gTournament">-</span></div>
      <div class="info-row"><span class="k">경기장</span><span class="v" id="gStadium">-</span></div>
      <div class="info-row"><span class="k">진행 이닝</span><span class="v" id="gInnings">-</span></div>
      <div class="info-row"><span class="k">날씨</span><span class="v" id="gWeather">-</span></div>
      <div class="info-row"><span class="k">안타 / 실책 / 홈런</span><span class="v" id="gTeamStats">-</span></div>
    </div>

    <button class="btn ghost" id="btnOpenInput">✏️ 경기 정보 수정</button>

    <div class="section-label">라인업 및 개인 기록</div>
    <div class="hint-text" id="recordsHint"></div>
    <div id="recordsList"></div>

  </div>
</div>


<script>
const client = window.sb;
const PAGE_SIZE = 20;

const el = (id) => document.getElementById(id);
const safe = (v, fb='-') => (v === null || v === undefined || v === '') ? fb : v;
const num = (v) => Number.isFinite(Number(v)) ? Number(v) : 0;
const escapeHtml = (str='') => String(str)
  .replaceAll('&', '&amp;')
  .replaceAll('<', '&lt;')
  .replaceAll('>', '&gt;')
  .replaceAll('"', '&quot;')
  .replaceAll("'", '&#39;');

let currentGameId = null;
let currentFilter = { tournament: '' };
let currentTournaments = [];
let isAdmin = false;
let myUserId = null;
let myPlayerId = null;
let mySchoolId = null;

let listOffset = 0;
let listDone = false;
let loadingList = false;
let loadingDetail = false;

function show(viewId, push = true) {
  ['viewList', 'viewDetail'].forEach(v => el(v).classList.add('hidden'));
  el(viewId).classList.remove('hidden');

  if (push) {
    const url = (viewId === 'viewDetail' && currentGameId)
      ? `report.html?game=${currentGameId}`
      : 'report.html';

    history.pushState(
      { view: viewId, gameId: currentGameId, tournament: currentFilter.tournament },
      '',
      url
    );
  }
}

function setListHint(text='') {
  el('listHint').textContent = text;
}

function setRecordsHint(text='') {
  el('recordsHint').textContent = text;
}

function renderTournamentOptions(tournaments, selectedValue = '') {
  const sel = el('tournamentSel');
  sel.innerHTML = '<option value="">선택</option>';

  tournaments.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    sel.appendChild(opt);
  });

  sel.value = selectedValue || '';
}


function renderGameCard(g) {
  const item = document.createElement('div');
  item.className = 'game-card';

  const resultClass = g.result === 'W' ? 'W' : g.result === 'L' ? 'L' : 'D';

  item.innerHTML = `
    <div class="result-badge ${resultClass}">${escapeHtml(safe(g.result, 'D'))}</div>
    <div class="game-info">
      <div class="game-vs">vs ${escapeHtml(safe(g.opponent))}</div>
      <div class="game-meta">${escapeHtml(safe(g.game_date))}${g.stadium ? ' · ' + escapeHtml(g.stadium) : ''}</div>
    </div>
    <div class="game-score-text">${num(g.our_score)}<span style="color:var(--muted);font-size:16px">:</span>${num(g.opp_score)}</div>
  `;

  item.onclick = () => openDetail(g.id);
  return item;
}

function renderPlayerCard(game, rec) {
  const p = rec.baseball_players || {};
  const item = document.createElement('div');
  item.className = 'player-card';

  const pnum = (p.jersey_number ?? '') !== '' ? p.jersey_number : '-';

  item.innerHTML = `
    <div class="player-num">${escapeHtml(String(pnum))}</div>
    <div class="player-info">
      <div class="player-name">
        ${escapeHtml(safe(p.name))}
        <span style="color:var(--muted);font-size:12px">(${escapeHtml(String(safe(p.grade)))}학년)</span>
      </div>
      <div class="player-meta">
        ${escapeHtml(String(safe(rec.batting_order)))}번 · ${escapeHtml(safe(rec.position))}
        | ${num(rec.ab)}타 ${num(rec.h)}안 ${num(rec.rbi)}점 / ${num(rec.ip)}이닝 ${num(rec.pk)}K
      </div>
    </div>
    <div class="starter-pill ${rec.is_starter ? 'on' : 'off'}">${rec.is_starter ? '선발' : '교체'}</div>
  `;

  return item;
}


async function requireLogin() {
  const { data, error } = await client.auth.getUser();

  if (error || !data?.user) {
    location.href = `auth.html?next=${encodeURIComponent(location.pathname.split('/').pop() + location.search)}`;
    return null;
  }

  return data.user;
}

async function loadMyContext() {
  const { data, error } = await client.rpc('baseball_my_context');
  if (error) throw error;
  return data;
}

async function loadTournamentOptions() {
  const { data, error } = await client.rpc('baseball_report_list', {
    p_school_id: mySchoolId,
    p_tournament: null,
    p_limit: 1,
    p_offset: 0
  });

  if (error) throw error;

  currentTournaments = Array.isArray(data?.tournaments) ? data.tournaments : [];
  renderTournamentOptions(currentTournaments, currentFilter.tournament || '');
  el('kpiGames').textContent = '-';
  el('kpiWLD').textContent = '-';
  el('gameList').innerHTML = '';
  el('btnMoreGames').classList.add('hidden');
  setListHint('대회를 선택하면 경기 데이터가 표시됩니다.');
}

async function loadGameList(reset = true) {
  if (loadingList || !mySchoolId) return;
  loadingList = true;

  try {
    if (reset) {
      listOffset = 0;
      listDone = false;
      el('gameList').innerHTML = '';
      el('btnMoreGames').classList.add('hidden');
      setListHint('경기를 불러오고 있습니다...');
    }

    const tournamentValue = el('tournamentSel').value;
    currentFilter.tournament = tournamentValue || '';

    if (!currentFilter.tournament) {
      el('kpiGames').textContent = '-';
      el('kpiWLD').textContent = '-';
      el('gameList').innerHTML = '';
      el('btnMoreGames').classList.add('hidden');
      setListHint('대회를 선택하면 경기 데이터가 표시됩니다.');
      return;
    }

    const { data, error } = await client.rpc('baseball_report_list', {
      p_school_id: mySchoolId,
      p_tournament: currentFilter.tournament,
      p_limit: PAGE_SIZE,
      p_offset: listOffset
    });

    if (error) {
      setListHint('오류 발생: ' + error.message);
      return;
    }

    const tournaments = Array.isArray(data?.tournaments) ? data.tournaments : [];
    const kpi = data?.kpi || {};
    const rows = Array.isArray(data?.games) ? data.games : [];

    if (reset) {
      currentTournaments = tournaments.slice();
      renderTournamentOptions(currentTournaments, currentFilter.tournament || '');
      el('kpiGames').textContent = num(kpi.total_games);
      el('kpiWLD').textContent = `${num(kpi.wins)}·${num(kpi.losses)}·${num(kpi.draws)}`;
    }

    if (reset && rows.length === 0) {
      setListHint('기록된 경기가 없습니다.');
      return;
    }

    rows.forEach(g => {
      el('gameList').appendChild(renderGameCard(g));
    });

    listOffset += rows.length;
    listDone = rows.length < PAGE_SIZE;
    setListHint('');

    if (!listDone) el('btnMoreGames').classList.remove('hidden');
    else el('btnMoreGames').classList.add('hidden');

  } catch (err) {
    setListHint('오류 발생: ' + (err?.message || err));
  } finally {
    loadingList = false;
  }
}

async function openDetail(gameId, push = true) {
  if (loadingDetail || !gameId) return;
  loadingDetail = true;

  try {
    currentGameId = Number(gameId);
    show('viewDetail', push);

    setRecordsHint('기록을 불러오는 중...');
    el('recordsList').innerHTML = '<div class="loading-box">선수 기록을 불러오고 있습니다...</div>';

    const { data, error } = await client.rpc('baseball_report_detail', {
      p_game_id: Number(gameId)
    });

    if (error) {
      setRecordsHint('오류 발생: ' + error.message);
      el('recordsList').innerHTML = '';
      return;
    }

    const g = data?.game;
    const records = Array.isArray(data?.records) ? data.records : [];

    if (!g) {
      el('detailHeader').textContent = '경기 정보를 찾을 수 없습니다.';
      el('recordsList').innerHTML = '';
      setRecordsHint('');
      return;
    }

    el('detailHeader').textContent = `${safe(g.game_date)} vs ${safe(g.opponent)}`;
    el('gScoreHome').textContent = num(g.our_score);
    el('gScoreAway').textContent = num(g.opp_score);

    const res = g.result || 'D';
    el('gResultBadge').textContent = res === 'W' ? 'WIN' : res === 'L' ? 'LOSS' : 'DRAW';
    el('gResultBadge').className = `score-result-badge ${res}`;

    el('gTournament').textContent = safe(g.tournament);
    el('gStadium').textContent = safe(g.stadium);
    el('gInnings').textContent = `${num(g.innings)}이닝`;
    el('gWeather').textContent = safe(g.weather);
    el('gTeamStats').textContent = `${num(g.our_hits)}안타 / ${num(g.our_errors)}실책 / ${num(g.our_hr)}홈런`;

    el('btnOpenInput').onclick = () => location.href = `createGame.html?game=${gameId}`;
    el('btnOpenInput').style.display = isAdmin ? 'block' : 'none';

    el('recordsList').innerHTML = '';
    setRecordsHint(records.length ? '' : '기록된 선수가 없습니다.');

    records.forEach(rec => {
      el('recordsList').appendChild(renderPlayerCard(g, rec));
    });

  } catch (err) {
    setRecordsHint('오류 발생: ' + (err?.message || err));
    el('recordsList').innerHTML = '';
  } finally {
    loadingDetail = false;
  }
}


el('tournamentSel').addEventListener('change', () => loadGameList(true));
el('btnMoreGames').onclick = () => loadGameList(false);
el('btnBack').onclick = () => history.back();

window.onpopstate = async (e) => {
  if (!e.state || e.state.view === 'viewList') {
    show('viewList', false);
  } else if (e.state.view === 'viewDetail' && e.state.gameId) {
    await openDetail(e.state.gameId, false);
  }
};

(async function init() {
  try {
    const user = await requireLogin();
    if (!user) return;

    const ctx = await loadMyContext();

    myUserId = ctx?.user_id || user.id;
    mySchoolId = ctx?.school_id || null;
    myPlayerId = ctx?.player_id || null;
    isAdmin = ctx?.role === 'admin';

    if (!mySchoolId) {
      setListHint('학교 정보가 없어 경기를 불러올 수 없습니다.');
      return;
    }

    const gid = Number(new URLSearchParams(location.search).get('game'));

    if (gid) {
      await openDetail(gid, false);
    } else {
      show('viewList', false);
      await loadTournamentOptions();
    }
  } catch (err) {
    setListHint('초기화 오류: ' + (err?.message || err));
  }
})();
</script>
</body>
</html>
