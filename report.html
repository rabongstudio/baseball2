<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>경기 리포트</title>
<style>
  :root {
    --bg: #f8fafc; --card: #ffffff; --line: #e2e8f0; --text: #1e293b;
    --muted: #64748b; --brand: #2563eb; --brand-soft: #eff6ff;
    --navy: #0f172a; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    --win: #2563eb; --loss: #dc2626; --draw: #64748b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  
  /* Header */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .title { font-size: 24px; font-weight: 900; color: var(--navy); letter-spacing: -0.5px; }
  .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Cards */
  .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; border: 1px solid #fff; }
  .h1 { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  
  /* Inputs & Selects */
  label { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 6px; display: block; }
  select { width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--line); border-radius: 12px; background: #f1f5f9; cursor: pointer; }
  
  /* KPI & Stats */
  .kpis { display: flex; gap: 10px; margin-top: 15px; }
  .kpi { flex: 1; background: var(--brand-soft); border-radius: 14px; padding: 12px; text-align: center; }
  .kpi .v { font-size: 20px; font-weight: 900; color: var(--brand); }
  .kpi .l { font-size: 11px; color: var(--brand); font-weight: 700; opacity: 0.8; }

  /* List Items */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .item { 
    background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 14px; 
    display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;
  }
  .item:active { transform: scale(0.98); background: #f8fafc; }
  .item .h1 { margin-bottom: 4px; font-size: 15px; }
  .muted2 { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  /* Badges & Pills */
  .badge { font-weight: 900; font-size: 13px; padding: 6px 12px; border-radius: 10px; text-align: center; min-width: 40px; }
  .badge.W { background: var(--brand-soft); color: var(--win); }
  .badge.L { background: #fef2f2; color: var(--loss); }
  .badge.D { background: #f1f5f9; color: var(--draw); }
  
  .pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; }
  .pill.on { background: var(--brand-soft); color: var(--brand); }
  .pill.off { background: #f1f5f9; color: var(--muted); }

  /* Buttons */
  .btn { 
    width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 16px; font-weight: 800; 
    cursor: pointer; transition: 0.2s; margin-top: 12px;
  }
  .btn.primary { background: var(--brand); color: #fff; }
  .btn.ghost { background: #fff; border: 1.5px solid var(--line); color: var(--text); }
  .smallBtn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--line); background: #fff; font-weight: 700; font-size: 13px; }

  /* Detail Scorebox */
  .scoreDisplay { 
    display: flex; align-items: center; justify-content: center; gap: 15px; 
    padding: 20px 0; border-bottom: 2px solid var(--bg); margin-bottom: 15px;
  }
  .scoreNum { font-size: 42px; font-weight: 900; color: var(--navy); }
  .scoreVs { font-size: 14px; font-weight: 700; color: var(--muted); }

  /* Player Modal (Sheet) */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: flex-end; }
  .sheet { 
    width: 100%; max-height: 85vh; background: #fff; border-radius: 24px 24px 0 0; 
    overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheetHead { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .sheetBody { padding: 20px; overflow-y: auto; background: var(--bg); }
  
  .pmSection { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--line); }
  .pmSectionTitle { font-size: 13px; font-weight: 800; color: var(--brand); margin-bottom: 10px; }
  .pmStatGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .pmStatBox { background: #f8fafc; border-radius: 10px; padding: 8px 4px; text-align: center; border: 1px solid #f1f5f9; }
  .pmStatBox .v { font-size: 14px; font-weight: 800; }
  .pmStatBox .k { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 2px; }

  .kv { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
  .kv:last-child { border-bottom: none; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; font-style: italic; }
  .hidden { display: none !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
  <div id="viewList">
    <div class="topbar">
      <div><div class="title">📊 경기 리포트</div><div class="sub">대회별 성적 및 라인업 요약</div></div>
      <a href="index.html" style="text-decoration:none"><button class="smallBtn">홈</button></a>
    </div>

    <div class="card">
      <label>🏆 대회 필터</label>
      <select id="tournamentSel"></select>
      <div class="kpis">
        <div class="kpi"><div class="v" id="kpiGames">-</div><div class="l">TOTAL</div></div>
        <div class="kpi"><div class="v" id="kpiWLD">-</div><div class="l">W - L - D</div></div>
      </div>
      <!--<div class="hint" id="kpiHint" style="text-align:center;">전체 경기 요약</div>-->
    </div>

    <div class="card">
      <div class="h1">🏟️ 경기 목록</div>
      <div id="listHint" class="hint">데이터를 불러오는 중...</div>
      <div class="list" id="gameList"></div>
    </div>
  </div>

  <div id="viewDetail" class="hidden">
    <div class="topbar">
      <div><div class="title">🧾 경기 상세</div><div class="sub" id="detailHeader">-</div></div>
      <button class="smallBtn" id="btnBack">뒤로가기</button>
    </div>

    <div class="card">
      <div class="h1">🔢 최종 스코어</div>
      <div class="scoreDisplay">
        <div class="scoreNum" id="gScoreHome">-</div>
        <div class="scoreVs">VS</div>
        <div class="scoreNum" id="gScoreAway">-</div>
      </div>
      <div style="text-align:center; margin-bottom:15px;">
        <span class="badge" id="gResultBadge">-</span>
      </div>
      <div class="kv"><div class="k">대회명</div><div class="v" id="gTournament">-</div></div>
      <div class="kv"><div class="k">경기장</div><div class="v" id="gStadium">-</div></div>
      <div class="kv"><div class="k">진행 이닝</div><div class="v" id="gInnings">-</div></div>
      <div class="kv"><div class="k">경기 날씨</div><div class="v" id="gWeather">-</div></div>
      <div class="kv"><div class="k">팀 기록(안타/실책/홈런)</div><div class="v" id="gTeamStats">-</div></div>
      <button class="btn ghost" id="btnOpenInput">✏️ 경기 정보 수정</button>
    </div>

    <div class="card">
      <div class="h1">👥 라인업 및 개인 기록</div>
      <div id="recordsHint" class="hint">불러오는 중...</div>
      <div class="list" id="recordsList"></div>
      <div class="hint">💡 선수를 클릭하면 ⚾🏏 상세 기록을 볼 수 있습니다.</div>
    </div>
  </div>
</div>

<div id="playerModal" class="overlay hidden">
  <div class="sheet">
    <div class="sheetHead">
      <div><div class="sheetTitle" id="pmTitle">-</div><div class="sub" id="pmSub">-</div></div>
      <button class="smallBtn" id="pmClose">닫기</button>
    </div>
    <div class="sheetBody" id="pmBody"></div>
  </div>
</div>

<script>
  // --- 제공해주신 기존 스크립트 로직 유지 및 UI 바인딩 ---
  const SUPABASE_URL = 'https://dmxkznmliiyffoltdcxd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRteGt6bm1saWl5ZmZvbHRkY3hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMwNTc2NzksImV4cCI6MjA1ODYzMzY3OX0.NUQgOp8NGHEZ0RDQ4sbuH7YCJpfYqF3UyEK3sPtu5-o';
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function requireLogin() {
    const { data, error } = await client.auth.getSession();
    if (error) {
      console.error(error);
      location.href = `auth.html?next=${encodeURIComponent(location.pathname.split('/').pop() + location.search)}`;
      return null;
    }
    const session = data?.session;
    if (!session) {
      location.href = `auth.html?next=${encodeURIComponent(location.pathname.split('/').pop() + location.search)}`;
      return null;
    }
    return session;
  }
  const el = (id) => document.getElementById(id);

  let currentGameId = null;
  let currentFilter = { tournament: null };
  let gamesCache = [];

  // 화면 전환
  function show(viewId, push = true){
    ["viewList","viewDetail"].forEach(v => el(v).classList.add("hidden"));
    el(viewId).classList.remove("hidden");
    if(push) history.pushState({ view: viewId, gameId: currentGameId, tournament: currentFilter.tournament }, "", viewId === "viewDetail" ? `report.html?game=${currentGameId}` : "report.html");
  }

  function safe(v, fb="-"){ return (v === null || v === undefined || v === "") ? fb : v; }
  function num(v){ return Number.isFinite(Number(v)) ? Number(v) : 0; }

  // 대회 목록 로드
  async function loadTournaments(){
    const { data } = await client.from("baseball_games").select("tournament").order("tournament");
    const sel = el("tournamentSel");
    sel.innerHTML = '<option value="__ALL__">전체 대회 보기</option>';
    const set = new Set();
    (data || []).forEach(r => { if(r.tournament) set.add(r.tournament.trim()); });
    [...set].sort().forEach(t => {
      const opt = document.createElement("option"); opt.value = t; opt.textContent = t; sel.appendChild(opt);
    });
  }

  // 경기 목록 로드
  async function loadGameList(){
    el("gameList").innerHTML = "";
    el("listHint").textContent = "경기를 불러오고 있습니다...";
    const tVal = el("tournamentSel").value;
    currentFilter.tournament = (tVal !== "__ALL__") ? tVal : null;

    let q = client.from("baseball_games").select("*").order("game_date", { ascending: false });
    if(currentFilter.tournament) q = q.eq("tournament", currentFilter.tournament);
    
    const { data, error } = await q;
    if(error) return el("listHint").textContent = "오류 발생: " + error.message;

    gamesCache = data || [];
    el("listHint").textContent = gamesCache.length ? "" : "기록된 경기가 없습니다.";
    
    // KPI 업데이트
    el("kpiGames").textContent = gamesCache.length;
    let w=0, l=0, d=0;
    gamesCache.forEach(g => { if(g.result==='W') w++; else if(g.result==='L') l++; else d++; });
    el("kpiWLD").textContent = `${w}-${l}-${d}`;
    //el("kpiHint").textContent = currentFilter.tournament || "전체 대회 합산";

    gamesCache.forEach(g => {
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <div style="flex:1">
          <div class="h1">vs ${g.opponent}</div>
          <div class="muted2">${g.game_date} · ${safe(g.stadium)}</div>
          <div class="muted2" style="color:var(--brand); font-weight:700;">Score ${g.our_score} : ${g.opp_score}</div>
        </div>
        <div class="badge ${g.result || 'D'}">${g.result || 'D'}</div>
      `;
      item.onclick = () => openDetail(g.id);
      el("gameList").appendChild(item);
    });
  }

  // 상세 보기
  async function openDetail(gameId, push = true){
    currentGameId = gameId;
    show("viewDetail", push);
    el("recordsList").innerHTML = "";

    const { data: g } = await client.from("baseball_games").select("*").eq("id", gameId).single();
    if(!g) return;

    el("detailHeader").textContent = `${g.game_date} vs ${g.opponent}`;
    el("gScoreHome").textContent = num(g.our_score);
    el("gScoreAway").textContent = num(g.opp_score);
    el("gResultBadge").textContent = g.result || "DRAW";
    el("gResultBadge").className = `badge ${g.result || 'D'}`;
    el("gTournament").textContent = safe(g.tournament);
    el("gStadium").textContent = safe(g.stadium);
    el("gInnings").textContent = safe(g.innings) + "이닝";
    el("gWeather").textContent = safe(g.weather);
    el("gTeamStats").textContent = `${num(g.our_hits)}안타 / ${num(g.our_errors)}실책 / ${num(g.our_hr)}홈런`;
    el("btnOpenInput").onclick = () => location.href = `createGame.html?game=${gameId}`;

    // 선수 기록 로드
    const { data: records } = await client.from("baseball_game_player_records")
      .select("*, baseball_players(*)")
      .eq("game_id", gameId)
      .order("batting_order");

    el("recordsHint").textContent = records?.length ? "" : "기록된 선수가 없습니다.";
    records?.forEach(rec => {
      const p = rec.baseball_players || {};
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <div style="flex:1">
          <div class="h1">#${p.jersey_number || '-'} ${p.name} <small style="color:var(--muted); font-weight:normal;">(${p.grade}학년)</small></div>
          <div class="muted2">${rec.batting_order || '-'}번 타자 · ${rec.position || '-'}</div>
          <div class="muted2" style="font-size:11px;">${num(rec.ab)}타수 ${num(rec.h)}안타 ${num(rec.rbi)}타점 / ${num(rec.ip)}이닝 ${num(rec.pk)}K</div>
        </div>
        <div class="pill ${rec.is_starter ? 'on' : 'off'}">${rec.is_starter ? '선발' : '교체'}</div>
      `;
      item.onclick = () => openPlayerModal(g, rec);
      el("recordsList").appendChild(item);
    });
  }

  // 모달 렌더링 함수 (기존 로직 그대로 UI만 바인딩)
  function openPlayerModal(game, rec){
    const p = rec.baseball_players || {};
    el("pmTitle").textContent = `#${p.jersey_number || '-'} ${p.name}`;
    el("pmSub").textContent = `vs ${game.opponent} (${game.game_date})`;
    
    const body = el("pmBody");
    body.innerHTML = "";

    // 타격 그리드
    const batGrid = document.createElement("div");
    batGrid.className = "pmSection";
    batGrid.innerHTML = `<div class="pmSectionTitle">⚾ BATTING</div><div class="pmStatGrid"></div>`;
    const bStats = [["타수",rec.ab],["안타",rec.h],["타점",rec.rbi],["득점",rec.r],["볼넷",rec.bb],["삼진",rec.so],["도루",rec.sb],["홈런",rec.hr]];
    bStats.forEach(([k,v]) => {
      batGrid.querySelector(".pmStatGrid").innerHTML += `<div class="pmStatBox"><div class="v">${num(v)}</div><div class="k">${k}</div></div>`;
    });
    body.appendChild(batGrid);

    // 투구 그리드
    if(num(rec.ip) > 0 || num(rec.pitches) > 0){
      const pitGrid = document.createElement("div");
      pitGrid.className = "pmSection";
      pitGrid.innerHTML = `<div class="pmSectionTitle">🥎 PITCHING</div><div class="pmStatGrid"></div>`;
      const pStats = [["이닝",rec.ip],["자책",rec.er],["탈삼진",rec.pk],["볼넷",rec.pbb],["투구수",rec.pitches],["MAX",rec.max_vel]];
      pStats.forEach(([k,v]) => {
        pitGrid.querySelector(".pmStatGrid").innerHTML += `<div class="pmStatBox"><div class="v">${safe(v,0)}</div><div class="k">${k}</div></div>`;
      });
      body.appendChild(pitGrid);
    }

    // 메모
    const memoBox = document.createElement("div");
    memoBox.className = "pmSection";
    memoBox.innerHTML = `<div class="pmSectionTitle">📝 MEMO</div><div style="font-size:13px; color:var(--text);">${safe(rec.player_memo, "입력된 메모가 없습니다.")}</div>`;
    body.appendChild(memoBox);

    el("playerModal").classList.remove("hidden");
  }

  // 초기화 및 이벤트
  el("pmClose").onclick = () => el("playerModal").classList.add("hidden");
  el("tournamentSel").addEventListener("change", loadGameList);
  el("btnBack").onclick = () => history.back();

  window.onpopstate = (e) => {
    if(!e.state || e.state.view === "viewList") { show("viewList", false); loadGameList(); }
    else if(e.state.view === "viewDetail") openDetail(e.state.gameId, false);
  };

  (async function init(){
    const session = await requireLogin();
    if (!session) return;
    await loadTournaments();
    const gid = new URLSearchParams(location.search).get("game");
    if(gid) openDetail(Number(gid), false); else { show("viewList", false); loadGameList(); }
  })();
</script>
</body>
</html>
