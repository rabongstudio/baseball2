<!doctype html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
:root{--black:#0a0c10;--panel:#181c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f2f5;--muted:#7a8294;--brand:#e8ff47;--brand-dim:rgba(232,255,71,.12);--win:#4ade80;--win-bg:rgba(74,222,128,.1);--loss:#f87171;--loss-bg:rgba(248,113,113,.1);--draw:#94a3b8;--draw-bg:rgba(148,163,184,.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}.header-inner{max-width:480px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--brand)}.logo span{color:var(--text)}.back-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-size:13px;font-weight:700;text-decoration:none}.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;margin-bottom:4px}.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}.filter-bar{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px}.filter-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}select{width:100%;padding:12px 16px;border:1px solid var(--border2);border-radius:12px;font-size:14px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif;cursor:pointer}select:focus{outline:none;border-color:var(--brand)}select option{background:var(--panel)}.kpi-row{display:flex;gap:10px;margin-top:12px}.kpi{flex:1;background:var(--brand-dim);border-radius:12px;padding:12px;text-align:center}.kpi .v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--brand);line-height:1}.kpi .l{font-size:11px;font-weight:700;color:var(--brand);opacity:.8;margin-top:4px;letter-spacing:.5px}.game-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}.game-card:hover{border-color:var(--border2)}.result-badge{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;flex-shrink:0}.result-badge.W{background:var(--win-bg);color:var(--win)}.result-badge.L{background:var(--loss-bg);color:var(--loss)}.result-badge.D{background:var(--draw-bg);color:var(--draw)}.game-info{flex:1;min-width:0}.game-vs{font-size:14px;font-weight:700}.game-meta{font-size:12px;color:var(--muted);margin-top:3px}.game-score-text{font-family:'Bebas Neue',sans-serif;font-size:22px;flex-shrink:0}.score-hero,.info-card,.stat-section{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}.score-hero{text-align:center}.score-teams{display:flex;align-items:center;justify-content:center;gap:20px;margin:8px 0 12px}.score-num{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1}.score-sep{font-size:24px;color:var(--muted);font-weight:700}.score-result-badge{display:inline-block;padding:6px 20px;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:20px}.score-result-badge.W{background:var(--win-bg);color:var(--win)}.score-result-badge.L{background:var(--loss-bg);color:var(--loss)}.score-result-badge.D{background:var(--draw-bg);color:var(--draw)}.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}.info-row:last-child{border-bottom:none}.info-row .k{color:var(--muted)} .info-row .v{font-weight:700;text-align:right}.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center}.stat-box .v{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}.stat-box .k{font-size:10px;color:var(--muted);margin-top:4px;font-weight:700}.btn{width:100%;margin-top:10px;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}.btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}.hint-text{font-size:12px;color:var(--muted);margin:8px 0}.hidden{display:none!important}
.video-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}.video-link{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text);padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:12px;transition:border-color .15s}.video-link:hover{border-color:var(--brand)}.video-icon{font-size:24px;flex-shrink:0}.video-label{font-size:14px;font-weight:700}.video-url-text{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/header.js"></script>
</head>
<body>
<div id="appHeader" data-back="index.html"></div>
<div class="container">
  <div id="viewList">
    <div class="page-title">경기 리포트</div>
    <div class="page-sub">대회별로 내 경기 기록을 확인하세요</div>
    <div class="filter-bar">
      <div class="filter-label">대회 필터</div>
      <select id="tournamentSel"><option value="">전체</option></select>
      <div class="kpi-row"><div class="kpi"><div class="v" id="kpiGames">-</div><div class="l">TOTAL</div></div><div class="kpi"><div class="v" id="kpiWLD">-</div><div class="l">W · L · D</div></div></div>
    </div>
    <div class="section-label">경기 목록</div>
    <div class="hint-text" id="listHint">데이터를 불러오는 중...</div>
    <div id="gameList"></div>
  </div>
  <div id="viewDetail" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div><div class="page-title">경기 상세</div><div class="page-sub" id="detailHeader">-</div></div><button class="back-btn" id="btnBack">← 뒤로</button></div>
    <div class="score-hero"><div id="gResultBadge" class="score-result-badge D">-</div><div class="score-teams"><div class="score-num" id="gScoreHome">-</div><div class="score-sep">:</div><div class="score-num" id="gScoreAway">-</div></div></div>
    <div class="info-card">
      <div class="info-row"><span class="k">대회명</span><span class="v" id="gTournament">-</span></div>
      <div class="info-row"><span class="k">경기장</span><span class="v" id="gStadium">-</span></div>
      <div class="info-row"><span class="k">진행 이닝</span><span class="v" id="gInnings">-</span></div>
      <div class="info-row"><span class="k">날씨</span><span class="v" id="gWeather">-</span></div>
      <div class="info-row"><span class="k">홈/원정</span><span class="v" id="gHomeAway">-</span></div>
      <div class="info-row"><span class="k">선발/교체</span><span class="v" id="gStarter">-</span></div>
      <div class="info-row"><span class="k">타순/포지션</span><span class="v" id="gLineup">-</span></div>
      <div class="info-row"><span class="k">경기 메모</span><span class="v" id="gGameMemo">-</span></div>
      <div class="info-row"><span class="k">선수 메모</span><span class="v" id="gPlayerMemo">-</span></div>
    </div>
    <div class="section-label">타격</div><div class="stat-section"><div class="stat-grid" id="batStats"></div></div>
    <div class="section-label">투구</div><div class="stat-section"><div class="stat-grid" id="pitStats"></div></div>
    <div class="section-label">수비</div><div class="stat-section"><div class="stat-grid" id="fldStats"></div></div>
    <div class="section-label">경기 영상</div>
    <div class="video-card">
      <div class="hint-text" id="videoHint" style="margin:0">등록된 영상 주소가 없습니다.</div>
      <a id="videoLink" class="video-link hidden" href="#" target="_blank" rel="noopener noreferrer">
        <div class="video-icon">🎬</div>
        <div><div class="video-label">영상 보기</div><div class="video-url-text" id="videoUrlText"></div></div>
      </a>
    </div>
    <button class="btn ghost" id="btnOpenInput">✏️ 기록 수정</button>
  </div>
</div>
<script>
const client=window.sb; const el=(id)=>document.getElementById(id); let currentGameId=null;
function safe(v, fb='-'){ return (v===null||v===undefined||v==='') ? fb : v; }
function num(v){ return Number.isFinite(Number(v)) ? Number(v) : 0; }
function statBox(k,v){ return `<div class="stat-box"><div class="v">${v}</div><div class="k">${k}</div></div>`; }
function show(viewId,push=true){ ['viewList','viewDetail'].forEach(v=>el(v).classList.add('hidden')); el(viewId).classList.remove('hidden'); if(push){ const url=(viewId==='viewDetail'&&currentGameId)?`report.html?game=${currentGameId}`:'report.html'; history.pushState({view:viewId,gameId:currentGameId},'',url); } }
async function requireLogin(){ const {data,error}=await client.auth.getUser(); if(error||!data?.user){ location.href=`auth.html?next=${encodeURIComponent(location.pathname.split('/').pop()+location.search)}`; return null; } return data.user; }
function renderGameCard(g){ const item=document.createElement('div'); item.className='game-card'; const resultClass=g.result==='W'?'W':g.result==='L'?'L':'D'; item.innerHTML=`<div class="result-badge ${resultClass}">${safe(g.result,'D')}</div><div class="game-info"><div class="game-vs">vs ${safe(g.opponent)}</div><div class="game-meta">${safe(g.game_date)}${g.stadium ? ' · ' + g.stadium : ''}</div></div><div class="game-score-text">${num(g.our_score)}<span style="color:var(--muted);font-size:16px">:</span>${num(g.opp_score)}</div>`; item.onclick=()=>openDetail(g.id); return item; }
async function loadGameList(){ el('listHint').textContent='불러오는 중...'; const selected = el('tournamentSel').value || null; const {data,error}=await client.rpc('baseball_report_list_my',{ p_tournament:selected, p_limit:200, p_offset:0 }); if(error){ el('listHint').textContent='오류 발생: '+error.message; return; } const tournaments=Array.isArray(data?.tournaments)?data.tournaments:[]; const kpi=data?.kpi||{}; const rows=Array.isArray(data?.games)?data.games:[]; const sel=el('tournamentSel'); const prev=sel.value; sel.innerHTML='<option value="">전체</option>'; tournaments.forEach(t=>{ const opt=document.createElement('option'); opt.value=t; opt.textContent=t; sel.appendChild(opt); }); sel.value=prev||''; el('kpiGames').textContent=num(kpi.total_games); el('kpiWLD').textContent=`${num(kpi.wins)}·${num(kpi.losses)}·${num(kpi.draws)}`; el('gameList').innerHTML=''; if(!rows.length){ el('listHint').textContent='기록된 경기가 없습니다.'; return; } el('listHint').textContent=''; rows.forEach(g=>el('gameList').appendChild(renderGameCard(g))); }
async function openDetail(gameId,push=true){ currentGameId=Number(gameId); show('viewDetail',push); const {data,error}=await client.rpc('baseball_record_detail',{ p_record_id:Number(gameId) }); if(error){ el('detailHeader').textContent='기록을 불러오지 못했습니다.'; return; } const g=data||{}; el('detailHeader').textContent=`${safe(g.game_date)} vs ${safe(g.opponent)}`; el('gScoreHome').textContent=num(g.our_score); el('gScoreAway').textContent=num(g.opp_score); const res=g.result||'D'; el('gResultBadge').textContent=res==='W'?'WIN':res==='L'?'LOSS':'DRAW'; el('gResultBadge').className=`score-result-badge ${res}`; el('gTournament').textContent=safe(g.tournament); el('gStadium').textContent=safe(g.stadium); el('gInnings').textContent=`${num(g.innings)}이닝`; el('gWeather').textContent=safe(g.weather); el('gHomeAway').textContent=g.is_home ? '홈' : '원정'; el('gStarter').textContent=g.is_starter ? '선발' : '교체'; el('gLineup').textContent=`${safe(g.batting_order)}번 / ${safe(g.position)}`; el('gGameMemo').textContent=safe(g.game_memo); el('gPlayerMemo').textContent=safe(g.player_memo); el('batStats').innerHTML=[statBox('타수',num(g.ab)),statBox('안타',num(g.h)),statBox('타점',num(g.rbi)),statBox('득점',num(g.r)),statBox('볼넷',num(g.bb)),statBox('삼진',num(g.so)),statBox('사구',num(g.hbp)),statBox('도루',num(g.sb)),statBox('2루타',num(g.doubles)),statBox('3루타',num(g.triples)),statBox('홈런',num(g.hr)),statBox('희플',num(g.sf)),statBox('희번',num(g.sh)),statBox('땅볼',num(g.gb)),statBox('플라이',num(g.fb))].join(''); el('pitStats').innerHTML=[statBox('이닝',num(g.ip).toFixed(1)),statBox('자책',num(g.er)),statBox('삼진',num(g.pk)),statBox('볼넷',num(g.pbb)),statBox('피안타',num(g.ph)),statBox('투구수',num(g.pitches)),statBox('최고구속',safe(g.max_vel))].join(''); el('fldStats').innerHTML=[statBox('실책',num(g.e))].join('');
  const videoUrl = g.video_url || '';
  if(videoUrl){ el('videoHint').classList.add('hidden'); el('videoLink').classList.remove('hidden'); el('videoLink').href=videoUrl; el('videoUrlText').textContent=videoUrl; } else { el('videoHint').classList.remove('hidden'); el('videoLink').classList.add('hidden'); }
  el('btnOpenInput').onclick=()=>location.href=`createGame.html?record=${gameId}`; }
el('tournamentSel').addEventListener('change', ()=>loadGameList()); el('btnBack').onclick=()=>history.back(); window.onpopstate=async (e)=>{ if(!e.state||e.state.view==='viewList'){ show('viewList',false); } else if(e.state.view==='viewDetail'&&e.state.gameId){ await openDetail(e.state.gameId,false); } };
(async function init(){ const user=await requireLogin(); if(!user) return; const gid=Number(new URLSearchParams(location.search).get('game')); if(gid){ await openDetail(gid,false); history.replaceState({view:'viewDetail',gameId:gid},'',`report.html?game=${gid}`); } else { show('viewList',false); history.replaceState({view:'viewList'},'', 'report.html'); await loadGameList(); } })();
</script>
</body>
</html>
