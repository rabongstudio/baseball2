<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>기록 입력 · ELITEREC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0c10;--panel:#181c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f2f5;--muted:#7a8294;--muted2:#4a5060;--brand:#e8ff47;--brand-dim:rgba(232,255,71,.12);--win:#4ade80;--win-bg:rgba(74,222,128,.1);--loss:#f87171;--loss-bg:rgba(248,113,113,.1);--draw:#94a3b8;--draw-bg:rgba(148,163,184,.1);--ok:#4ade80;--err:#f87171;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}
.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{max-width:480px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--brand);line-height:1}
.logo span{color:var(--text)}
.back-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-decoration:none}
.back-btn:hover{border-color:var(--brand);color:var(--brand)}
.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.5px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}

/* 경기 카드 */
.game-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.game-card:hover{border-color:var(--border2)}
.result-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0}
.result-badge.W{background:var(--win-bg);color:var(--win)} .result-badge.L{background:var(--loss-bg);color:var(--loss)} .result-badge.D{background:var(--draw-bg);color:var(--draw)}
.game-info{flex:1;min-width:0}
.game-vs{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-meta{font-size:12px;color:var(--muted);margin-top:3px}
.game-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);flex-shrink:0}
.month-header{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:8px 2px 4px;margin-top:4px}

/* 선수 카드 */
.player-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.player-card:hover{border-color:var(--border2)}
.player-num{width:38px;height:38px;border-radius:10px;background:var(--brand-dim);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--brand);flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:700}
.player-meta{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.starter-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;flex-shrink:0}
.starter-pill.on{background:var(--win-bg);color:var(--win)}
.starter-pill.off{background:var(--draw-bg);color:var(--draw)}

/* 선수 추가 패널 */
.add-panel{background:var(--panel);border:1px solid var(--border2);border-radius:16px;padding:16px;margin-bottom:12px}
.add-panel input{width:100%;margin-top:8px;padding:12px 16px;border:1px solid var(--border2);border-radius:12px;font-size:14px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif}
.add-panel input:focus{outline:none;border-color:var(--brand)}
.add-title{font-size:13px;font-weight:700;color:var(--muted)}

/* 폼 */
label{display:block;margin-top:14px;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase}
input[type=number],input[type=text],textarea,select{width:100%;margin-top:6px;padding:13px 16px;border:1px solid var(--border2);border-radius:12px;font-size:15px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand)}
select option{background:var(--panel)}
textarea{resize:none}
.row2{display:flex;gap:10px}.row2>div{flex:1}
.divider{height:1px;background:var(--border);margin:16px 0}
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:16px 0 4px}

.chip-row{display:flex;gap:8px;margin-top:8px}
.chip-btn{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s}
.chip-btn.active{border-color:var(--brand);color:var(--brand);background:var(--brand-dim)}

.btn{width:100%;margin-top:12px;padding:14px;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn.primary{background:var(--brand);color:var(--black)}.btn.primary:hover{background:#d4ea3a}
.btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}.btn.ghost:hover{background:rgba(255,255,255,.05)}
.btn.danger{background:var(--loss-bg);border:1px solid var(--loss);color:var(--loss)}
.row2-btn{display:flex;gap:8px;margin-top:10px}.row2-btn>button{flex:1}

.msg{margin-top:12px;font-size:13px;line-height:1.5;text-align:center}
.msg .ok{color:var(--ok)}.msg .err{color:var(--err)}
.hint-text{font-size:12px;color:var(--muted);margin:8px 0;line-height:1.5}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:13px}
.hidden{display:none!important}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">ELITE<span>REC</span></div>
    <a href="index.html" class="back-btn">← 홈</a>
  </div>
</header>

<div class="container">

  <!-- VIEW 1: 선수 선택 -->
  <div id="viewPlayers">
    <div class="page-title">선수 선택</div>
    <div class="page-sub">먼저 선수를 선택해주세요.</div>
    <div class="hint-text" id="playersHint">불러오는 중...</div>
    <div id="playerSelectList"></div>
  </div>

  <!-- VIEW 2: 경기 선택 -->
  <div id="viewGames" class="hidden">
    <div class="page-title">경기 선택</div>
    <div class="page-sub" id="selectedPlayerHeader">-</div>
    <div class="hint-text" id="gamesHint">불러오는 중...</div>
    <div id="gamesList"></div>
    <button class="btn ghost" id="btnBackToPlayers" style="margin-top:16px">← 선수 선택</button>
  </div>

  <!-- VIEW 3: 기록 입력 -->
  <div id="viewEdit" class="hidden">
    <div class="page-title">선수 기록</div>
    <div class="page-sub" id="editHeader">-</div>

    <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px">

      <div class="section-label">라인업</div>
      <label>선발 / 교체</label>
      <div class="chip-row">
        <button type="button" class="chip-btn active" id="btnStarter">선발</button>
        <button type="button" class="chip-btn" id="btnSub">교체</button>
      </div>
      <div class="row2">
        <div><label>타순</label><input id="battingOrder" type="number" min="1" step="1" placeholder="1~9" /></div>
        <div><label>포지션</label><input id="position" type="text" placeholder="예: SS, P" /></div>
      </div>

      <div class="divider"></div>
      <div class="section-label">타격</div>
      <div class="row2"><div><label>타수</label><input id="ab" type="number" min="0" step="1" value="0"></div><div><label>안타</label><input id="h" type="number" min="0" step="1" value="0"></div></div>
      <div class="row2"><div><label>타점</label><input id="rbi" type="number" min="0" step="1" value="0"></div><div><label>득점</label><input id="r" type="number" min="0" step="1" value="0"></div></div>
      <div class="row2"><div><label>볼넷</label><input id="bb" type="number" min="0" step="1" value="0"></div><div><label>삼진</label><input id="so" type="number" min="0" step="1" value="0"></div></div>
      <div class="row2"><div><label>사구</label><input id="hbp" type="number" min="0" step="1" value="0"></div><div><label>도루</label><input id="sb" type="number" min="0" step="1" value="0"></div></div>
      <div class="row2"><div><label>땅볼</label><input id="gb" type="number" min="0" step="1" value="0"></div><div><label>플라이</label><input id="fb" type="number" min="0" step="1" value="0"></div></div>

      <div class="divider"></div>
      <div class="section-label">장타 / 희생</div>
      <div class="row2"><div><label>2루타</label><input id="doubles" type="number" min="0" step="1" value="0"></div><div><label>3루타</label><input id="triples" type="number" min="0" step="1" value="0"></div></div>
      <div class="row2"><div><label>홈런</label><input id="hr" type="number" min="0" step="1" value="0"></div><div><label>희생플라이</label><input id="sf" type="number" min="0" step="1" value="0"></div></div>
      <label>희생번트</label><input id="sh" type="number" min="0" step="1" value="0">

      <div class="divider"></div>
      <div class="section-label">투구</div>
      <div class="row2"><div><label>이닝 (예: 2.1)</label><input id="ip" type="number" min="0" step="0.1" value="0"></div><div><label>자책</label><input id="er" type="number" min="0" step="1" value="0"></div></div>
      <div class="row2"><div><label>삼진 (투수)</label><input id="pk" type="number" min="0" step="1" value="0"></div><div><label>볼넷 (투수)</label><input id="pbb" type="number" min="0" step="1" value="0"></div></div>
      <div class="row2"><div><label>피안타</label><input id="ph" type="number" min="0" step="1" value="0"></div><div><label>투구수</label><input id="pitches" type="number" min="0" step="1" value="0"></div></div>
      <label>최고구속 (km/h)</label><input id="maxVel" type="number" min="0" step="1" placeholder="예: 118" />

      <div class="divider"></div>
      <div class="section-label">수비</div>
      <label>실책</label><input id="e" type="number" min="0" step="1" value="0" />

      <div class="divider"></div>
      <div class="section-label">메모</div>
      <textarea id="playerMemo" rows="3" placeholder="예: 컨택 좋음 / 송구 흔들림"></textarea>

      <button class="btn primary" id="btnSave">저장하기</button>
      <div class="row2-btn">
        <button class="btn ghost" id="btnReset">되돌리기</button>
        <button class="btn danger" id="btnRemoveFromGame">경기에서 제외</button>
      </div>
      <button class="btn ghost" id="btnBackPlayers" style="margin-top:8px">← 경기 목록</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

</div>

<script>
const client=window.sb;
async function requireLogin(){const{data,error}=await client.auth.getSession();if(error||!data?.session){location.href=`auth.html?next=${encodeURIComponent(location.pathname.split('/').pop()+location.search)}`;return null;}return data.session;}
const el=(id)=>document.getElementById(id);
const setMsg=(html)=>el('msg').innerHTML=html;
let currentGameId=null,currentGame=null,currentRecord=null,currentPlayer=null,isStarter=true;
let playersCache=[],recordsCache=[],myPlayerId=null,mySchoolId=null;

function show(viewId, pushState=true){
  ['viewPlayers','viewGames','viewEdit'].forEach(v=>el(v).classList.add('hidden'));
  el(viewId).classList.remove('hidden');
  setMsg('');
  if(pushState) history.pushState({view:viewId},'',location.pathname);
}
function ymKey(d){return(d||'').slice(0,7)||'0000-00';}
function ymTitle(k){const[y,m]=k.split('-');return`${y}년 ${Number(m)}월`;}
function setActive(on,off){on.classList.add('active');off.classList.remove('active');}
function n(id){const v=Number(el(id).value);return Number.isFinite(v)?v:0;}
function textVal(id){return(el(id).value||'').trim();}
function safeNum(x){return Number.isFinite(Number(x))?Number(x):0;}

function recordSummary(rec){
  const bo=rec.batting_order?`${rec.batting_order}번`:'타순-';
  const pos=rec.position||(rec.baseball_players?.primary_position)||'-';
  return`${bo} · ${pos} · ${rec.is_starter?'선발':'교체'} | ${safeNum(rec.ab)}타 ${safeNum(rec.h)}안 ${safeNum(rec.rbi)}타점 | ${safeNum(rec.ip)}이닝 ${safeNum(rec.pk)}K`;
}

async function loadPlayerList(){
  el('playerSelectList').innerHTML='';el('playersHint').textContent='불러오는 중...';
  const{data:{user}}=await client.auth.getUser();
  if(!user){el('playersHint').textContent='로그인이 필요해요.';return;}
  const{data,error}=await client.from('baseball_players').select('id,name,jersey_number,grade,primary_position,throws,bats,is_active').eq('owner_user_id',user.id).order('jersey_number',{ascending:true,nullsFirst:false}).order('name',{ascending:true});
  if(error){el('playersHint').textContent='불러오기 실패: '+error.message;return;}
  if(!data||!data.length){el('playersHint').textContent='등록된 선수가 없어요.';return;}
  el('playersHint').textContent='';
  data.forEach(p=>{
    const item=document.createElement('div');item.className='player-card';
    const num=(p.jersey_number??'')!==''?p.jersey_number:'-';
    item.innerHTML=`<div class="player-num">${num}</div><div class="player-info"><div class="player-name">${p.name} <span style="color:var(--muted);font-size:12px">(${p.grade})</span></div><div class="player-meta">${p.primary_position} · ${p.throws}투${p.bats}타</div></div><div style="color:var(--brand);font-size:18px">→</div>`;
    item.addEventListener('click',()=>{
      currentPlayer=p;
      myPlayerId=p.id;
      el('selectedPlayerHeader').textContent=`선수: #${num} ${p.name} (${p.grade})`;
      show('viewGames');loadGames();
    });
    el('playerSelectList').appendChild(item);
  });
}

async function loadGames(){
  el('gamesList').innerHTML='';el('gamesHint').textContent='불러오는 중...';
  const{data,error}=await client.from('baseball_games').select('id,game_date,opponent,tournament,stadium,our_score,opp_score,result').eq('school_id',mySchoolId).order('game_date',{ascending:false}).order('id',{ascending:false});
  if(error){el('gamesHint').textContent='불러오기 실패: '+error.message;return;}
  if(!data||!data.length){el('gamesHint').textContent='경기가 없어요. 먼저 경기를 등록해주세요.';return;}
  el('gamesHint').textContent='';
  const groups=new Map();
  data.forEach(g=>{const k=ymKey(g.game_date);if(!groups.has(k))groups.set(k,[]);groups.get(k).push(g);});
  for(const[k,arr]of groups){
    const h=document.createElement('div');h.className='month-header';h.textContent=`${ymTitle(k)} (${arr.length}경기)`;el('gamesList').appendChild(h);
    arr.forEach(g=>{
      const item=document.createElement('div');item.className='game-card';
      const bc=g.result==='W'?'W':g.result==='L'?'L':'D';
      item.innerHTML=`<div class="result-badge ${bc}">${g.result||'D'}</div><div class="game-info"><div class="game-vs">vs ${g.opponent}</div><div class="game-meta">${g.game_date}${g.tournament?' · '+g.tournament:''}</div></div><div class="game-score">${g.our_score}<span style="color:var(--muted);font-size:16px">:</span>${g.opp_score}</div>`;
      item.addEventListener('click',()=>openGame(g.id));el('gamesList').appendChild(item);
    });
  }
}

async function openGame(gameId){
  currentGameId=gameId;
  const gRes=await client.from('baseball_games').select('id,game_date,opponent,tournament,stadium,our_score,opp_score,result').eq('id',gameId).single();
  if(gRes.error){alert('경기 불러오기 실패: '+gRes.error.message);return;}
  currentGame=gRes.data;

  // 내 선수 기록 있으면 바로 기록화면, 없으면 upsert 후 기록화면
  const{data:rec,error}=await client.from('baseball_game_player_records')
    .select('id,game_id,player_id,is_starter,batting_order,position,ab,h,rbi,r,bb,so,hbp,sb,doubles,triples,hr,sf,sh,gb,fb,ip,er,pk,pbb,ph,pitches,max_vel,e,player_memo,baseball_players(id,name,jersey_number,grade,primary_position,throws,bats)')
    .eq('game_id',gameId).eq('player_id',currentPlayer.id).maybeSingle();
  if(error){alert('기록 불러오기 실패: '+error.message);return;}
  if(rec){
    openRecord(rec);
  } else {
    const{data:newRec,error:uErr}=await client.from('baseball_game_player_records')
      .upsert({game_id:gameId,player_id:currentPlayer.id,is_starter:true},{onConflict:'game_id,player_id'})
      .select('id,game_id,player_id,is_starter,batting_order,position,ab,h,rbi,r,bb,so,hbp,sb,doubles,triples,hr,sf,sh,gb,fb,ip,er,pk,pbb,ph,pitches,max_vel,e,player_memo,baseball_players(id,name,jersey_number,grade,primary_position,throws,bats)')
      .single();
    if(uErr){alert('기록 초기화 실패: '+uErr.message);return;}
    if(newRec) openRecord(newRec);
  }
}

async function loadPlayersCache(){
  if(playersCache.length>0)return;
  const{data,error}=await client.from('baseball_players').select('id,name,jersey_number,grade,primary_position,throws,bats,is_active').order('is_active',{ascending:false}).order('jersey_number',{ascending:true,nullsFirst:false}).order('name',{ascending:true});
  if(error){playersCache=[];return;}
  playersCache=data||[];
}

async function loadRecordsForGame(){
  el('recordsList').innerHTML='';el('recordsHint').textContent='불러오는 중...';
  const{data,error}=await client.from('baseball_game_player_records').select('id,game_id,player_id,is_starter,batting_order,position,ab,h,rbi,r,bb,so,hbp,sb,doubles,triples,hr,sf,sh,gb,fb,ip,er,pk,pbb,ph,pitches,max_vel,e,player_memo,baseball_players(id,name,jersey_number,grade,primary_position,throws,bats)').eq('game_id',currentGameId).order('batting_order',{ascending:true,nullsFirst:false}).order('player_id',{ascending:true});
  if(error){el('recordsHint').textContent='불러오기 실패: '+error.message;return;}
  recordsCache=data||[];
  if(!recordsCache.length){el('recordsHint').textContent='등록된 선수가 없어요. 위의 선수 추가 버튼으로 참여선수를 먼저 등록하세요.';return;}
  el('recordsHint').textContent='';
  recordsCache.forEach(rec=>{
    const p=rec.baseball_players||{};
    const num=(p.jersey_number??'')!==''?p.jersey_number:'-';
    const item=document.createElement('div');item.className='player-card';
    item.innerHTML=`<div class="player-num">${num}</div><div class="player-info"><div class="player-name">${p.name||'선수'} <span style="color:var(--muted);font-size:12px">(${p.grade||'-'})</span></div><div class="player-meta">${recordSummary(rec)}</div>${rec.player_memo?`<div class="player-meta" style="color:var(--brand)">메모: ${rec.player_memo}</div>`:''}</div><div class="starter-pill ${rec.is_starter?'on':'off'}">${rec.is_starter?'선발':'교체'}</div>`;
    item.addEventListener('click',()=>openRecord(rec));el('recordsList').appendChild(item);
  });
}





function renderPlayerPickList(query){
  const q=(query||'').trim().toLowerCase();
  const picked=new Set((recordsCache||[]).map(r=>r.player_id));
  const list=el('playerPickList');list.innerHTML='';
  const filtered=(playersCache||[]).filter(p=>!picked.has(p.id)).filter(p=>{if(!q)return true;const num=(p.jersey_number??'').toString();return(p.name||'').toLowerCase().includes(q)||num===q;}).slice(0,50);
  if(!filtered.length){list.innerHTML='<div class="hint-text">추가할 수 있는 선수가 없어요.</div>';return;}
  filtered.forEach(p=>{
    const item=document.createElement('div');item.className='player-card';
    const num=(p.jersey_number??'')!==''?p.jersey_number:'-';
    item.innerHTML=`<div class="player-num">${num}</div><div class="player-info"><div class="player-name">${p.name} <span style="color:var(--muted);font-size:12px">(${p.grade})</span></div><div class="player-meta">${p.primary_position} · ${p.throws}투${p.bats}타</div></div><div style="color:var(--brand);font-size:22px;font-weight:900">+</div>`;
    item.addEventListener('click',()=>addPlayerToGame(p.id));list.appendChild(item);
  });
}

async function addPlayerToGame(playerId){
  const{error}=await client.from('baseball_game_player_records').upsert({game_id:currentGameId,player_id:playerId,is_starter:true,batting_order:null,position:null},{onConflict:'game_id,player_id'});
  if(error){alert('선수 추가 실패: '+error.message);return;}
  await loadRecordsForGame();
  const rec=recordsCache.find(r=>r.player_id===playerId);
  if(rec)openRecord(rec);
}

function openRecord(rec){
  currentRecord=rec;
  // openRecord가 직접 호출될 때는 currentPlayer가 이미 선수선택에서 세팅돼있음
  if(rec.baseball_players) currentPlayer=rec.baseball_players;
  isStarter=!!rec.is_starter;
  show('viewEdit');
  const num=(currentPlayer.jersey_number??'')!==''?`#${currentPlayer.jersey_number}`:'#-';
  el('editHeader').textContent=`경기 #${currentGameId} · ${num} ${currentPlayer.name||''} (${currentPlayer.grade||''})`;
  if(isStarter)setActive(el('btnStarter'),el('btnSub'));else setActive(el('btnSub'),el('btnStarter'));
  el('battingOrder').value=rec.batting_order??'';el('position').value=rec.position??'';
  el('ab').value=rec.ab??0;el('h').value=rec.h??0;el('rbi').value=rec.rbi??0;el('r').value=rec.r??0;el('bb').value=rec.bb??0;el('so').value=rec.so??0;el('hbp').value=rec.hbp??0;el('sb').value=rec.sb??0;
  el('doubles').value=rec.doubles??0;el('triples').value=rec.triples??0;el('hr').value=rec.hr??0;el('sf').value=rec.sf??0;el('sh').value=rec.sh??0;el('gb').value=rec.gb??0;el('fb').value=rec.fb??0;
  el('ip').value=rec.ip??0;el('er').value=rec.er??0;el('pk').value=rec.pk??0;el('pbb').value=rec.pbb??0;el('ph').value=rec.ph??0;el('pitches').value=rec.pitches??0;el('maxVel').value=rec.max_vel??'';
  el('e').value=rec.e??0;el('playerMemo').value=rec.player_memo??'';setMsg('');
}

el('btnStarter').addEventListener('click',()=>{isStarter=true;setActive(el('btnStarter'),el('btnSub'));});
el('btnSub').addEventListener('click',()=>{isStarter=false;setActive(el('btnSub'),el('btnStarter'));});

el('btnBackToPlayers').addEventListener('click',()=>{currentGameId=null;currentGame=null;show('viewPlayers');});
el('btnBackPlayers').addEventListener('click',()=>{currentGameId=null;currentGame=null;show('viewGames');});
el('btnReset').addEventListener('click',()=>{if(currentRecord)openRecord(currentRecord);});

el('btnSave').addEventListener('click',async()=>{
  if(!currentGameId||!currentPlayer?.id){setMsg('<span class="err">저장 대상이 없어요.</span>');return;}
  setMsg('저장 중...');
  const boRaw=el('battingOrder').value;
  const payload={game_id:currentGameId,player_id:currentPlayer.id,is_starter:isStarter,batting_order:boRaw===''?null:Number(boRaw),position:textVal('position')||null,ab:n('ab'),h:n('h'),rbi:n('rbi'),r:n('r'),bb:n('bb'),so:n('so'),hbp:n('hbp'),sb:n('sb'),doubles:n('doubles'),triples:n('triples'),hr:n('hr'),sf:n('sf'),sh:n('sh'),gb:n('gb'),fb:n('fb'),ip:n('ip'),er:n('er'),pk:n('pk'),pbb:n('pbb'),ph:n('ph'),pitches:n('pitches'),max_vel:el('maxVel').value===''?null:Number(el('maxVel').value),e:n('e'),player_memo:textVal('playerMemo')||null};
  const{error}=await client.from('baseball_game_player_records').upsert(payload,{onConflict:'game_id,player_id'});
  if(error){setMsg(`<span class="err">저장 실패: ${error.message}</span>`);return;}
  setMsg('<span class="ok">✅ 저장 완료</span>');
  // payload로 currentRecord 직접 업데이트 (DB 재조회 불필요)
  currentRecord={...currentRecord,...payload};
});

el('btnRemoveFromGame').addEventListener('click',async()=>{
  if(!currentGameId||!currentPlayer?.id)return;
  if(!confirm('이 선수를 이 경기에서 제외(기록 삭제)할까요?'))return;
  setMsg('삭제 중...');
  const{error}=await client.from('baseball_game_player_records').delete().eq('game_id',currentGameId).eq('player_id',currentPlayer.id);
  if(error){setMsg(`<span class="err">삭제 실패: ${error.message}</span>`);return;}
  setMsg('<span class="ok">✅ 삭제 완료</span>');currentGameId=null;currentGame=null;show('viewGames');await loadGames();
});

window.addEventListener('popstate',(e)=>{
  const view=e.state?.view;
  if(view==='viewEdit'){
    // 기록입력 → 경기선택
    currentRecord=null;
    show('viewGames',false);
  } else if(view==='viewGames'){
    // 경기선택 → 선수선택
    currentGameId=null;currentGame=null;
    show('viewPlayers',false);
  } else {
    show('viewPlayers',false);
  }
});

(async function init(){
  const session=await requireLogin();if(!session)return;
  const{data:{user}}=await client.auth.getUser();
  if(user){
    const{data:profile}=await client.from('baseball_profiles').select('school_id').eq('id',user.id).maybeSingle();
    if(profile) mySchoolId=profile.school_id;
  }
  history.replaceState({view:'viewPlayers'},'',location.pathname);
  show('viewPlayers',false);await loadPlayerList();
})();
</script>
</body>
</html>
