<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8226060642438570" crossorigin="anonymous"></script>
<title>최고기록관 · ELITEREC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0c10;--panel:#181c24;--panel2:#1e2330;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0f2f5;--muted:#7a8294;--muted2:#4a5060;
  --brand:#e8ff47;--brand-dim:rgba(232,255,71,.12);
  --gold:#fbbf24;--gold-dim:rgba(251,191,36,.12);
  --silver:#94a3b8;--silver-dim:rgba(148,163,184,.1);
  --win:#4ade80;--loss:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:60px}
.container{max-width:480px;margin:0 auto;padding:20px 16px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.5px;margin-bottom:2px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

/* 카테고리 탭 */
.cat-row{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{flex:0 0 auto;padding:9px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-btn.active{background:var(--brand);color:var(--black);border-color:var(--brand)}

/* 기록 카드 */
.record-list{display:flex;flex-direction:column;gap:10px}
.record-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.record-card:hover{border-color:var(--border2)}
.record-card.gold{border-left:3px solid var(--gold)}
.record-card.silver{border-left:3px solid var(--silver)}
.record-card.streak{border-left:3px solid var(--win)}

.record-rank{font-family:'Bebas Neue',sans-serif;font-size:28px;width:36px;text-align:center;flex-shrink:0}
.record-rank.r1{color:var(--gold)}
.record-rank.r2{color:var(--silver)}
.record-rank.r3{color:#cd7c3b}
.record-rank.rn{color:var(--muted2)}

.record-body{flex:1;min-width:0}
.record-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.record-value{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--brand);line-height:1}
.record-meta{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.record-badge{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.record-badge.bat{background:var(--brand-dim)}
.record-badge.pit{background:rgba(74,222,128,.1)}
.record-badge.fld{background:rgba(56,189,248,.1)}
.record-badge.streak{background:rgba(74,222,128,.1)}
.record-badge.fun{background:rgba(251,191,36,.1)}

/* 연속 기록 특별 카드 */
.streak-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--win);border-radius:16px;padding:16px;margin-bottom:10px}
.streak-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.streak-title{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.streak-value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--win);line-height:1}
.streak-sub{font-size:12px;color:var(--muted);margin-top:4px}
.streak-dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.streak-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.streak-dot.H{background:rgba(232,255,71,.15);color:var(--brand)}
.streak-dot.W{background:rgba(74,222,128,.15);color:var(--win)}
.streak-dot.X{background:rgba(255,255,255,.05);color:var(--muted2)}
.streak-dot.cur{box-shadow:0 0 0 2px var(--win)}

/* 섹션 라벨 */
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.hint{font-size:13px;color:var(--muted);text-align:center;padding:40px 0}
.hidden{display:none!important}

/* 상세 시트 */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:310;background:#12161d;border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--border2);border-bottom:none;transform:translateY(100%);transition:transform .28s;max-height:80vh;overflow:auto}
.sheet.open{transform:translateY(0)}
.sheet-inner{max-width:480px;margin:0 auto;padding:14px 16px 28px}
.sheet-handle{width:52px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);margin:2px auto 16px}
.sheet-title{font-size:18px;font-weight:900;margin-bottom:4px}
.sheet-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sheet-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}
.sheet-box .v{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text)}
.sheet-box .k{font-size:9px;color:var(--muted);margin-top:2px;font-weight:700}
.close-btn{width:100%;margin-top:14px;padding:13px;border:1px solid var(--border2);border-radius:12px;background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
body.sheet-open{overflow:hidden}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/header.js"></script>
</head>
<body>
<div id="appHeader" data-back="index.html"></div>

<div class="container">
  <div class="page-title">최고기록관</div>
  <div class="page-sub" id="playerName">불러오는 중...</div>

  <!-- 카테고리 탭 -->
  <div class="cat-row">
    <button class="cat-btn active" onclick="setCategory('all')">🏆 전체</button>
    <button class="cat-btn" onclick="setCategory('bat')">⚾ 타격</button>
    <button class="cat-btn" onclick="setCategory('pit')">🥎 투구</button>
    <button class="cat-btn" onclick="setCategory('streak')">🔥 연속</button>
    <button class="cat-btn" onclick="setCategory('fun')">⭐ 재미</button>
  </div>

  <div id="mainContent"><div class="hint">불러오는 중...</div></div>
</div>

<!-- 시트 -->
<div id="sheetOverlay" class="sheet-overlay"></div>
<div id="gameSheet" class="sheet">
  <div class="sheet-inner">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">-</div>
    <div class="sheet-sub" id="sheetSub">-</div>
    <div class="sheet-grid" id="sheetGrid"></div>
    <button class="close-btn" onclick="closeSheet()">닫기</button>
  </div>
</div>

<script>
const client = window.sb;
const el = id => document.getElementById(id);
const num = v => Number.isFinite(Number(v)) ? Number(v) : 0;
let records = [];
let currentCategory = 'all';

// ── 연속 안타 계산 ───────────────────────────────
function calcHitStreak(recs){
  // 날짜 오름차순
  const sorted = [...recs].sort((a,b) => a.game_date > b.game_date ? 1 : -1);
  let best = 0, bestStart = null, bestEnd = null;
  let cur = 0, curStart = null;
  sorted.forEach(r => {
    if(num(r.h) > 0){
      if(cur === 0) curStart = r.game_date;
      cur++;
      if(cur > best){ best = cur; bestStart = curStart; bestEnd = r.game_date; }
    } else {
      cur = 0; curStart = null;
    }
  });
  // 현재 진행중
  let live = 0;
  for(let i = sorted.length-1; i >= 0; i--){
    if(num(sorted[i].h) > 0) live++;
    else break;
  }
  return { best, bestStart, bestEnd, live, sorted };
}

// 연속 승리
function calcWinStreak(recs){
  const sorted = [...recs].sort((a,b) => a.game_date > b.game_date ? 1 : -1);
  let best = 0, cur = 0, live = 0;
  sorted.forEach(r => { if(r.result==='W'){cur++;if(cur>best)best=cur;}else cur=0; });
  for(let i=sorted.length-1;i>=0;i--){ if(records[i]?.result==='W') live++; else break; }
  return { best, live };
}

// 연속 출루
function calcOBStreak(recs){
  const sorted = [...recs].sort((a,b) => a.game_date > b.game_date ? 1 : -1);
  let best = 0, cur = 0;
  sorted.forEach(r => {
    if(num(r.h)+num(r.bb)+num(r.hbp) > 0){ cur++; if(cur>best)best=cur; } else cur=0;
  });
  return { best };
}

// ── 기록 정의 ────────────────────────────────────
function buildRecords(){
  if(!records.length) return [];

  const sorted = [...records].sort((a,b) => a.game_date > b.game_date ? 1 : -1);

  // 단일 경기 최고 기록
  function topN(field, n=5){
    return [...records]
      .filter(r => num(r[field]) > 0)
      .sort((a,b) => num(b[field]) - num(a[field]))
      .slice(0, n);
  }

  const batRecords = [
    { id:'h',     cat:'bat', emoji:'⚾', label:'한 경기 최다 안타',   field:'h',      top:topN('h') },
    { id:'hr',    cat:'bat', emoji:'💥', label:'한 경기 최다 홈런',   field:'hr',     top:topN('hr') },
    { id:'rbi',   cat:'bat', emoji:'🎯', label:'한 경기 최다 타점',   field:'rbi',    top:topN('rbi') },
    { id:'r',     cat:'bat', emoji:'🏃', label:'한 경기 최다 득점',   field:'r',      top:topN('r') },
    { id:'sb',    cat:'bat', emoji:'💨', label:'한 경기 최다 도루',   field:'sb',     top:topN('sb') },
    { id:'bb',    cat:'bat', emoji:'🥊', label:'한 경기 최다 볼넷',   field:'bb',     top:topN('bb') },
  ];

  const pitRecords = [
    { id:'pk',    cat:'pit', emoji:'🔥', label:'한 경기 최다 탈삼진', field:'pk',     top:topN('pk') },
    { id:'ip',    cat:'pit', emoji:'⏱',  label:'한 경기 최다 이닝',  field:'ip',     top:topN('ip') },
    { id:'max_vel', cat:'pit', emoji:'🚀', label:'최고 구속',        field:'max_vel',top:topN('max_vel') },
  ];

  const hitStreak = calcHitStreak(records);
  const winStreak = calcWinStreak(records);
  const obStreak  = calcOBStreak(records);

  const streakRecords = [
    { id:'hit_streak', cat:'streak', emoji:'🔥', label:'최장 연속 안타',  streak: hitStreak },
    { id:'win_streak', cat:'streak', emoji:'🏆', label:'최장 연속 승리',  streak: winStreak },
    { id:'ob_streak',  cat:'streak', emoji:'📈', label:'최장 연속 출루',  streak: obStreak },
  ];

  // 재미 기록
  const totalHR   = records.reduce((s,r) => s+num(r.hr), 0);
  const totalSB   = records.reduce((s,r) => s+num(r.sb), 0);
  const totalK    = records.reduce((s,r) => s+num(r.so), 0);
  const totalPK   = records.reduce((s,r) => s+num(r.pk), 0);
  const totalPit  = records.reduce((s,r) => s+num(r.pitches), 0);
  const avgScore  = records.length ? (records.reduce((s,r)=>s+num(r.our_score),0)/records.length).toFixed(1) : '-';
  const bigWin    = [...records].sort((a,b)=>(num(b.our_score)-num(b.opp_score))-(num(a.our_score)-num(a.opp_score)))[0];
  const bigLoss   = [...records].sort((a,b)=>(num(b.opp_score)-num(b.our_score))-(num(a.opp_score)-num(a.our_score)))[0];

  const funRecords = [
    { id:'total_hr',  cat:'fun', emoji:'💣', label:'통산 홈런',        value: totalHR,  meta:'' },
    { id:'total_sb',  cat:'fun', emoji:'💨', label:'통산 도루',        value: totalSB,  meta:'' },
    { id:'total_k',   cat:'fun', emoji:'😵', label:'통산 삼진(타)',    value: totalK,   meta:'' },
    { id:'total_pk',  cat:'fun', emoji:'🎳', label:'통산 탈삼진(투)', value: totalPK,  meta:'' },
    { id:'total_pit', cat:'fun', emoji:'💪', label:'통산 투구수',      value: totalPit, meta:'' },
    { id:'avg_score', cat:'fun', emoji:'📊', label:'경기당 평균 득점', value: avgScore, meta:`${records.length}경기 평균` },
    { id:'big_win',   cat:'fun', emoji:'🎉', label:'최대 점수차 승리', value: bigWin ? `${num(bigWin.our_score)}-${num(bigWin.opp_score)}` : '-', meta: bigWin ? `vs ${bigWin.opponent} · ${bigWin.game_date}` : '' },
    { id:'big_loss',  cat:'fun', emoji:'😢', label:'최대 점수차 패배', value: bigLoss ? `${num(bigLoss.our_score)}-${num(bigLoss.opp_score)}` : '-', meta: bigLoss ? `vs ${bigLoss.opponent} · ${bigLoss.game_date}` : '' },
  ];

  return { batRecords, pitRecords, streakRecords, funRecords, hitStreak };
}

// ── 단일 기록 카드 렌더 ──────────────────────────
function renderTopCard(rec){
  if(!rec.top || !rec.top.length) return '';
  const best = rec.top[0];
  const rankClass = r => r===0?'r1':r===1?'r2':r===2?'r3':'rn';
  const rows = rec.top.map((r, i) => `
    <div class="record-card ${i===0?'gold':i===1?'silver':''}" onclick="openSheet(${JSON.stringify(r).replace(/"/g,'&quot;')})">
      <div class="record-rank ${rankClass(i)}">${i===0?'👑':i+1}</div>
      <div class="record-body">
        <div class="record-label">${rec.label}</div>
        <div class="record-value">${num(r[rec.field])}</div>
        <div class="record-meta">vs ${r.opponent} · ${r.game_date}${r.tournament?' · '+r.tournament:''}</div>
      </div>
      <div class="record-badge bat">${rec.emoji}</div>
    </div>
  `).join('');
  return `<div class="section-label">${rec.emoji} ${rec.label}</div><div class="record-list">${rows}</div>`;
}

// ── 연속 기록 카드 ────────────────────────────────
function renderStreakCard(sr, hitStreak){
  if(sr.id === 'hit_streak'){
    const hs = hitStreak;
    if(!hs.best) return `<div class="section-label">🔥 연속 안타</div><div class="hint" style="padding:12px 0">아직 기록 없음</div>`;
    // 최근 20경기 도트
    const recent = [...records].sort((a,b)=>b.game_date>a.game_date?1:-1).slice(0,20).reverse();
    const dots = recent.map((r,i) => {
      const hasHit = num(r.h) > 0;
      const isCur  = i >= recent.length - hs.live;
      return `<div class="streak-dot ${hasHit?'H':'X'} ${isCur&&hasHit?'cur':''}" title="${r.game_date}">${hasHit?'H':'-'}</div>`;
    }).join('');
    return `
      <div class="section-label">🔥 연속 안타</div>
      <div class="streak-card">
        <div class="streak-header">
          <div>
            <div class="streak-title">최장 연속 안타</div>
            <div class="streak-sub">${hs.bestStart} ~ ${hs.bestEnd}</div>
          </div>
          <div style="text-align:right">
            <div class="streak-value">${hs.best}<span style="font-size:16px;color:var(--muted)"> 경기</span></div>
            ${hs.live > 0 ? `<div style="font-size:11px;color:var(--win);margin-top:2px">현재 ${hs.live}경기 진행중 🔥</div>` : ''}
          </div>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px">최근 ${recent.length}경기</div>
        <div class="streak-dots">${dots}</div>
      </div>
    `;
  }
  if(sr.id === 'win_streak'){
    return `
      <div class="section-label">🏆 연속 승리</div>
      <div class="streak-card">
        <div class="streak-header">
          <div><div class="streak-title">최장 연속 승리</div></div>
          <div class="streak-value">${sr.streak.best}<span style="font-size:16px;color:var(--muted)"> 경기</span></div>
        </div>
      </div>
    `;
  }
  if(sr.id === 'ob_streak'){
    return `
      <div class="section-label">📈 연속 출루</div>
      <div class="streak-card">
        <div class="streak-header">
          <div><div class="streak-title">최장 연속 출루</div></div>
          <div class="streak-value">${sr.streak.best}<span style="font-size:16px;color:var(--muted)"> 경기</span></div>
        </div>
      </div>
    `;
  }
  return '';
}

// ── 재미 기록 카드 ────────────────────────────────
function renderFunCard(fr){
  return `
    <div class="record-card">
      <div class="record-badge fun">${fr.emoji}</div>
      <div class="record-body">
        <div class="record-label">${fr.label}</div>
        <div class="record-value" style="font-size:26px">${fr.value}</div>
        ${fr.meta ? `<div class="record-meta">${fr.meta}</div>` : ''}
      </div>
    </div>
  `;
}

// ── 메인 렌더 ────────────────────────────────────
function render(){
  const { batRecords, pitRecords, streakRecords, funRecords, hitStreak } = buildRecords();
  let html = '';

  if(currentCategory === 'all' || currentCategory === 'bat'){
    batRecords.forEach(r => { html += renderTopCard(r); });
  }
  if(currentCategory === 'all' || currentCategory === 'pit'){
    pitRecords.forEach(r => { html += renderTopCard(r); });
  }
  if(currentCategory === 'all' || currentCategory === 'streak'){
    streakRecords.forEach(sr => { html += renderStreakCard(sr, hitStreak); });
  }
  if(currentCategory === 'all' || currentCategory === 'fun'){
    html += `<div class="section-label">⭐ 재미 기록</div><div class="record-list">`;
    funRecords.forEach(fr => { html += renderFunCard(fr); });
    html += `</div>`;
  }

  el('mainContent').innerHTML = html || '<div class="hint">기록이 없어요.</div>';
}

// ── 카테고리 전환 ────────────────────────────────
window.setCategory = function(cat){
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach((btn, i) => {
    const cats = ['all','bat','pit','streak','fun'];
    btn.classList.toggle('active', cats[i] === cat);
  });
  render();
};

// ── 시트 (경기 상세) ─────────────────────────────
window.openSheet = function(r){
  el('sheetTitle').textContent = `vs ${r.opponent}`;
  el('sheetSub').textContent   = `${r.game_date}${r.tournament?' · '+r.tournament:''} · ${r.result||'D'} ${num(r.our_score)}:${num(r.opp_score)}`;
  const b = (k,v) => `<div class="sheet-box"><div class="v">${v}</div><div class="k">${k}</div></div>`;
  el('sheetGrid').innerHTML = [
    b('안타',num(r.h)), b('홈런',num(r.hr)), b('타점',num(r.rbi)), b('득점',num(r.r)),
    b('볼넷',num(r.bb)), b('삼진',num(r.so)), b('도루',num(r.sb)), b('사구',num(r.hbp)),
    b('이닝',num(r.ip).toFixed(1)), b('탈K',num(r.pk)), b('투구수',num(r.pitches)), b('최고구속',num(r.max_vel)||'-'),
    b('실책',num(r.e))
  ].join('');
  el('sheetOverlay').classList.add('open');
  el('gameSheet').classList.add('open');
  document.body.classList.add('sheet-open');
};

window.closeSheet = function(){
  el('sheetOverlay').classList.remove('open');
  el('gameSheet').classList.remove('open');
  document.body.classList.remove('sheet-open');
};

el('sheetOverlay').addEventListener('click', closeSheet);
window.addEventListener('keydown', e => { if(e.key==='Escape') closeSheet(); });

// ── 초기화 ───────────────────────────────────────
(async function init(){
  try {
    const { data:{ user }, error } = await client.auth.getUser();
    if(error || !user){ location.href = 'auth.html?next=records.html'; return; }

    const { data: player } = await client
      .from('baseball_players')
      .select('id,name,grade')
      .eq('owner_user_id', user.id)
      .limit(1).maybeSingle();

    if(!player){
      el('playerName').textContent = '등록된 선수가 없습니다.';
      el('mainContent').innerHTML  = '<div class="hint">선수 프로필을 먼저 등록해주세요.</div>';
      return;
    }

    el('playerName').textContent = `${player.name} 선수 · ${player.grade || ''}`;

    const { data } = await client
      .from('baseball_records')
      .select('*')
      .eq('player_id', player.id)
      .order('game_date', { ascending: false });

    records = data || [];

    if(!records.length){
      el('mainContent').innerHTML = '<div class="hint">등록된 경기 기록이 없어요.</div>';
      return;
    }

    render();
  } catch(e){ console.error(e); }
})();
</script>
</body>
</html>
