<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>관리자 페이지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0c10; --panel:#181c24; --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.14);
  --text:#f0f2f5; --muted:#7a8294; --brand:#e8ff47; --danger:#f87171; --ok:#4ade80;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--black);
  color:var(--text);
  min-height:100vh;
}
.header{
  position:sticky;top:0;z-index:50;
  background:rgba(10,12,16,.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.header-inner{
  max-width:760px;
  margin:0 auto;
  height:56px;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  color:var(--brand);
}
.logo span{color:var(--text)}
.top-actions{display:flex;gap:8px}
.btn{
  padding:9px 14px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--text);
  font-weight:700;
  cursor:pointer;
}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn.primary{
  background:var(--brand);
  color:#111;
  border-color:var(--brand);
}
.container{
  max-width:760px;
  margin:0 auto;
  padding:20px 16px 40px;
}
.hero{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
}
.hero h1{
  font-size:24px;
  margin-bottom:8px;
}
.hero p{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}
.msg{
  margin:14px 0;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  display:none;
}
.msg.show{display:block}
.msg.ok{background:rgba(74,222,128,.12); color:var(--ok); border:1px solid rgba(74,222,128,.25)}
.msg.err{background:rgba(248,113,113,.12); color:var(--danger); border:1px solid rgba(248,113,113,.25)}
.table-wrap{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
}
table{
  width:100%;
  border-collapse:collapse;
}
th, td{
  padding:14px 12px;
  border-bottom:1px solid var(--border);
  text-align:left;
  font-size:14px;
  vertical-align:middle;
}
th{
  color:var(--muted);
  font-size:12px;
  letter-spacing:.4px;
}
tr:last-child td{border-bottom:none}
.role-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 10px;
  border-radius:999px;
  border:1px solid var(--border2);
  font-size:12px;
  font-weight:700;
}
select{
  width:100%;
  min-width:120px;
  padding:9px 10px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:#11141a;
  color:var(--text);
}
.small{
  color:var(--muted);
  font-size:12px;
}
.empty{
  padding:28px 16px;
  text-align:center;
  color:var(--muted);
}
@media (max-width:680px){
  th:nth-child(3), td:nth-child(3){display:none}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">ELITE<span> BASEBALL</span></div>
    <div class="top-actions">
      <button class="btn" onclick="location.href='index.html'">홈</button>
      <button class="btn" onclick="logout()">로그아웃</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="hero">
    <h1>권한 관리</h1>
    <p>같은 학교 사용자 권한을 변경할 수 있습니다. 관리자만 접근 가능합니다.</p>
  </div>

  <div id="msg" class="msg"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>아이디</th>
          <th>현재 권한</th>
          <th>변경</th>
        </tr>
      </thead>
      <tbody id="userRows">
        <tr><td colspan="4" class="empty">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const client = window.sb;
const el = (id) => document.getElementById(id);

let currentSession = null;
let currentProfile = null;

function showMsg(text, type='ok'){
  const box = el('msg');
  box.className = `msg show ${type}`;
  box.textContent = text;
}

function escapeHtml(v=''){
  return String(v)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

async function logout(){
  await client.auth.signOut();
  location.href = 'index.html';
}

async function requireAdmin(){
  const { data, error } = await client.auth.getSession();
  currentSession = (!error && data?.session) || null;

  if(!currentSession){
    location.href = `auth.html?next=${encodeURIComponent('admin.html')}`;
    return false;
  }

  const { data: profile, error: pErr } = await client
    .from('baseball_profiles')
    .select('id, role, school_id, display_name, username')
    .eq('id', currentSession.user.id)
    .single();

  if(pErr || !profile){
    showMsg('내 권한 정보를 불러오지 못했습니다.', 'err');
    return false;
  }

  currentProfile = profile;

  if(profile.role !== 'admin'){
    alert('관리자만 접근할 수 있습니다.');
    location.href = 'index.html';
    return false;
  }

  return true;
}

function roleLabel(role){
  if(role === 'admin') return '관리자';
  if(role === 'recorder') return '기록원';
  return '일반회원';
}

function renderRows(list){
  const tbody = el('userRows');

  if(!Array.isArray(list) || !list.length){
    tbody.innerHTML = `<tr><td colspan="4" class="empty">사용자가 없습니다.</td></tr>`;
    return;
  }

  tbody.innerHTML = list.map(user => {
    const isMe = user.id === currentProfile.id;

    return `
      <tr>
        <td>
          <div style="font-weight:700">${escapeHtml(user.display_name || '-')}</div>
          ${isMe ? `<div class="small">내 계정</div>` : ``}
        </td>
        <td>${escapeHtml(user.username || '-')}</td>
        <td><span class="role-badge">${roleLabel(user.role)}</span></td>
        <td>
          <select data-id="${user.id}" ${isMe ? '' : ''} onchange="changeRole(this)">
            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>admin</option>
            <option value="recorder" ${user.role === 'recorder' ? 'selected' : ''}>recorder</option>
            <option value="member" ${user.role === 'member' ? 'selected' : ''}>member</option>
          </select>
        </td>
      </tr>
    `;
  }).join('');
}

async function loadUsers(){
  const { data, error } = await client.rpc('baseball_admin_list_profiles');

  if(error){
    el('userRows').innerHTML = `<tr><td colspan="4" class="empty">목록 조회 실패: ${escapeHtml(error.message)}</td></tr>`;
    return;
  }

  renderRows(data || []);
}

async function changeRole(selectEl){
  const userId = selectEl.dataset.id;
  const role = selectEl.value;
  const prev = selectEl.getAttribute('data-prev') || '';

  try{
    selectEl.disabled = true;

    const { data, error } = await client.rpc('baseball_admin_update_role', {
      p_user_id: userId,
      p_role: role
    });

    if(error) throw error;

    showMsg(`권한이 ${role} 로 변경되었습니다.`, 'ok');
    await loadUsers();
  }catch(err){
    showMsg(`권한 변경 실패: ${err.message || err}`, 'err');
    await loadUsers();
  }finally{
    selectEl.disabled = false;
  }
}

async function init(){
  const ok = await requireAdmin();
  if(!ok) return;
  await loadUsers();
}

init();
</script>
</body>
</html>
