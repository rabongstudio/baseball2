<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>관리자 권한 관리</title>

<style>
  :root{
    --bg:#f5f6f8;
    --card:#ffffff;
    --line:#e5e7eb;
    --text:#111827;
    --muted:#6b7280;
    --brand:#2563eb;
    --brand2:#1d4ed8;
    --ok:#16a34a;
    --err:#dc2626;
    --shadow:0 10px 30px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  .container{
    max-width:420px;
    margin:0 auto;
    padding:14px 14px 28px;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:6px 0 14px;
  }
  .title{
    font-size:22px;
    font-weight:900;
    letter-spacing:-.2px;
  }
  .top-actions{
    display:flex;
    gap:8px;
  }
  .btn{
    appearance:none;
    border:1px solid var(--line);
    background:#fff;
    color:var(--text);
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{
    background:var(--brand);
    border-color:var(--brand);
    color:#fff;
  }
  .hero{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
    box-shadow:var(--shadow);
    margin-bottom:12px;
  }
  .hero-title{
    font-size:18px;
    font-weight:900;
    margin-bottom:6px;
  }
  .hero-desc{
    color:var(--muted);
    font-size:13px;
    line-height:1.55;
  }
  .msg{
    display:none;
    border-radius:14px;
    padding:12px 14px;
    font-size:13px;
    line-height:1.5;
    margin-bottom:12px;
    border:1px solid transparent;
  }
  .msg.show{display:block}
  .msg.ok{
    background:#f0fdf4;
    color:var(--ok);
    border-color:#bbf7d0;
  }
  .msg.err{
    background:#fef2f2;
    color:var(--err);
    border-color:#fecaca;
  }
  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .user-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
    box-shadow:var(--shadow);
  }
  .user-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
  }
  .user-name{
    font-size:15px;
    font-weight:800;
    line-height:1.3;
  }
  .user-id{
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
    word-break:break-all;
  }
  .me-badge{
    display:inline-block;
    margin-top:6px;
    padding:4px 8px;
    border-radius:999px;
    background:#eff6ff;
    color:var(--brand);
    font-size:11px;
    font-weight:800;
  }
  .role-badge{
    flex-shrink:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:68px;
    padding:6px 10px;
    border-radius:999px;
    background:#f8fafc;
    border:1px solid var(--line);
    font-size:12px;
    font-weight:800;
    color:#334155;
  }
  .field-label{
    display:block;
    margin-bottom:6px;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
  }
  .role-row{
    display:flex;
    gap:8px;
    align-items:center;
  }
  select{
    width:100%;
    appearance:none;
    border:1px solid var(--line);
    background:#fff;
    color:var(--text);
    border-radius:12px;
    padding:12px 12px;
    font-size:14px;
    font-weight:700;
    outline:none;
  }
  select:focus{
    border-color:var(--brand);
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
  }
  .save-btn{
    flex-shrink:0;
    appearance:none;
    border:none;
    background:var(--brand);
    color:#fff;
    border-radius:12px;
    padding:12px 14px;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
  }
  .save-btn:disabled{
    opacity:.55;
    cursor:default;
  }
  .empty{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:24px 16px;
    text-align:center;
    color:var(--muted);
    font-size:14px;
  }
  .foot-note{
    margin-top:12px;
    color:var(--muted);
    font-size:12px;
    line-height:1.5;
    text-align:center;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title">권한 관리</div>
      <div class="top-actions">
        <button class="btn" onclick="location.href='index.html'">홈</button>
        <button class="btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="hero">
      <div class="hero-title">관리자 전용 페이지</div>
      <div class="hero-desc">
        같은 학교 사용자 권한을 변경할 수 있습니다.<br>
        권한은 <b>admin</b>, <b>recorder</b>, <b>member</b> 로 설정할 수 있습니다.
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <div id="userList" class="list">
      <div class="empty">불러오는 중...</div>
    </div>

    <div class="foot-note">
      마지막 관리자를 해제하지 않도록 DB 함수에서 막아두는 것을 권장합니다.
    </div>
  </div>

<script>
const client = window.sb;
const el = (id) => document.getElementById(id);

let currentSession = null;
let currentProfile = null;

function escapeHtml(v=''){
  return String(v)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

function showMsg(text, type='ok'){
  const box = el('msg');
  box.className = `msg show ${type}`;
  box.textContent = text;
}

function hideMsg(){
  const box = el('msg');
  box.className = 'msg';
  box.textContent = '';
}

function roleLabel(role){
  if(role === 'admin') return '관리자';
  if(role === 'recorder') return '기록원';
  return '일반회원';
}

async function logout(){
  await client.auth.signOut();
  location.href = 'index.html';
}

async function requireAdmin(){
  const { data, error } = await client.auth.getSession();
  currentSession = (!error && data?.session) || null;

  if(!currentSession){
    location.href = `auth.html?next=${encodeURIComponent('admin.html')}`;
    return false;
  }

  const { data: ctx, error: ctxErr } = await client.rpc('baseball_my_context');

  if(ctxErr){
    showMsg(`내 권한 정보를 불러오지 못했습니다: ${ctxErr.message}`, 'err');
    return false;
  }

  const me = Array.isArray(ctx) ? (ctx[0] || null) : ctx;

  if(!me){
    showMsg('내 사용자 정보를 찾을 수 없습니다.', 'err');
    return false;
  }

  currentProfile = me;

  if(me.role !== 'admin'){
    alert('관리자만 접근할 수 있습니다.');
    location.href = 'index.html';
    return false;
  }

  return true;
}

function renderRows(list){
  const wrap = el('userList');

  if(!Array.isArray(list) || !list.length){
    wrap.innerHTML = `<div class="empty">사용자가 없습니다.</div>`;
    return;
  }

  wrap.innerHTML = list.map(user => {
    const isMe = user.id === currentProfile.user_id || user.id === currentProfile.id;
    const safeName = escapeHtml(user.display_name || '-');
    const safeUsername = escapeHtml(user.username || '-');
    const safeRole = escapeHtml(user.role || 'member');

    return `
      <div class="user-card">
        <div class="user-top">
          <div>
            <div class="user-name">${safeName}</div>
            <div class="user-id">${safeUsername}</div>
            ${isMe ? `<div class="me-badge">내 계정</div>` : ``}
          </div>
          <div class="role-badge">${roleLabel(safeRole)}</div>
        </div>

        <label class="field-label">권한 변경</label>
        <div class="role-row">
          <select id="role_${user.id}">
            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>admin</option>
            <option value="recorder" ${user.role === 'recorder' ? 'selected' : ''}>recorder</option>
            <option value="member" ${user.role === 'member' ? 'selected' : ''}>member</option>
          </select>
          <button class="save-btn" onclick="changeRole('${user.id}', '${safeRole}')">저장</button>
        </div>
      </div>
    `;
  }).join('');
}

async function loadUsers(){
  hideMsg();

  const { data, error } = await client.rpc('baseball_admin_list_profiles');

  if(error){
    el('userList').innerHTML = `<div class="empty">목록 조회 실패: ${escapeHtml(error.message)}</div>`;
    return;
  }

  renderRows(data || []);
}

async function changeRole(userId, oldRole){
  hideMsg();

  const selectEl = document.getElementById(`role_${userId}`);
  if(!selectEl) return;

  const newRole = selectEl.value;
  if(newRole === oldRole){
    showMsg('변경된 내용이 없습니다.', 'ok');
    return;
  }

  const btn = selectEl.parentElement.querySelector('.save-btn');

  try{
    selectEl.disabled = true;
    if(btn) btn.disabled = true;

    const { error } = await client.rpc('baseball_admin_update_role', {
      p_user_id: userId,
      p_role: newRole
    });

    if(error) throw error;

    showMsg(`권한이 ${newRole} 로 변경되었습니다.`, 'ok');
    await loadUsers();
  }catch(err){
    showMsg(`권한 변경 실패: ${err.message || err}`, 'err');
    await loadUsers();
  }finally{
    selectEl.disabled = false;
    if(btn) btn.disabled = false;
  }
}

async function init(){
  const ok = await requireAdmin();
  if(!ok) return;
  await loadUsers();
}

init();
</script>
</body>
</html>
