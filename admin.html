<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>관리자 권한 관리</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --black:#0a0c10; --dark:#11141a; --panel:#181c24;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#f0f2f5; --muted:#7a8294;
  --brand:#e8ff47;
  --ok:#4ade80; --err:#f87171;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--black);
  color:var(--text);
}

.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,12,16,.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}

.header-inner{
  max-width:480px;
  margin:0 auto;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}

.logo{
  font-family:'Bebas Neue';
  font-size:28px;
  color:var(--brand);
}
.logo span{color:var(--text)}

.top-actions{
  display:flex;
  gap:8px;
}

.auth-btn{
  padding:7px 16px;
  border-radius:8px;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--text);
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}

.container{
  max-width:480px;
  margin:0 auto;
  padding:20px 16px;
}

.hero{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
}

.hero-title{
  font-size:24px;
  font-weight:900;
  margin-bottom:6px;
}

.hero-sub{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

.user-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.user-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
}

.user-line{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}

.nick{
  font-size:15px;
  font-weight:800;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.role-chip{
  flex-shrink:0;
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--border2);
}

.role-row{
  display:flex;
  gap:8px;
}

select{
  flex:1;
  border-radius:12px;
  border:1px solid var(--border2);
  background:var(--dark);
  color:var(--text);
  padding:12px;
  font-size:14px;
  font-weight:700;
}

.save-btn{
  padding:12px 14px;
  border:none;
  border-radius:12px;
  background:var(--brand);
  color:#000;
  font-weight:800;
  cursor:pointer;
}

.save-btn:disabled,
select:disabled{
  opacity:.6;
  cursor:default;
}

.msg{
  display:none;
  margin-bottom:12px;
  padding:12px;
  border-radius:12px;
  font-size:13px;
}
.msg.show{display:block}
.msg.ok{background:rgba(74,222,128,.1);color:var(--ok)}
.msg.err{background:rgba(248,113,113,.1);color:var(--err)}

.empty{
  text-align:center;
  padding:30px;
  color:var(--muted);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">ELITE<span> BASEBALL</span></div>
    <div class="top-actions">
      <button class="auth-btn" onclick="location.href='index.html'">홈</button>
      <button class="auth-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="hero">
    <div class="hero-title">권한 관리</div>
    <div class="hero-sub">
      닉네임 기준으로 권한을 변경합니다.<br>
      admin 권한은 한 명만 유지됩니다.
    </div>
  </div>

  <div id="msg" class="msg"></div>

  <div id="userList" class="user-list">
    <div class="empty">불러오는 중...</div>
  </div>
</div>

<script>
const client = window.sb;
const el = (id)=>document.getElementById(id);

let currentSession = null;
let currentProfile = null;
let currentUsers = [];

function escapeHtml(v=''){
  return String(v)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

function showMsg(text,type='ok'){
  const box = el('msg');
  box.className = `msg show ${type}`;
  box.textContent = text;
}

function hideMsg(){
  const box = el('msg');
  box.className = 'msg';
  box.textContent = '';
}

function roleLabel(role){
  if(role === 'admin') return '관리자';
  if(role === 'recorder') return '기록원';
  return '일반회원';
}

async function logout(){
  await client.auth.signOut();
  location.href = 'index.html';
}

async function requireAdmin(){
  const {data,error} = await client.auth.getSession();
  currentSession = (!error && data?.session) || null;

  if(!currentSession){
    location.href = 'auth.html?next=' + encodeURIComponent('admin.html');
    return false;
  }

  const {data:ctx,error:ctxError} = await client.rpc('baseball_my_context');
  if(ctxError){
    showMsg('내 권한 정보를 불러오지 못했습니다.', 'err');
    return false;
  }

  const me = Array.isArray(ctx) ? ctx[0] : ctx;
  if(!me || me.role !== 'admin'){
    alert('관리자만 접근할 수 있습니다.');
    location.href = 'index.html';
    return false;
  }

  currentProfile = me;
  return true;
}

function renderRows(list){
  const wrap = el('userList');

  if(!list?.length){
    wrap.innerHTML = '<div class="empty">사용자 없음</div>';
    return;
  }

  wrap.innerHTML = list.map(user => `
    <div class="user-card">
      <div class="user-line">
        <div class="nick">${escapeHtml(user.display_name || '-')}</div>
        <div class="role-chip">${roleLabel(user.role)}</div>
      </div>

      <div class="role-row">
        <select id="role_${user.id}">
          <option value="admin" ${user.role==='admin'?'selected':''}>admin</option>
          <option value="recorder" ${user.role==='recorder'?'selected':''}>recorder</option>
          <option value="member" ${user.role==='member'?'selected':''}>member</option>
        </select>
        <button class="save-btn" onclick="changeRole('${user.id}','${user.role}')">저장</button>
      </div>
    </div>
  `).join('');
}

async function loadUsers(){
  hideMsg();

  const {data,error} = await client.rpc('baseball_admin_list_profiles');
  if(error){
    el('userList').innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
    return;
  }

  currentUsers = Array.isArray(data) ? data : [];
  renderRows(currentUsers);
}

async function changeRole(id, oldRole){
  hideMsg();

  const select = document.getElementById(`role_${id}`);
  if(!select) return;

  const newRole = select.value;

  if(newRole === oldRole){
    showMsg('변경 없음');
    return;
  }

  const targetUser = currentUsers.find(u => String(u.id) === String(id));
  const currentAdmin = currentUsers.find(u => u.role === 'admin');

  if(newRole === 'admin' && currentAdmin && String(currentAdmin.id) !== String(id)){
    const ok = confirm('admin은 1명만 될 수 있습니다. 변경하시겠습니까?');
    if(!ok){
      select.value = oldRole;
      return;
    }
  }

  const btn = select.parentElement.querySelector('.save-btn');

  try{
    select.disabled = true;
    if(btn) btn.disabled = true;

    const {error} = await client.rpc('baseball_admin_update_role',{
      p_user_id: id,
      p_role: newRole
    });

    if(error) throw error;

    if(newRole === 'admin' && currentAdmin && String(currentAdmin.id) !== String(id)){
      showMsg(`관리자가 ${targetUser?.display_name || '선택한 사용자'}(으)로 변경되었습니다.`);
    }else{
      showMsg('권한 변경 완료');
    }

    await loadUsers();
  }catch(error){
    showMsg(error.message || '권한 변경 실패', 'err');
    select.value = oldRole;
  }finally{
    select.disabled = false;
    if(btn) btn.disabled = false;
  }
}

async function init(){
  const ok = await requireAdmin();
  if(!ok) return;
  await loadUsers();
}

init();
</script>

</body>
</html>
