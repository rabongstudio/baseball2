<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>관리자 통계 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0c10; --panel:#181c24; --panel2:#202532;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#f0f2f5; --muted:#7a8294; --muted2:#4a5060;
  --brand:#e8ff47; --ok:#4ade80; --ok-bg:rgba(74,222,128,.1);
  --err:#f87171; --err-bg:rgba(248,113,113,.1);
  --same:#94a3b8; --same-bg:rgba(148,163,184,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}
.container{max-width:480px;margin:0 auto;padding:20px 16px}
.hero{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'📊';position:absolute;right:-10px;top:-10px;font-size:100px;opacity:.04;transform:rotate(15deg)}
.hero-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;margin-bottom:8px}
.hero-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.hero-btns{display:flex;gap:10px}
.hero-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.hero-btn.solid{background:var(--brand);color:var(--black)}
.hero-btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}

.tabbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.tab-btn{border:1px solid var(--border);background:var(--panel);color:var(--muted);padding:13px 10px;border-radius:14px;font-weight:900;cursor:pointer}
.tab-btn.active{background:var(--brand);color:#0a0c10;border-color:transparent}

.section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:24px 0 12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}
.stat-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:6px}
.stat-delta{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 10px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid var(--border)}
.stat-delta.up{background:var(--ok-bg);color:var(--ok)}
.stat-delta.down{background:var(--err-bg);color:var(--err)}
.stat-delta.same{background:var(--same-bg);color:var(--same)}

.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.category-card{background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:14px}
.category-name{font-size:12px;color:var(--muted);font-weight:800}
.category-count{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;margin-top:6px}
.category-diff{margin-top:8px;font-size:11px;font-weight:800}
.category-diff.up{color:var(--ok)}
.category-diff.down{color:var(--err)}
.category-diff.same{color:#cbd5e1}

.chart-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:800;color:var(--text)}
.chart-sub{font-size:11px;color:var(--muted);margin-top:4px}
.bar-chart-wrap{margin-top:14px;height:220px;display:flex;align-items:flex-end;gap:6px;overflow-x:auto;padding-bottom:8px}
.bar-col{min-width:24px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:8px}
.bar-num{font-size:10px;color:#dfe4ea;font-weight:800}
.bar{width:100%;min-height:4px;border-radius:8px 8px 0 0;background:linear-gradient(180deg,var(--brand) 0%, #b9cf32 100%)}
.bar-date{font-size:9px;color:var(--muted);writing-mode:vertical-rl;text-orientation:mixed;height:56px}

.rank-list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.rank-item{display:grid;grid-template-columns:36px 1fr 56px;gap:10px;align-items:center}
.rank-num{font-weight:900;color:#cbd5e1}
.rank-num.top3{color:var(--brand)}
.rank-name{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar-bg{margin-top:6px;height:10px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.rank-bar{height:100%;background:linear-gradient(90deg,#e8ff47 0%, #b9cf32 100%);border-radius:999px}
.rank-count{text-align:right;font-weight:900}

.table-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px}
.table-head,.table-row{display:grid;align-items:center}
.table-head{background:#141821;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:800}
.table-head>div,.table-row>div{padding:12px 8px;text-align:center;white-space:nowrap}
.table-row{font-size:11px;border-bottom:1px solid rgba(255,255,255,.05)}
.table-row:last-child{border-bottom:none}
.left{text-align:left !important}

.empty{text-align:center;padding:32px 0;color:var(--muted);font-size:13px;line-height:1.6}
.empty-icon{font-size:32px;margin-bottom:10px}
.msg{font-size:13px;color:var(--muted);line-height:1.6}
.msg.err{color:var(--err)}
.loading-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px}
.loading{display:inline-flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--brand);box-shadow:0 0 18px var(--brand);animation:blink 1s infinite alternate}
.hidden{display:none}
@keyframes blink{from{opacity:.35;transform:scale(.9)}to{opacity:1;transform:scale(1.1)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/header.js"></script>
</head>
<body>
<div id="appHeader" data-auth="true"></div>

<div class="container">
  <div class="hero">
    <div class="hero-label">엘리트 야구 기록 시스템</div>
    <div class="hero-title">관리자 통계<br>대시보드</div>
    <div class="hero-sub">가입자 통계와 게임 등록 통계를 탭으로 나눠 확인합니다.</div>
    <div class="hero-btns">
      <button class="hero-btn solid" id="btnRefresh">새로고침</button>
      <button class="hero-btn ghost" onclick="location.href='index.html'">홈으로</button>
    </div>
  </div>

  <div class="tabbar">
    <button class="tab-btn active" data-tab="signup">가입자</button>
    <button class="tab-btn" data-tab="games">게임등록수</button>
  </div>

  <div id="dashboardApp">
    <div class="loading-card">
      <div class="loading"><span class="dot"></span><span>불러오는 중...</span></div>
    </div>
  </div>
</div>

<script>
const client = window.sb;
const el = (id) => document.getElementById(id);
let activeTab = 'signup';

function escapeHtml(v=''){
  return String(v).replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}
function deltaClass(n){ return n > 0 ? 'up' : n < 0 ? 'down' : 'same'; }
function deltaArrow(n){ return n > 0 ? '▲' : n < 0 ? '▼' : '•'; }
function deltaText(n){
  if (n > 0) return `어제 대비 +${n}개`;
  if (n < 0) return `어제 대비 ${n}개`;
  return '어제 대비 변동 없음';
}
function deltaTextUsers(n){
  if (n > 0) return `어제 대비 +${n}명`;
  if (n < 0) return `어제 대비 ${n}명`;
  return '어제 대비 변동 없음';
}
function readCache(){
  try{
    const raw = localStorage.getItem('baseball_admin_overview_cache_v1');
    if(!raw) return null;
    const cached = JSON.parse(raw);
    if(!cached?.at || !cached?.data) return null;
    if(Date.now() - cached.at > 15000) return null;
    return cached.data;
  }catch(e){ return null; }
}
function writeCache(data){
  try{
    localStorage.setItem('baseball_admin_overview_cache_v1', JSON.stringify({ at: Date.now(), data }));
  }catch(e){}
}

function barChartHtml(title, sub, daily=[]){
  const max = Math.max(...daily.map(x => Number(x.total || 0)), 1);
  return `
    <div class="chart-card">
      <div class="chart-title">${title}</div>
      <div class="chart-sub">${sub}</div>
      <div class="bar-chart-wrap">
        ${daily.map(d => {
          const total = Number(d.total || 0);
          const h = Math.max(4, Math.round((total / max) * 170));
          return `
            <div class="bar-col" title="${escapeHtml(d.date)} / ${total}">
              <div class="bar-num">${total}</div>
              <div class="bar" style="height:${h}px"></div>
              <div class="bar-date">${escapeHtml(String(d.date).slice(5))}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function cumulativeLineHtml(title, sub, daily=[]){
  const values = daily.map(d => Number(d.cumulative_total || 0));
  const width = Math.max(640, daily.length * 28);
  const height = 220;
  const padL = 34, padR = 10, padT = 14, padB = 26;
  const innerW = width - padL - padR;
  const innerH = height - padT - padB;
  const max = Math.max(...values, 1);

  const points = daily.map((d, i) => {
    const x = padL + (daily.length === 1 ? innerW / 2 : (i * innerW / (daily.length - 1)));
    const y = padT + innerH - ((Number(d.cumulative_total || 0) / max) * innerH);
    return { x, y, label: d.date, value: Number(d.cumulative_total || 0) };
  });

  const polyline = points.map(p => `${p.x},${p.y}`).join(' ');
  const area = points.length
    ? `M ${padL} ${padT + innerH} L ${points.map(p => `${p.x} ${p.y}`).join(' L ')} L ${padL + innerW} ${padT + innerH} Z`
    : '';

  const grid = Array.from({length:5}, (_, i) => {
    const y = padT + (innerH * i / 4);
    const v = Math.round(max * (4 - i) / 4);
    return `
      <line x1="${padL}" y1="${y}" x2="${padL + innerW}" y2="${y}" stroke="rgba(255,255,255,.08)" stroke-width="1"></line>
      <text x="${padL - 6}" y="${y + 4}" text-anchor="end" font-size="10" fill="#7a8294">${v}</text>
    `;
  }).join('');

  const dots = points.map(p => `
    <g>
      <circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#e8ff47"></circle>
      <title>${p.label} / 누적 ${p.value}</title>
    </g>
  `).join('');

  const labels = points.map((p, i) => {
    if (daily.length > 12 && i % Math.ceil(daily.length / 8) !== 0 && i !== daily.length - 1) return '';
    return `<text x="${p.x}" y="${height - 8}" text-anchor="middle" font-size="10" fill="#7a8294">${String(p.label).slice(5)}</text>`;
  }).join('');

  return `
    <div class="chart-card">
      <div class="chart-title">${title}</div>
      <div class="chart-sub">${sub}</div>
      <div style="overflow-x:auto;margin-top:12px">
        <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
          ${grid}
          ${area ? `<path d="${area}" fill="rgba(232,255,71,.10)"></path>` : ''}
          ${polyline ? `<polyline points="${polyline}" fill="none" stroke="#e8ff47" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>` : ''}
          ${dots}
          ${labels}
        </svg>
      </div>
    </div>
  `;
}

function rankCardHtml(title, sub, items=[], keyName='school_name'){
  if(!items.length){
    return `<div class="chart-card"><div class="chart-title">${title}</div><div class="empty">표시할 데이터가 없습니다.</div></div>`;
  }
  const max = Math.max(...items.map(x => Number(x.count || 0)), 1);
  return `
    <div class="chart-card">
      <div class="chart-title">${title}</div>
      <div class="chart-sub">${sub}</div>
      <div class="rank-list">
        ${items.map((item, idx) => {
          const count = Number(item.count || 0);
          const w = Math.max(6, Math.round((count / max) * 100));
          return `
            <div class="rank-item">
              <div class="rank-num ${idx < 3 ? 'top3' : ''}">#${idx + 1}</div>
              <div>
                <div class="rank-name">${escapeHtml(item[keyName] || '-')}</div>
                <div class="rank-bar-bg"><div class="rank-bar" style="width:${w}%"></div></div>
              </div>
              <div class="rank-count">${count}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function monthlyStatsHtml(title, sub, monthly=[]){
  if(!monthly.length){
    return `<div class="chart-card"><div class="chart-title">${title}</div><div class="empty">표시할 데이터가 없습니다.</div></div>`;
  }
  const max = Math.max(...monthly.map(x => Number(x.total || 0)), 1);
  return `
    <div class="chart-card">
      <div class="chart-title">${title}</div>
      <div class="chart-sub">${sub}</div>
      <div class="rank-list">
        ${monthly.map(m => {
          const total = Number(m.total || 0);
          const w = Math.max(6, Math.round((total / max) * 100));
          return `
            <div class="rank-item" style="grid-template-columns:70px 1fr 56px;">
              <div class="rank-num" style="color:#f0f2f5">${escapeHtml(m.month)}</div>
              <div><div class="rank-bar-bg"><div class="rank-bar" style="width:${w}%"></div></div></div>
              <div class="rank-count">${total}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function detailTableHtml(title, daily=[]){
  if(!daily.length){
    return `<div class="table-card"><div class="empty">표시할 데이터가 없습니다.</div></div>`;
  }
  return `
    <div class="section-title">${title}</div>
    <div class="table-card">
      <div class="table-head" style="grid-template-columns:86px 44px 44px 44px 44px 44px 44px 58px;">
        <div class="left">날짜</div><div>전체</div><div>대학</div><div>고등</div><div>중학</div><div>초등</div><div>리틀</div><div>누적</div>
      </div>
      ${[...daily].reverse().map(d => `
        <div class="table-row" style="grid-template-columns:86px 44px 44px 44px 44px 44px 44px 58px;">
          <div class="left">${escapeHtml(d.date)}</div>
          <div>${Number(d.total||0)}</div>
          <div>${Number(d.college||0)}</div>
          <div>${Number(d.high||0)}</div>
          <div>${Number(d.middle||0)}</div>
          <div>${Number(d.elementary||0)}</div>
          <div>${Number(d.little||0)}</div>
          <div>${Number(d.cumulative_total||0)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderTab(data, kind){
  const summary = data?.summary || {};
  const diff = data?.diff || {};
  const daily = Array.isArray(data?.daily) ? data.daily : [];
  const monthly = Array.isArray(data?.monthly) ? data.monthly : [];
  const totalDelta = Number(diff.vs_yesterday_total || 0);
  const noun = kind === 'signup' ? '명' : '개';
  const diffText = kind === 'signup' ? deltaTextUsers(totalDelta) : deltaText(totalDelta);
  const schoolTop = Array.isArray(data?.school_top10) ? data.school_top10 : [];
  const playerTop = Array.isArray(data?.player_top10) ? data.player_top10 : [];

  return `
    <div class="section-title">${kind === 'signup' ? '가입자 요약' : '게임등록 요약'}</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">${kind === 'signup' ? '총 가입자' : '총 게임 등록수'}</div>
        <div class="stat-value">${Number(summary.total || 0)}</div>
        <div class="stat-sub">전체 누적 ${kind === 'signup' ? '회원' : '등록'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${kind === 'signup' ? '오늘 가입자' : '오늘 게임 등록수'}</div>
        <div class="stat-value">${Number(diff.today_total || 0)}</div>
        <div class="stat-sub">어제 ${Number(diff.yesterday_total || 0)}${noun}</div>
        <div class="stat-delta ${deltaClass(totalDelta)}">
          <span>${deltaArrow(totalDelta)}</span>
          <span>${escapeHtml(diffText)}</span>
        </div>
      </div>
    </div>

    <div class="section-title">${kind === 'signup' ? '학교급별 가입자' : '학교급별 게임등록수'}</div>
    <div class="category-grid">
      <div class="category-card">
        <div class="category-name">대학교</div>
        <div class="category-count">${Number(summary.college || 0)}</div>
        <div class="category-diff ${deltaClass(Number(diff.vs_yesterday_college || 0))}">
          ${escapeHtml((kind === 'signup' ? deltaTextUsers : deltaText)(Number(diff.vs_yesterday_college || 0)))}
        </div>
      </div>
      <div class="category-card">
        <div class="category-name">고등학교</div>
        <div class="category-count">${Number(summary.high || 0)}</div>
        <div class="category-diff ${deltaClass(Number(diff.vs_yesterday_high || 0))}">
          ${escapeHtml((kind === 'signup' ? deltaTextUsers : deltaText)(Number(diff.vs_yesterday_high || 0)))}
        </div>
      </div>
      <div class="category-card">
        <div class="category-name">중학교</div>
        <div class="category-count">${Number(summary.middle || 0)}</div>
        <div class="category-diff ${deltaClass(Number(diff.vs_yesterday_middle || 0))}">
          ${escapeHtml((kind === 'signup' ? deltaTextUsers : deltaText)(Number(diff.vs_yesterday_middle || 0)))}
        </div>
      </div>
      <div class="category-card">
        <div class="category-name">초등학교</div>
        <div class="category-count">${Number(summary.elementary || 0)}</div>
        <div class="category-diff ${deltaClass(Number(diff.vs_yesterday_elementary || 0))}">
          ${escapeHtml((kind === 'signup' ? deltaTextUsers : deltaText)(Number(diff.vs_yesterday_elementary || 0)))}
        </div>
      </div>
      <div class="category-card">
        <div class="category-name">리틀</div>
        <div class="category-count">${Number(summary.little || 0)}</div>
        <div class="category-diff ${deltaClass(Number(diff.vs_yesterday_little || 0))}">
          ${escapeHtml((kind === 'signup' ? deltaTextUsers : deltaText)(Number(diff.vs_yesterday_little || 0)))}
        </div>
      </div>
    </div>

    ${kind === 'signup' ? `
      <div class="section-title">학교 TOP 10</div>
      ${rankCardHtml('학교별 가입자 TOP 10', '가입자 수 많은 순', schoolTop, 'school_name')}
    ` : `
      <div class="section-title">TOP 10</div>
      ${rankCardHtml('학교별 게임 등록 TOP 10', '등록 많은 순', schoolTop, 'school_name')}
      ${rankCardHtml('선수별 게임 기록 TOP 10', '기록 건수 많은 순', playerTop, 'player_name')}
    `}

    <div class="section-title">추이 그래프</div>
    ${barChartHtml(kind === 'signup' ? '일별 가입자 통계' : '일별 게임 등록 통계', `전체 기간 (${daily.length}일)`, daily)}
    ${cumulativeLineHtml(kind === 'signup' ? '누적 가입자 추이' : '누적 게임등록 추이', '전체 기간 누적', daily)}

    <div class="section-title">월별 통계</div>
    ${monthlyStatsHtml(kind === 'signup' ? '월별 가입자 통계' : '월별 게임 등록 통계', `최근 ${monthly.length}개월`, monthly)}

    ${detailTableHtml(kind === 'signup' ? '일별 가입자 상세' : '일별 게임 등록 상세', daily)}
  `;
}

function renderError(msg){
  el('dashboardApp').innerHTML = `<div class="loading-card"><div class="msg err">불러오기 실패: ${escapeHtml(msg || '알 수 없는 오류')}</div></div>`;
}
function renderNoAccess(){
  el('dashboardApp').innerHTML = `<div class="empty"><div class="empty-icon">⛔</div>관리자만 접근할 수 있습니다.</div>`;
}
function renderDashboard(payload){
  const signupHtml = renderTab(payload?.signup || {}, 'signup');
  const gameHtml = renderTab(payload?.games || {}, 'games');
  el('dashboardApp').innerHTML = `
    <div id="tab-signup" class="${activeTab === 'signup' ? '' : 'hidden'}">${signupHtml}</div>
    <div id="tab-games" class="${activeTab === 'games' ? '' : 'hidden'}">${gameHtml}</div>
  `;
}

async function requireAdmin(){
  const { data: authData } = await client.auth.getUser();
  const user = authData?.user;
  if (!user) {
    location.href = `auth.html?next=${encodeURIComponent('admin-overview.html')}`;
    return false;
  }
  const { data, error } = await client.rpc('baseball_is_admin_home');
  if (error) throw error;
  if (!data) {
    renderNoAccess();
    return false;
  }
  return true;
}

async function loadDashboard(){
  const cached = readCache();
  if (cached) renderDashboard(cached);
  else el('dashboardApp').innerHTML = `<div class="loading-card"><div class="loading"><span class="dot"></span><span>불러오는 중...</span></div></div>`;

  const { data, error } = await client.rpc('baseball_admin_overview_dashboard_home', { p_months: 12 });
  if (error) throw error;

  const payload = Array.isArray(data) ? (data[0] || {}) : (data || {});
  writeCache(payload);
  renderDashboard(payload);
}

async function init(){
  try{
    if (!client?.auth) {
      renderError('Supabase 설정을 확인하세요.');
      return;
    }
    let waited = 0;
    while (window._headerSession === undefined && waited < 2000) {
      await new Promise(r => setTimeout(r, 50));
      waited += 50;
    }
    const ok = await requireAdmin();
    if (!ok) return;
    await loadDashboard();
  }catch(e){
    console.error('[ADMIN OVERVIEW INIT ERROR]', e);
    renderError(e?.message || '알 수 없는 오류');
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    const a = document.getElementById('tab-signup');
    const b = document.getElementById('tab-games');
    if (a && b) {
      a.classList.toggle('hidden', activeTab !== 'signup');
      b.classList.toggle('hidden', activeTab !== 'games');
    }
  });
});

el('btnRefresh').addEventListener('click', async () => {
  try { localStorage.removeItem('baseball_admin_overview_cache_v1'); } catch(e){}
  try { await loadDashboard(); } catch(err){ renderError(err?.message || '알 수 없는 오류'); }
});

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
