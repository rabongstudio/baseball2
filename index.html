<style>
:root { --black:#0a0c10; --dark:#11141a; --panel:#181c24; --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12); --text:#f0f2f5; --muted:#7a8294; --muted2:#4a5060; --brand:#e8ff47; --brand-dim:rgba(232,255,71,.12); --win:#4ade80; --win-bg:rgba(74,222,128,.1); --loss:#f87171; --loss-bg:rgba(248,113,113,.1); --draw:#94a3b8; --draw-bg:rgba(148,163,184,.1); }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}
.container{max-width:480px;margin:0 auto;padding:20px 16px}
.hero{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'⚾';position:absolute;right:-10px;top:-10px;font-size:100px;opacity:.04;transform:rotate(20deg)}
.hero-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;margin-bottom:8px}
.hero-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.hero-btns{display:flex;gap:10px}
.hero-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.hero-btn.solid{background:var(--brand);color:var(--black)}
.hero-btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:24px 0 12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}
.stat-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:6px}

/* 바로가기 4열 그리드 */
.shortcut-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.shortcut-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:border-color .15s}
.shortcut-card:hover{border-color:var(--brand)}
.shortcut-emoji{font-size:22px;line-height:1}
.shortcut-name{font-size:10px;font-weight:700;text-align:center;color:var(--text);line-height:1.3;word-break:keep-all}

.recent-list{display:flex;flex-direction:column;gap:8px}
.game-item{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.game-item:hover{border-color:var(--border2)}
.result-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0}
.result-badge.W{background:var(--win-bg);color:var(--win)}
.result-badge.L{background:var(--loss-bg);color:var(--loss)}
.result-badge.D{background:var(--draw-bg);color:var(--draw)}
.game-info{flex:1;min-width:0}
.game-vs{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-meta{font-size:12px;color:var(--muted);margin-top:3px}
.game-score{font-family:'Bebas Neue',sans-serif;font-size:22px;flex-shrink:0}
.empty{text-align:center;padding:32px 0;color:var(--muted);font-size:13px;line-height:1.6}
.empty-icon{font-size:32px;margin-bottom:10px}
.view-all{width:100%;margin-top:10px;padding:13px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="container">

    <!--<div class="hero-sub"> 경기와 선수 기록을 직접 관리합니다.</div>-->
    <div class="hero-btns">
      <button class="hero-btn solid" onclick="goProtected('playerreport.html')">경기 리포트</button>
      <button class="hero-btn ghost" onclick="goProtected('createGame.html')">기록 입력</button>
    </div>
  </div>

  <div class="section-title">시즌 요약</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">올해 승 · 패 · 무</div>
      <div class="stat-value" id="yWLD" style="font-size:26px">—</div>
      <div class="stat-sub" id="yearLabel">로그인 후 표시</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">이번달 승 · 패 · 무</div>
      <div class="stat-value" id="mWLD" style="font-size:26px">—</div>
      <div class="stat-sub" id="monthLabel">로그인 후 표시</div>
    </div>
  </div>

  <div class="section-title">최근 경기</div>
  <div id="recentHint" class="empty" style="display:none"></div>
  <div class="recent-list" id="recentList"></div>
  <button class="view-all" id="btnViewAll" onclick="goProtected('report.html')" style="display:none">전체 경기 보기</button>

  <div class="section-title">바로가기</div>
  <div class="shortcut-grid">
    <div class="shortcut-card" onclick="goProtected('createGame.html')">
      <div class="shortcut-emoji">✍️</div>
      <div class="shortcut-name">기록 입력</div>
    </div>
    <div class="shortcut-card" onclick="goProtected('playerreport.html')">
      <div class="shortcut-emoji">📋</div>
      <div class="shortcut-name">경기 리포트</div>
    </div>
    <div class="shortcut-card" onclick="goProtected('growth.html')">
      <div class="shortcut-emoji">📏</div>
      <div class="shortcut-name">성장 관리</div>
    </div>
    <div class="shortcut-card" onclick="goProtected('stats.html')">
      <div class="shortcut-emoji">📈</div>
      <div class="shortcut-name">성적 분석</div>
    </div>
    <div class="shortcut-card" onclick="goProtected('records.html')">

      <div class="shortcut-name">최고기록관</div>
    </div>
    <div class="shortcut-card" onclick="goProtected('training.html')">
      <div class="shortcut-emoji">💪</div>
      <div class="shortcut-name">훈련 일지</div>
    </div>
    <div class="shortcut-card" onclick="goProtected('createPlayer.html')">
      <div class="shortcut-emoji">👤</div>
      <div class="shortcut-name">선수 관리</div>
    </div>
  </div>
</div>

<script>
const client = window.sb;
const el = (id) => document.getElementById(id);

function goProtected(path) {
  if (!window._headerSession) {
    location.href = `auth.html?next=${encodeURIComponent(path)}`;
    return;
  }
  location.href = path;
}

function badgeClass(r) { return r === 'W' ? 'W' : r === 'L' ? 'L' : 'D'; }

function renderGuestHome() {
  el('yWLD').textContent = '—'; el('yearLabel').textContent = '로그인 후 표시';
  el('mWLD').textContent = '—'; el('monthLabel').textContent = '로그인 후 표시';
  el('recentHint').style.display = 'block';
  el('recentHint').innerHTML = `<div class="empty-icon">⚾</div>로그인하면 최근 경기 목록을<br>확인할 수 있어요.`;
  el('recentList').innerHTML = '';
  el('btnViewAll').style.display = 'none';
}

function renderSummary(summary) {
  el('yWLD').textContent = `${Number(summary?.year_w||0)}·${Number(summary?.year_l||0)}·${Number(summary?.year_d||0)}`;
  el('yearLabel').textContent = `${summary?.year || '-'}년 기준`;
  el('mWLD').textContent = `${Number(summary?.month_w||0)}·${Number(summary?.month_l||0)}·${Number(summary?.month_d||0)}`;
  el('monthLabel').textContent = `${summary?.month || '-'} 기준`;
}

function renderRecentGames(list) {
  const hint = el('recentHint'), wrap = el('recentList'), btn = el('btnViewAll');
  wrap.innerHTML = '';
  if (!Array.isArray(list) || !list.length) {
    hint.style.display = 'block';
    hint.innerHTML = `<div class="empty-icon">⚾</div>등록된 경기가 없어요.`;
    btn.style.display = 'none';
    return;
  }
  hint.style.display = 'none';
  btn.style.display = 'block';
  list.forEach(g => {
    const item = document.createElement('div');
    item.className = 'game-item';
    item.innerHTML = `
      <div class="result-badge ${badgeClass(g.result||'D')}">${g.result||'D'}</div>
      <div class="game-info">
        <div class="game-vs">vs ${g.opponent||'-'}</div>
        <div class="game-meta">${g.game_date||''}${g.tournament ? ' · ' + g.tournament : ''}</div>
      </div>
      <div class="game-score">${Number(g.our_score||0)}<span style="color:var(--muted);font-size:16px">:</span>${Number(g.opp_score||0)}</div>
    `;
    item.onclick = () => location.href = `report.html?game=${g.id}`;
    wrap.appendChild(item);
  });
}

function readCache() {
  try {
    const raw = localStorage.getItem('baseball_home_cache_v4');
    if (!raw) return null;
    const cached = JSON.parse(raw);
    if (!cached?.at || !cached?.data) return null;
    if (Date.now() - cached.at > 15000) return null;
    return cached.data;
  } catch(e) { return null; }
}

function writeCache(data) {
  try { localStorage.setItem('baseball_home_cache_v4', JSON.stringify({at: Date.now(), data})); } catch(e) {}
}

async function loadDashboard() {
  const cached = readCache();
  if (cached?.summary) renderSummary(cached.summary);
  if (cached?.recent) renderRecentGames(cached.recent);

  const [sRes, rRes] = await Promise.all([
    client.rpc('baseball_dashboard_summary_home'),
    client.rpc('baseball_record_list_recent_home')
  ]);

  if (!sRes.error) {
    const summary = Array.isArray(sRes.data) ? (sRes.data[0] || null) : sRes.data;
    if (summary) renderSummary(summary);
    const current = readCache() || {};
    writeCache({ summary, recent: current.recent || [] });
  }
  if (!rRes.error) {
    const recent = Array.isArray(rRes.data) ? rRes.data : [];
    renderRecentGames(recent);
    const current = readCache() || {};
    writeCache({ summary: current.summary || null, recent });
  }
}
  // 계좌 복사 + 토스트
function copyAccount(){
  const account = '1000-6029-7721';
  const copy = () => {
    let t = document.getElementById('_copyToast');
    if(!t){
      t = document.createElement('div');
      t.id = '_copyToast';
      t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#181c24;border:1px solid #4ade80;border-radius:14px;padding:12px 22px;font-size:14px;font-weight:700;color:#4ade80;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)';
      t.textContent = '✅ 복사되었습니다';
      document.body.appendChild(t);
    }
    requestAnimationFrame(() => {
      t.style.opacity = '1';
      t.style.transform = 'translateX(-50%) translateY(0)';
    });
    clearTimeout(t._timer);
    t._timer = setTimeout(() => {
      t.style.opacity = '0';
      t.style.transform = 'translateX(-50%) translateY(20px)';
    }, 2500);
  };

  if(navigator.clipboard){
    navigator.clipboard.writeText(account).then(copy).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = account;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copy();
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = account;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    copy();
  }
}

async function init() {
  try {
    if (!client?.auth) { renderGuestHome(); return; }
    let waited = 0;
    while (window._headerSession === undefined && waited < 2000) {
      await new Promise(r => setTimeout(r, 50));
      waited += 50;
    }
    if (!window._headerSession) { renderGuestHome(); return; }
    await loadDashboard();
  } catch(e) {
    console.error('[HOME INIT ERROR]', e);
    renderGuestHome();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
