
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>선수 리포트 · ELITEREC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0c10;--panel:#181c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f2f5;--muted:#7a8294;--muted2:#4a5060;--brand:#e8ff47;--brand-dim:rgba(232,255,71,.12);--win:#4ade80;--win-bg:rgba(74,222,128,.1);--loss:#f87171;--loss-bg:rgba(248,113,113,.1);--draw:#94a3b8;--draw-bg:rgba(148,163,184,.1);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}
.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{max-width:480px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--brand);line-height:1}
.logo span{color:var(--text)}
.back-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-decoration:none}
.back-btn:hover{border-color:var(--brand);color:var(--brand)}
.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.5px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.hint-text{font-size:12px;color:var(--muted);margin:8px 0}

.tour-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
.tour-card:hover{border-color:var(--brand)}
.tour-name{font-size:15px;font-weight:700}
.tour-meta{font-size:12px;color:var(--muted);margin-top:4px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}
.kpi .v{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--brand);line-height:1}
.kpi .l{font-size:10px;font-weight:700;color:var(--muted);margin-top:4px;letter-spacing:.3px}

.stat-section{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.stat-section.bat{border-left:3px solid var(--brand)}
.stat-section.pit{border-left:3px solid var(--win)}
.stat-section.fld{border-left:3px solid var(--draw)}
.stat-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{background:rgba(255,255,255,.04);border-radius:10px;padding:8px 4px;text-align:center;border:1px solid var(--border)}
.stat-box .v{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text)}
.stat-box .k{font-size:9px;color:var(--muted);margin-top:2px;font-weight:700}
.kv-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.kv-row:last-child{border-bottom:none}
.kv-row .k{color:var(--muted)}.kv-row .v{font-weight:700}

.game-rec-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
.game-rec-card:hover,.game-rec-card.selected{border-color:var(--brand)}
.game-rec-info{flex:1;min-width:0}
.game-rec-vs{font-size:14px;font-weight:700}
.game-rec-meta{font-size:12px;color:var(--muted);margin-top:3px}
.result-pill{font-size:13px;font-weight:700;padding:5px 12px;border-radius:999px;flex-shrink:0;font-family:'Bebas Neue',sans-serif}
.result-pill.W{background:var(--win-bg);color:var(--win)} .result-pill.L{background:var(--loss-bg);color:var(--loss)} .result-pill.D{background:var(--draw-bg);color:var(--draw)}

.btn{width:100%;margin-top:12px;padding:14px;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn.primary{background:var(--brand);color:var(--black)}.btn.primary:hover{background:#d4ea3a}
.btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}.btn.ghost:hover{background:rgba(255,255,255,.05)}
.hidden{display:none!important}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(4px);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s ease}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:310;background:#12161d;border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--border2);border-bottom:none;box-shadow:0 -18px 40px rgba(0,0,0,.45);transform:translateY(100%);transition:transform .28s ease;max-height:84vh;overflow:auto}
.sheet.open{transform:translateY(0)}
.sheet-inner{max-width:480px;margin:0 auto;padding:14px 16px 28px}
.sheet-handle{width:52px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);margin:2px auto 14px}
.sheet-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.sheet-title{font-size:20px;font-weight:900}
.sheet-sub{font-size:12px;color:var(--muted);margin-top:4px}
.sheet-close{padding:8px 12px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text);font-weight:700;cursor:pointer}
.sheet-score{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.sheet-score .vs{font-size:16px;font-weight:800}
.sheet-score .score{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--brand);line-height:1}
.sheet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sheet-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center}
.sheet-box .v{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:var(--text)}
.sheet-box .k{font-size:10px;color:var(--muted);margin-top:4px;font-weight:700}
body.sheet-open{overflow:hidden}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">ELITE<span>REC</span></div>
    <a href="index.html" class="back-btn">← 홈</a>
  </div>
</header>

<div class="container">

  <!-- 대회 선택 -->
  <div id="viewTournaments">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="page-title">대회 선택</div>
        <div class="page-sub" id="playerHeader">-</div>
      </div>
      <a href="index.html" class="back-btn">← 홈</a>
    </div>
    <div id="tourList"></div>
  </div>

  <!-- 상세 리포트 -->
  <div id="viewStats" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="page-title">상세 리포트</div>
        <div class="page-sub" id="statsHeader">-</div>
      </div>
      <button class="back-btn" id="btnBackToTours">← 뒤로</button>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="v" id="kpiAVG">.000</div><div class="l">타율</div></div>
      <div class="kpi"><div class="v" id="kpiOBP">.000</div><div class="l">출루율</div></div>
      <div class="kpi"><div class="v" id="kpiSLG">.000</div><div class="l">장타율</div></div>
      <div class="kpi"><div class="v" id="kpiOPS">.000</div><div class="l">OPS</div></div>
      <div class="kpi"><div class="v" id="kpiERA">-</div><div class="l">ERA</div></div>
      <div class="kpi"><div class="v" id="kpiWHIP">-</div><div class="l">WHIP</div></div>
      <div class="kpi"><div class="v" id="kpiSO">-</div><div class="l">탈삼진</div></div>
      <div class="kpi"><div class="v" id="kpiG">-</div><div class="l">경기수</div></div>
    </div>

    <div class="stat-section bat">
      <div class="stat-section-title">⚾ Batting</div>
      <div class="stat-grid" id="batKV"></div>
    </div>

    <div class="stat-section pit">
      <div class="stat-section-title">🥎 Pitching</div>
      <div class="stat-grid" id="pitKV"></div>
    </div>

    <div class="stat-section fld">
      <div class="stat-section-title">🧤 Fielding & Memo</div>
      <div id="fldKV"></div>
    </div>

    <div class="section-label">경기별 기록</div>
    <div class="hint-text">경기를 누르면 아래에서 상세 성적이 올라옵니다.</div>
    <div id="gamesList"></div>
    <button class="btn ghost" style="margin-top:8px" id="btnBackToToursBottom">← 대회 목록</button>
  </div>

</div>

<div id="sheetOverlay" class="sheet-overlay hidden"></div>
<div id="gameSheet" class="sheet hidden" aria-hidden="true">
  <div class="sheet-inner">
    <div class="sheet-handle"></div>
    <div class="sheet-top">
      <div>
        <div class="sheet-title">경기 성적</div>
        <div class="sheet-sub" id="sheetHeader">-</div>
      </div>
      <button class="sheet-close" id="btnCloseSheet">닫기</button>
    </div>

    <div class="sheet-score">
      <div>
        <div class="vs" id="sheetOpponent">vs -</div>
        <div class="sheet-sub" id="sheetGameMeta">-</div>
      </div>
      <div class="score" id="sheetScore">0:0</div>
    </div>

    <div class="section-label">타격</div>
    <div id="sheetBatGrid" class="sheet-grid"></div>

    <div class="section-label">투구</div>
    <div id="sheetPitGrid" class="sheet-grid"></div>

    <div class="section-label">수비 / 메모</div>
    <div class="stat-section fld" style="margin-bottom:0">
      <div id="sheetFieldRows"></div>
    </div>
  </div>
</div>

<script>
const client = window.sb;
const el = (id)=>document.getElementById(id);
const num = (v)=>Number.isFinite(Number(v)) ? Number(v) : 0;
const fmtRate = (x)=>(!Number.isFinite(x)) ? '.000' : x.toFixed(3);
const CACHE_TTL_MS = 60 * 1000;

let currentPlayer = null;
let currentTournament = null;
let myUserId = null;
let playerRecords = [];
let gamesById = new Map();
let recordsByTournament = new Map();
let gamesByTournament = new Map();

async function requireLogin(){
  const { data, error } = await client.auth.getSession();
  if(error || !data?.session){
    location.href = `auth.html?next=${encodeURIComponent(location.pathname.split('/').pop()+location.search)}`;
    return null;
  }
  return data.session;
}

function showView(id, push = true){
  ['viewTournaments','viewStats'].forEach(v=>el(v).classList.add('hidden'));
  el(id).classList.remove('hidden');
  if(push){
    history.pushState({ view:id, tournament:currentTournament }, '', '');
  }
}

function getCacheKey(playerId){
  return `playerReport:v2:${playerId}`;
}

function loadCache(playerId){
  try{
    const raw = sessionStorage.getItem(getCacheKey(playerId));
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed?.savedAt || (Date.now() - parsed.savedAt) > CACHE_TTL_MS) return null;
    return parsed;
  }catch(_){
    return null;
  }
}

function saveCache(playerId, payload){
  try{
    sessionStorage.setItem(getCacheKey(playerId), JSON.stringify({ ...payload, savedAt: Date.now() }));
  }catch(_){ }
}

async function loadMyPlayer(){
  const { data, error } = await client
    .from('baseball_players')
    .select('id,name,jersey_number,primary_position,grade')
    .eq('owner_user_id', myUserId)
    .order('id', { ascending:true })
    .limit(1)
    .maybeSingle();

  if(error) throw error;
  currentPlayer = data || null;

  if(!currentPlayer){
    el('playerHeader').textContent = '등록된 선수가 없습니다';
    el('tourList').innerHTML = '<div class="hint-text">내 계정에 연결된 선수가 아직 없어요.</div>';
    return;
  }

  el('playerHeader').textContent = `${currentPlayer.name} 선수`;
  await loadBootstrapData(currentPlayer.id);
  renderTournamentList();
}

async function loadBootstrapData(playerId){
  const cached = loadCache(playerId);
  if(cached){
    playerRecords = cached.playerRecords || [];
    buildDataMaps(cached.games || []);
    return;
  }

  const { data: recs, error: recErr } = await client
    .from('baseball_game_player_records')
    .select('game_id,ab,h,rbi,r,bb,so,hbp,sb,doubles,triples,hr,sf,sh,gb,fb,ip,er,pk,pbb,ph,pitches,max_vel,e,player_memo')
    .eq('player_id', playerId);

  if(recErr) throw recErr;

  playerRecords = recs || [];
  const gameIds = [...new Set(playerRecords.map(r => r.game_id).filter(Boolean))];

  if(!gameIds.length){
    buildDataMaps([]);
    saveCache(playerId, { playerRecords, games: [] });
    return;
  }

  const { data: games, error: gamesErr } = await client
    .from('baseball_games')
    .select('id,tournament,game_date,opponent,result,our_score,opp_score')
    .in('id', gameIds)
    .order('game_date', { ascending:false });

  if(gamesErr) throw gamesErr;

  buildDataMaps(games || []);
  saveCache(playerId, { playerRecords, games: games || [] });
}

function buildDataMaps(games){
  gamesById = new Map((games || []).map(g => [g.id, g]));
  recordsByTournament = new Map();
  gamesByTournament = new Map();

  for(const record of playerRecords){
    const game = gamesById.get(record.game_id);
    if(!game?.tournament) continue;
    const tour = game.tournament;

    if(!recordsByTournament.has(tour)) recordsByTournament.set(tour, []);
    recordsByTournament.get(tour).push(record);
  }

  for(const game of games || []){
    if(!game?.tournament) continue;
    if(!gamesByTournament.has(game.tournament)) gamesByTournament.set(game.tournament, []);
    gamesByTournament.get(game.tournament).push(game);
  }

  for(const [tour, arr] of gamesByTournament.entries()){
    arr.sort((a,b) => String(b.game_date || '').localeCompare(String(a.game_date || '')));
    gamesByTournament.set(tour, arr);
  }
}

function renderTournamentList(){
  el('tourList').innerHTML = '';
  const tours = [...gamesByTournament.entries()]
    .map(([tour, games]) => ({
      tour,
      count: games.length,
      latest: games[0]?.game_date || ''
    }))
    .sort((a,b)=> String(b.latest).localeCompare(String(a.latest)));

  if(!tours.length){
    el('tourList').innerHTML = '<div class="hint-text">참여한 대회 기록이 없어요.</div>';
    return;
  }

  for(const meta of tours){
    const item = document.createElement('div');
    item.className = 'tour-card';
    item.innerHTML = `
      <div>
        <div class="tour-name">🏆 ${meta.tour}</div>
        <div class="tour-meta">경기 기록 ${meta.count}개${meta.latest ? ` · 최근 ${meta.latest}` : ''}</div>
      </div>
      <div class="arrow">→</div>`;
    item.onclick = ()=>{
      currentTournament = meta.tour;
      el('statsHeader').textContent = `${currentPlayer.name} · ${meta.tour}`;
      showView('viewStats');
      renderTournamentStats(meta.tour);
    };
    el('tourList').appendChild(item);
  }
}

function renderTournamentStats(tour){
  const games = gamesByTournament.get(tour) || [];
  const safeRecords = recordsByTournament.get(tour) || [];

  if(!games.length || !safeRecords.length){
    resetStatsView();
    el('gamesList').innerHTML = '<div class="hint-text">대회 경기 기록이 없어요.</div>';
    return;
  }

  const recMap = new Map(safeRecords.map(r => [r.game_id, r]));
  closeGameSheet();
  let s = { ab:0,h:0,rbi:0,r:0,bb:0,so:0,hbp:0,sb:0,d2:0,d3:0,hr:0,sf:0,sh:0,gb:0,fb:0,ip:0,er:0,pk:0,pbb:0,ph:0,pit:0,max_v:0,e:0,memos:[] };

  for(const r of safeRecords){
    s.ab+=num(r.ab); s.h+=num(r.h); s.rbi+=num(r.rbi); s.r+=num(r.r); s.bb+=num(r.bb); s.so+=num(r.so); s.hbp+=num(r.hbp); s.sb+=num(r.sb);
    s.d2+=num(r.doubles); s.d3+=num(r.triples); s.hr+=num(r.hr); s.sf+=num(r.sf); s.sh+=num(r.sh); s.gb+=num(r.gb); s.fb+=num(r.fb);
    s.ip+=num(r.ip); s.er+=num(r.er); s.pk+=num(r.pk); s.pbb+=num(r.pbb); s.ph+=num(r.ph); s.pit+=num(r.pitches);
    if(num(r.max_vel) > s.max_v) s.max_v = num(r.max_vel);
    s.e+=num(r.e);
    if(r.player_memo) s.memos.push(r.player_memo);
  }

  const avg = s.ab>0 ? s.h/s.ab : NaN;
  const obp = (s.ab+s.bb+s.hbp+s.sf)>0 ? (s.h+s.bb+s.hbp)/(s.ab+s.bb+s.hbp+s.sf) : NaN;
  const slg = s.ab>0 ? ((s.h-s.d2-s.d3-s.hr)+s.d2*2+s.d3*3+s.hr*4)/s.ab : NaN;
  const era = s.ip>0 ? (s.er*9)/s.ip : NaN;
  const whip = s.ip>0 ? (s.pbb+s.ph)/s.ip : NaN;

  el('kpiAVG').textContent = fmtRate(avg);
  el('kpiOBP').textContent = fmtRate(obp);
  el('kpiSLG').textContent = fmtRate(slg);
  el('kpiOPS').textContent = (Number.isFinite(obp)&&Number.isFinite(slg)) ? (obp+slg).toFixed(3) : '.000';
  el('kpiERA').textContent = s.ip>0 ? era.toFixed(2) : '-';
  el('kpiWHIP').textContent = s.ip>0 ? whip.toFixed(2) : '-';
  el('kpiSO').textContent = s.pk;
  el('kpiG').textContent = safeRecords.length;

  const b=(k,v)=>`<div class="stat-box"><div class="v">${v}</div><div class="k">${k}</div></div>`;
  el('batKV').innerHTML = b('타수',s.ab)+b('안타',s.h)+b('타점',s.rbi)+b('득점',s.r)+b('볼넷',s.bb)+b('삼진',s.so)+b('사구',s.hbp)+b('도루',s.sb)+b('2루타',s.d2)+b('3루타',s.d3)+b('홈런',s.hr)+b('희플',s.sf)+b('희번',s.sh)+b('땅볼',s.gb)+b('플라이',s.fb);
  el('pitKV').innerHTML = b('이닝',s.ip.toFixed(1))+b('자책',s.er)+b('삼진',s.pk)+b('볼넷',s.pbb)+b('피안타',s.ph)+b('투구수',s.pit)+b('최고구속',s.max_v>0?s.max_v:'-');
  el('fldKV').innerHTML = `<div class="kv-row"><span class="k">실책</span><span class="v">${s.e}</span></div><div class="kv-row"><span class="k">메모 요약</span><span class="v" style="font-size:12px;text-align:right;max-width:60%">${[...new Set(s.memos)].join(' / ')||'-'}</span></div>`;

  el('gamesList').innerHTML = '';
  for(const g of games){
    if(!recMap.has(g.id)) continue;
    const r = recMap.get(g.id);
    const item = document.createElement('div');
    item.className = 'game-rec-card';
    const bc = g.result==='W' ? 'W' : g.result==='L' ? 'L' : 'D';
    item.innerHTML = `
      <div class="game-rec-info">
        <div class="game-rec-vs">vs ${g.opponent} <span style="color:var(--brand)">${num(g.our_score)}:${num(g.opp_score)}</span></div>
        <div class="game-rec-meta">${g.game_date} · ${num(r.ab)}타수 ${num(r.h)}안타 ${num(r.rbi)}타점</div>
      </div>
      <div class="result-pill ${bc}">${g.result}</div>`;
    item.onclick = ()=>{
      [...el('gamesList').children].forEach(c=>c.classList.remove('selected'));
      item.classList.add('selected');
      openGameSheet(g, r);
    };
    el('gamesList').appendChild(item);
  }

  if(!el('gamesList').children.length){
    el('gamesList').innerHTML = '<div class="hint-text">선수 기록이 있는 경기가 없어요.</div>';
  }
}

function resetStatsView(){
  el('kpiAVG').textContent = '.000';
  el('kpiOBP').textContent = '.000';
  el('kpiSLG').textContent = '.000';
  el('kpiOPS').textContent = '.000';
  el('kpiERA').textContent = '-';
  el('kpiWHIP').textContent = '-';
  el('kpiSO').textContent = '-';
  el('kpiG').textContent = '-';
  el('batKV').innerHTML = '';
  el('pitKV').innerHTML = '';
  el('fldKV').innerHTML = '<div class="kv-row"><span class="k">안내</span><span class="v">-</span></div>';
}

function gameBox(k,v){
  return `<div class="sheet-box"><div class="v">${v}</div><div class="k">${k}</div></div>`;
}

function openGameSheet(game, record){
  el('sheetHeader').textContent = `${currentPlayer?.name || '-'} · ${currentTournament || '-'}`;
  el('sheetOpponent').textContent = `vs ${game?.opponent || '-'}`;
  el('sheetGameMeta').textContent = `${game?.game_date || '-'} · 결과 ${game?.result || '-'}`;
  el('sheetScore').textContent = `${num(game?.our_score)}:${num(game?.opp_score)}`;

  el('sheetBatGrid').innerHTML = [
    gameBox('타수', num(record?.ab)),
    gameBox('안타', num(record?.h)),
    gameBox('타점', num(record?.rbi)),
    gameBox('득점', num(record?.r)),
    gameBox('볼넷', num(record?.bb)),
    gameBox('삼진', num(record?.so)),
    gameBox('사구', num(record?.hbp)),
    gameBox('도루', num(record?.sb)),
    gameBox('2루타', num(record?.doubles)),
    gameBox('3루타', num(record?.triples)),
    gameBox('홈런', num(record?.hr)),
    gameBox('희플', num(record?.sf)),    
    gameBox('희번', num(record?.sh)),    
    gameBox('땅볼', num(record?.gb)),    
    gameBox('플라이', num(record?.fb))
  ].join('');

  el('sheetPitGrid').innerHTML = [
    gameBox('이닝', num(record?.ip).toFixed(1)),
    gameBox('자책', num(record?.er)),
    gameBox('삼진', num(record?.pk)),
    gameBox('볼넷', num(record?.pbb)),
    gameBox('피안타', num(record?.ph)),
    gameBox('투구수', num(record?.pitches)),
    gameBox('최고구속', num(record?.max_vel) || '-')
  ].join('');

  el('sheetFieldRows').innerHTML = `
    <div class="kv-row"><span class="k">실책</span><span class="v">${num(record?.e)}</span></div>
    <div class="kv-row"><span class="k">메모</span><span class="v" style="font-size:12px;text-align:right;max-width:65%">${record?.player_memo || '-'}</span></div>`;

  el('sheetOverlay').classList.remove('hidden');
  el('gameSheet').classList.remove('hidden');
  requestAnimationFrame(()=>{
    el('sheetOverlay').classList.add('open');
    el('gameSheet').classList.add('open');
    document.body.classList.add('sheet-open');
  });
}

function closeGameSheet(){
  el('sheetOverlay').classList.remove('open');
  el('gameSheet').classList.remove('open');
  document.body.classList.remove('sheet-open');
  setTimeout(()=>{
    if(!el('gameSheet').classList.contains('open')){
      el('sheetOverlay').classList.add('hidden');
      el('gameSheet').classList.add('hidden');
    }
  }, 280);
}

window.onpopstate = (e)=>{
  const state = e.state;
  if(!state || state.view === 'viewTournaments'){
    closeGameSheet();
    showView('viewTournaments', false);
    return;
  }

  if(state.view === 'viewStats' && currentPlayer && state.tournament){
    currentTournament = state.tournament;
    el('statsHeader').textContent = `${currentPlayer.name} · ${state.tournament}`;
    showView('viewStats', false);
    renderTournamentStats(state.tournament);
  }
};

el('btnCloseSheet').onclick = closeGameSheet;
el('sheetOverlay').onclick = closeGameSheet;
el('btnBackToTours').onclick = ()=>{ closeGameSheet(); history.back(); };
el('btnBackToToursBottom').onclick = ()=>{ closeGameSheet(); history.back(); };
window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeGameSheet(); });

(async function init(){
  const session = await requireLogin();
  if(!session) return;

  const { data:{ user } } = await client.auth.getUser();
  if(user) myUserId = user.id;

  history.replaceState({ view:'viewTournaments', tournament:null }, '', '');
  showView('viewTournaments', false);

  try{
    await loadMyPlayer();
  }catch(err){
    console.error(err);
    el('playerHeader').textContent = '불러오기 실패';
    el('tourList').innerHTML = `<div class="hint-text">데이터를 불러오지 못했어요. ${err?.message || ''}</div>`;
  }
})();
</script>
</body>
</html>
