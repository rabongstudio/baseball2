<style>
:root{--black:#0a0c10;--panel:#181c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f2f5;--muted:#7a8294;--brand:#e8ff47;--brand-dim:rgba(232,255,71,.12);--win:#4ade80;--loss:#f87171;--draw:#94a3b8}.hidden{display:none!important}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}.header-inner{max-width:480px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--brand)}.logo span{color:var(--text)}.back-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-size:13px;font-weight:700;text-decoration:none}.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;margin-bottom:4px}.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}.tour-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}.tour-card:hover{border-color:var(--brand)}.tour-name{font-size:15px;font-weight:700}.tour-meta{font-size:12px;color:var(--muted);margin-top:4px}
/* ✅ 추가: 승무패 칩 */
.wld-chips{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle}
.wld-chip{font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px}
.wld-chip.W{background:rgba(74,222,128,.12);color:var(--win)}
.wld-chip.L{background:rgba(248,113,113,.12);color:var(--loss)}
.wld-chip.D{background:rgba(148,163,184,.12);color:var(--draw)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}.kpi .v{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--brand);line-height:1}.kpi .l{font-size:10px;font-weight:700;color:var(--muted);margin-top:4px}.stat-section{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}.stat-section.bat{border-left:3px solid var(--brand)}.stat-section.pit{border-left:3px solid var(--win)}.stat-section.fld{border-left:3px solid var(--draw)}.stat-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.stat-box{background:rgba(255,255,255,.04);border-radius:10px;padding:8px 4px;text-align:center;border:1px solid var(--border)}.stat-box .v{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text)}.stat-box .k{font-size:9px;color:var(--muted);margin-top:2px;font-weight:700}.kv-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}.kv-row:last-child{border-bottom:none}.kv-row .k{color:var(--muted)}.kv-row .v{font-weight:700}.game-rec-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}.game-rec-card:hover,.game-rec-card.selected{border-color:var(--brand)}.game-rec-info{flex:1;min-width:0}.game-rec-vs{font-size:14px;font-weight:700}.game-rec-meta{font-size:12px;color:var(--muted);margin-top:3px}.result-pill{font-size:13px;font-weight:700;padding:5px 12px;border-radius:999px;flex-shrink:0;font-family:'Bebas Neue',sans-serif}.result-pill.W{background:rgba(74,222,128,.1);color:#4ade80}.result-pill.L{background:rgba(248,113,113,.1);color:#f87171}.result-pill.D{background:rgba(148,163,184,.1);color:#94a3b8}.btn{width:100%;margin-top:12px;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer}.btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}.hint-text{font-size:12px;color:var(--muted);margin:8px 0}.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(4px);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s ease}.sheet-overlay.open{opacity:1;pointer-events:auto}.sheet{position:fixed;left:0;right:0;bottom:0;z-index:310;background:#12161d;border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--border2);border-bottom:none;transform:translateY(100%);transition:transform .28s ease;max-height:84vh;overflow:auto}.sheet.open{transform:translateY(0)}.sheet-inner{max-width:480px;margin:0 auto;padding:14px 16px 28px}.sheet-handle{width:52px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);margin:2px auto 14px}.sheet-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}.sheet-title{font-size:20px;font-weight:900}.sheet-sub{font-size:12px;color:var(--muted);margin-top:4px}.sheet-close{padding:8px 12px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text);font-weight:700;cursor:pointer}.sheet-score{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}.sheet-score .vs{font-size:16px;font-weight:800}.sheet-score .score{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--brand);line-height:1}.sheet-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}.sheet-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center}.sheet-box .v{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}.sheet-box .k{font-size:10px;color:var(--muted);margin-top:4px;font-weight:700}
/* ✅ 추가: 타순/포지션 행 */
.pos-row{display:flex;gap:8px;margin-bottom:12px}
.pos-box{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center}
.pos-box .v{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--brand);line-height:1}
.pos-box .k{font-size:10px;color:var(--muted);margin-top:4px;font-weight:700}
.starter-chip{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-block}
.starter-chip.yes{background:rgba(232,255,71,.12);color:var(--brand)}
.starter-chip.no{background:rgba(148,163,184,.1);color:var(--draw)}
body.sheet-open{overflow:hidden}
</style>

<body>
<div id="appHeader" data-back="index.html"></div>
<div class="container">
  <div id="viewTournaments"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div><div class="page-title">대회 선택</div><div class="page-sub" id="playerHeader">-</div></div></div><div id="tourList"></div></div>
  <div id="viewStats" class="hidden"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div><div class="page-title">상세 리포트</div><div class="page-sub" id="statsHeader">-</div></div><button class="back-btn" id="btnBackToTours">← 뒤로</button></div><div class="kpi-grid"><div class="kpi"><div class="v" id="kpiAVG">.000</div><div class="l">타율</div></div><div class="kpi"><div class="v" id="kpiOBP">.000</div><div class="l">출루율</div></div><div class="kpi"><div class="v" id="kpiSLG">.000</div><div class="l">장타율</div></div><div class="kpi"><div class="v" id="kpiOPS">.000</div><div class="l">OPS</div></div><div class="kpi"><div class="v" id="kpiERA">-</div><div class="l">ERA</div></div><div class="kpi"><div class="v" id="kpiWHIP">-</div><div class="l">WHIP</div></div><div class="kpi"><div class="v" id="kpiSO">-</div><div class="l">탈삼진</div></div><div class="kpi"><div class="v" id="kpiG">-</div><div class="l">경기수</div></div></div><div class="stat-section bat"><div class="stat-section-title">⚾ Batting</div><div class="stat-grid" id="batKV"></div></div><div class="stat-section pit"><div class="stat-section-title">🥎 Pitching</div><div class="stat-grid" id="pitKV"></div></div><div class="stat-section fld"><div class="stat-section-title">🧤 Fielding & Memo</div><div id="fldKV"></div></div><div class="section-label">경기별 기록</div><div class="hint-text">경기를 누르면 아래에서 상세 성적이 올라옵니다.</div><div id="gamesList"></div><button class="btn ghost" id="btnBackToToursBottom">← 대회 목록</button></div>
</div>
<div id="sheetOverlay" class="sheet-overlay hidden"></div>
<div id="gameSheet" class="sheet hidden" aria-hidden="true"><div class="sheet-inner"><div class="sheet-handle"></div><div class="sheet-top"><div><div class="sheet-title">경기 성적</div><div class="sheet-sub" id="sheetHeader">-</div></div><button class="sheet-close" id="btnCloseSheet">닫기</button></div><div class="sheet-score"><div><div class="vs" id="sheetOpponent">vs -</div><div class="sheet-sub" id="sheetGameMeta">-</div></div><div class="score" id="sheetScore">0:0</div></div>
<!-- ✅ 추가: 타순/포지션/선발여부 -->
<div class="pos-row" id="sheetPosRow"></div>
<div class="section-label">타격</div><div id="sheetBatGrid" class="sheet-grid"></div><div class="section-label">투구</div><div id="sheetPitGrid" class="sheet-grid"></div><div class="section-label">수비 / 메모</div><div class="stat-section fld" style="margin-bottom:0"><div id="sheetFieldRows"></div></div></div></div>
<script>
const client=window.sb; const el=(id)=>document.getElementById(id); const num=v=>Number.isFinite(Number(v))?Number(v):0; const fmtRate=x=>(!Number.isFinite(x))?'.000':x.toFixed(3); let currentPlayer=null,currentTournament=null,myUserId=null,records=[];
async function requireLogin(){ const {data,error}=await client.auth.getSession(); if(error||!data?.session){ location.href=`auth.html?next=${encodeURIComponent(location.pathname.split('/').pop()+location.search)}`; return null; } return data.session; }
function showView(id,push=true){ ['viewTournaments','viewStats'].forEach(v=>el(v).classList.add('hidden')); el(id).classList.remove('hidden'); if(push) history.pushState({view:id,tournament:currentTournament},'', ''); }
async function loadMyPlayer(){ const {data:{user}}=await client.auth.getUser(); myUserId=user.id; const {data,error}=await client.from('baseball_players').select('id,name,jersey_number,primary_position,grade').eq('owner_user_id', myUserId).limit(1).maybeSingle(); if(error) throw error; currentPlayer=data||null; if(!currentPlayer){ el('playerHeader').textContent='등록된 선수가 없습니다'; el('tourList').innerHTML='<div class="hint-text">내 계정에 연결된 선수가 아직 없어요.</div>'; return; } el('playerHeader').textContent=`${currentPlayer.name} 선수`; const res=await client.from('baseball_records').select('*').eq('player_id', currentPlayer.id).order('game_date',{ascending:false}).order('id',{ascending:false}); if(res.error) throw res.error; records=res.data||[]; renderTournamentList(); }

// ✅ 수정: 승무패 집계 후 tour-meta에 칩 추가
function renderTournamentList(){ el('tourList').innerHTML=''; const map=new Map(); records.forEach(r=>{ const t=r.tournament||'기타'; if(!map.has(t)) map.set(t,[]); map.get(t).push(r); }); const tours=[...map.entries()].map(([tour, arr])=>({tour,arr,count:arr.length,latest:arr[0]?.game_date||''})).sort((a,b)=>String(b.latest).localeCompare(String(a.latest))); if(!tours.length){ el('tourList').innerHTML='<div class="hint-text">참여한 대회 기록이 없어요.</div>'; return; } tours.forEach(meta=>{ let w=0,l=0,d=0; meta.arr.forEach(r=>{ if(r.result==='W')w++; else if(r.result==='L')l++; else d++; }); const chips=`<span class="wld-chip W">${w}승</span><span class="wld-chip L">${l}패</span><span class="wld-chip D">${d}무</span>`; const item=document.createElement('div'); item.className='tour-card'; item.innerHTML=`<div><div class="tour-name">🏆 ${meta.tour}</div><div class="tour-meta">경기 기록 ${meta.count}개${meta.latest?` · 최근 ${meta.latest}`:''}<span class="wld-chips">${chips}</span></div></div><div class="arrow">→</div>`; item.onclick=()=>{ currentTournament=meta.tour; el('statsHeader').textContent=`${currentPlayer.name} · ${meta.tour}`; showView('viewStats'); renderTournamentStats(meta.tour); }; el('tourList').appendChild(item); }); }

function renderTournamentStats(tour){ const safeRecords=records.filter(r => (r.tournament||'기타')===tour); if(!safeRecords.length){ resetStatsView(); el('gamesList').innerHTML='<div class="hint-text">대회 경기 기록이 없어요.</div>'; return; } closeGameSheet(); let s={ab:0,h:0,rbi:0,r:0,bb:0,so:0,hbp:0,sb:0,d2:0,d3:0,hr:0,sf:0,sh:0,gb:0,fb:0,ip:0,er:0,pk:0,pbb:0,ph:0,pit:0,max_v:0,e:0,memos:[]}; safeRecords.forEach(r=>{ s.ab+=num(r.ab); s.h+=num(r.h); s.rbi+=num(r.rbi); s.r+=num(r.r); s.bb+=num(r.bb); s.so+=num(r.so); s.hbp+=num(r.hbp); s.sb+=num(r.sb); s.d2+=num(r.doubles); s.d3+=num(r.triples); s.hr+=num(r.hr); s.sf+=num(r.sf); s.sh+=num(r.sh); s.gb+=num(r.gb); s.fb+=num(r.fb); s.ip+=num(r.ip); s.er+=num(r.er); s.pk+=num(r.pk); s.pbb+=num(r.pbb); s.ph+=num(r.ph); s.pit+=num(r.pitches); if(num(r.max_vel)>s.max_v) s.max_v=num(r.max_vel); s.e+=num(r.e); if(r.player_memo) s.memos.push(r.player_memo); }); const avg=s.ab>0?s.h/s.ab:NaN; const obp=(s.ab+s.bb+s.hbp+s.sf)>0?(s.h+s.bb+s.hbp)/(s.ab+s.bb+s.hbp+s.sf):NaN; const slg=s.ab>0?((s.h-s.d2-s.d3-s.hr)+s.d2*2+s.d3*3+s.hr*4)/s.ab:NaN; const era=s.ip>0?(s.er*9)/s.ip:NaN; const whip=s.ip>0?(s.pbb+s.ph)/s.ip:NaN; el('kpiAVG').textContent=fmtRate(avg); el('kpiOBP').textContent=fmtRate(obp); el('kpiSLG').textContent=fmtRate(slg); el('kpiOPS').textContent=(Number.isFinite(obp)&&Number.isFinite(slg))?(obp+slg).toFixed(3):'.000'; el('kpiERA').textContent=s.ip>0?era.toFixed(2):'-'; el('kpiWHIP').textContent=s.ip>0?whip.toFixed(2):'-'; el('kpiSO').textContent=s.pk; el('kpiG').textContent=safeRecords.length; const b=(k,v)=>`<div class="stat-box"><div class="v">${v}</div><div class="k">${k}</div></div>`; el('batKV').innerHTML=b('타수',s.ab)+b('안타',s.h)+b('타점',s.rbi)+b('득점',s.r)+b('볼넷',s.bb)+b('삼진',s.so)+b('사구',s.hbp)+b('도루',s.sb)+b('2루타',s.d2)+b('3루타',s.d3)+b('홈런',s.hr)+b('희플',s.sf)+b('희번',s.sh)+b('땅볼',s.gb)+b('플라이',s.fb); el('pitKV').innerHTML=b('이닝',s.ip.toFixed(1))+b('자책',s.er)+b('삼진',s.pk)+b('볼넷',s.pbb)+b('피안타',s.ph)+b('투구수',s.pit)+b('최고구속',s.max_v>0?s.max_v:'-'); el('fldKV').innerHTML=`<div class="kv-row"><span class="k">실책</span><span class="v">${s.e}</span></div><div class="kv-row"><span class="k">메모 요약</span><span class="v" style="font-size:12px;text-align:right;max-width:60%">${[...new Set(s.memos)].join(' / ')||'-'}</span></div>`; el('gamesList').innerHTML=''; safeRecords.forEach(r=>{ const item=document.createElement('div'); item.className='game-rec-card'; const bc=r.result==='W'?'W':r.result==='L'?'L':'D'; item.innerHTML=`<div class="game-rec-info"><div class="game-rec-vs">vs ${r.opponent} <span style="color:var(--brand)">${num(r.our_score)}:${num(r.opp_score)}</span></div><div class="game-rec-meta">${r.game_date} · ${num(r.ab)}타수 ${num(r.h)}안타 ${num(r.rbi)}타점</div></div><div class="result-pill ${bc}">${r.result||'D'}</div>`; item.onclick=()=>{ [...el('gamesList').children].forEach(c=>c.classList.remove('selected')); item.classList.add('selected'); openGameSheet(r); }; el('gamesList').appendChild(item); }); }
function resetStatsView(){ el('kpiAVG').textContent='.000'; el('kpiOBP').textContent='.000'; el('kpiSLG').textContent='.000'; el('kpiOPS').textContent='.000'; el('kpiERA').textContent='-'; el('kpiWHIP').textContent='-'; el('kpiSO').textContent='-'; el('kpiG').textContent='-'; el('batKV').innerHTML=''; el('pitKV').innerHTML=''; el('fldKV').innerHTML='<div class="kv-row"><span class="k">안내</span><span class="v">-</span></div>'; }
function gameBox(k,v){ return `<div class="sheet-box"><div class="v">${v}</div><div class="k">${k}</div></div>`; }

// ✅ 수정: 타순/포지션/선발여부 행 추가
function openGameSheet(r){ el('sheetHeader').textContent=`${currentPlayer?.name||'-'} · ${currentTournament||'-'}`; el('sheetOpponent').textContent=`vs ${r?.opponent||'-'}`; el('sheetGameMeta').textContent=`${r?.game_date||'-'} · 결과 ${r?.result||'-'}`; el('sheetScore').textContent=`${num(r?.our_score)}:${num(r?.opp_score)}`;
const isStarter=r?.is_starter!==false;
el('sheetPosRow').innerHTML=`<div class="pos-box"><div class="v">${r?.batting_order?r.batting_order+'번':'-'}</div><div class="k">타순</div></div><div class="pos-box"><div class="v">${r?.position||'-'}</div><div class="k">포지션</div></div><div class="pos-box"><div class="v"><span class="starter-chip ${isStarter?'yes':'no'}">${isStarter?'선발':'교체'}</span></div><div class="k">선발여부</div></div>`;
el('sheetBatGrid').innerHTML=[gameBox('타수',num(r?.ab)),gameBox('안타',num(r?.h)),gameBox('타점',num(r?.rbi)),gameBox('득점',num(r?.r)),gameBox('볼넷',num(r?.bb)),gameBox('삼진',num(r?.so)),gameBox('사구',num(r?.hbp)),gameBox('도루',num(r?.sb)),gameBox('2루타',num(r?.doubles)),gameBox('3루타',num(r?.triples)),gameBox('홈런',num(r?.hr)),gameBox('희플',num(r?.sf)),gameBox('희번',num(r?.sh)),gameBox('땅볼',num(r?.gb)),gameBox('플라이',num(r?.fb))].join(''); el('sheetPitGrid').innerHTML=[gameBox('이닝',num(r?.ip).toFixed(1)),gameBox('자책',num(r?.er)),gameBox('삼진',num(r?.pk)),gameBox('볼넷',num(r?.pbb)),gameBox('피안타',num(r?.ph)),gameBox('투구수',num(r?.pitches)),gameBox('최고구속',num(r?.max_vel)||'-')].join(''); el('sheetFieldRows').innerHTML=`<div class="kv-row"><span class="k">실책</span><span class="v">${num(r?.e)}</span></div><div class="kv-row"><span class="k">메모</span><span class="v" style="font-size:12px;text-align:right;max-width:65%">${r?.player_memo||'-'}</span></div>`; el('sheetOverlay').classList.remove('hidden'); el('gameSheet').classList.remove('hidden'); requestAnimationFrame(()=>{ el('sheetOverlay').classList.add('open'); el('gameSheet').classList.add('open'); document.body.classList.add('sheet-open'); }); }

function closeGameSheet(){ el('sheetOverlay').classList.remove('open'); el('gameSheet').classList.remove('open'); document.body.classList.remove('sheet-open'); setTimeout(()=>{ if(!el('gameSheet').classList.contains('open')){ el('sheetOverlay').classList.add('hidden'); el('gameSheet').classList.add('hidden'); } },280); }
window.onpopstate=(e)=>{ const state=e.state; if(!state||state.view==='viewTournaments'){ closeGameSheet(); showView('viewTournaments',false); return; } if(state.view==='viewStats'&&currentPlayer&&state.tournament){ currentTournament=state.tournament; el('statsHeader').textContent=`${currentPlayer.name} · ${state.tournament}`; showView('viewStats',false); renderTournamentStats(state.tournament); } };
el('btnCloseSheet').onclick=closeGameSheet; el('sheetOverlay').onclick=closeGameSheet; el('btnBackToTours').onclick=()=>{ closeGameSheet(); history.back(); }; el('btnBackToToursBottom').onclick=()=>{ closeGameSheet(); history.back(); }; window.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeGameSheet(); });
(async function init(){ const session=await requireLogin(); if(!session) return; history.replaceState({view:'viewTournaments',tournament:null},'', ''); showView('viewTournaments',false); try{ await loadMyPlayer(); }catch(err){ el('playerHeader').textContent='불러오기 실패'; el('tourList').innerHTML=`<div class="hint-text">데이터를 불러오지 못했어요. ${err?.message||''}</div>`; } })();
</script>
</body>
