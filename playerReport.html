<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>선수 리포트</title>
<style>
  :root {
    --bg: #f8fafc; --card: #ffffff; --line: #e2e8f0; --text: #1e293b;
    --muted: #64748b; --brand: #2563eb; --brand-soft: #eff6ff;
    --navy: #0f172a; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    --hit-color: #2563eb; --pit-color: #10b981; --fld-color: #f59e0b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 480px; margin: 0 auto; padding: 15px 12px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .title { font-size: 20px; font-weight: 900; color: var(--navy); }
  .card { background: var(--card); border-radius: 18px; padding: 16px; box-shadow: var(--shadow); margin-top: 12px; border: 1px solid #fff; }
  input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px; background: #f1f5f9; margin-top: 8px; font-size: 15px; }
  .list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .item { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .item.selected { border-color: var(--brand); background: var(--brand-soft); }
  .pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: var(--brand-soft); color: var(--brand); }
  
  /* 최상단 성적 8개 그리드 복구 */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 12px 0; }
  .kpi { background: #f8fafc; border-radius: 12px; padding: 10px 2px; text-align: center; border: 1px solid #f1f5f9; }
  .kpi .v { font-size: 14px; font-weight: 900; color: var(--brand); }
  .kpi .l { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 700; }

  .sectionCard { margin-top: 10px; border-radius: 15px; padding: 14px; border: 1px solid var(--line); border-left: 5px solid var(--brand); background: #fff; }
  .sectionTitle { font-size: 14px; font-weight: 900; margin-bottom: 10px; display: block; }
  .statGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .statBox { background: #f8fafc; border-radius: 8px; padding: 6px 2px; text-align: center; border: 1px solid #f1f5f9; }
  .statBox .v { font-size: 12px; font-weight: 800; }
  .statBox .k { font-size: 9px; color: var(--muted); }
  .kv { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--line); font-size: 12px; }
  .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; margin-top: 15px; font-size: 15px; }
  .btn.primary { background: var(--brand); color: #fff; }
  .smallBtn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--line); background: #fff; font-size: 12px; font-weight: 700; }
  .hidden { display: none !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
  <div id="viewPlayers">
    <div class="topbar"><div class="title">👦 선수 리포트</div><button class="smallBtn" onclick="location.href='index.html'">홈</button></div>
    <div class="card"><input id="playerSearch" placeholder="이름 또는 등번호 검색" /><div class="list" id="playersList"></div></div>
  </div>

  <div id="viewTournaments" class="hidden">
    <div class="topbar"><div class="title">🏆 대회 선택</div><button class="smallBtn" onclick="history.back()">뒤로</button></div>
    <div class="card"><div id="playerHeader" style="font-weight:900;"></div><div class="list" id="tourList"></div></div>
  </div>

  <div id="viewStats" class="hidden">
    <div class="topbar"><div class="title">📈 상세 리포트</div><button class="smallBtn" onclick="history.back()">뒤로</button></div>
    <div class="card">
      <div id="statsHeader" style="font-weight:900; margin-bottom:12px; color:var(--brand);"></div>
      
      <div class="kpis">
        <div class="kpi"><div class="v" id="kpiAVG">.000</div><div class="l">타율</div></div>
        <div class="kpi"><div class="v" id="kpiOBP">.000</div><div class="l">출루율</div></div>
        <div class="kpi"><div class="v" id="kpiSLG">.000</div><div class="l">장타율</div></div>
        <div class="kpi"><div class="v" id="kpiOPS">.000</div><div class="l">OPS</div></div>
        <div class="kpi"><div class="v" id="kpiERA">-</div><div class="l">ERA</div></div>
        <div class="kpi"><div class="v" id="kpiWHIP">-</div><div class="l">WHIP</div></div>
        <div class="kpi"><div class="v" id="kpiSO">-</div><div class="l">탈삼진</div></div>
        <div class="kpi"><div class="v" id="kpiG">-</div><div class="l">경기수</div></div>
      </div>
      
      <div class="sectionCard hit"><b class="sectionTitle">⚾ 타격</b><div id="batKV" class="statGrid"></div></div>
      <div class="sectionCard pit"><b class="sectionTitle">🥎 투구</b><div id="pitKV" class="statGrid"></div></div>
      <div class="sectionCard fld"><b class="sectionTitle">🧤 수비 및 메모</b><div id="fldKV"></div></div>
    </div>

    <div class="card">
      <b>🗓️ 경기별 기록</b>
      <div class="list" id="gamesList"></div>
      <button class="btn primary" id="btnGoGameReport">선택한 경기 리포트 보기</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dmxkznmliiyffoltdcxd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRteGt6bm1saWl5ZmZvbHRkY3hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMwNTc2NzksImV4cCI6MjA1ODYzMzY3OX0.NUQgOp8NGHEZ0RDQ4sbuH7YCJpfYqF3UyEK3sPtu5-o';
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function requireLogin() {
    const { data, error } = await client.auth.getSession();
    if (error) {
      console.error(error);
      location.href = `auth.html?next=${encodeURIComponent(location.pathname.split('/').pop() + location.search)}`;
      return null;
    }
    const session = data?.session;
    if (!session) {
      location.href = `auth.html?next=${encodeURIComponent(location.pathname.split('/').pop() + location.search)}`;
      return null;
    }
    return session;
  }
  const el = (id) => document.getElementById(id);
  const num = (v) => Number.isFinite(Number(v)) ? Number(v) : 0;
  const fmtRate = (x) => (!Number.isFinite(x)) ? ".000" : x.toFixed(3);

  let players = [], currentPlayer = null, currentTournament = null, selectedGameId = null;

  function showView(id, push = true) {
    ["viewPlayers","viewTournaments","viewStats"].forEach(v => el(v).classList.add("hidden"));
    el(id).classList.remove("hidden");
    if(push) history.pushState({ view: id, player: currentPlayer, tournament: currentTournament }, "", "");
  }

  async function loadPlayers(){
    const { data, error } = await client.from("baseball_players").select("*").order("name");
    if(!error) { players = data; renderPlayersList(""); }
  }

  function renderPlayersList(q){
    el("playersList").innerHTML = "";
    players.filter(p => p.name.includes(q) || (p.jersey_number||"").toString().includes(q)).forEach(p => {
      const d = document.createElement("div"); d.className="item";
      d.innerHTML = `<div><b>#${p.jersey_number||'-'} ${p.name}</b><br><small>${p.primary_position||'-'}</small></div><div class="pill">선택</div>`;
      d.onclick = () => { currentPlayer = p; el("playerHeader").textContent = `👤 ${p.name} 선수`; showView("viewTournaments"); loadPlayerTournaments(p.id); };
      el("playersList").appendChild(d);
    });
  }

  async function loadPlayerTournaments(pId){
    const { data: recs } = await client.from("baseball_game_player_records").select("game_id").eq("player_id", pId);
    const gIds = [...new Set((recs || []).map(x => x.game_id))];
    const { data: gms } = await client.from("baseball_games").select("tournament").in("id", gIds);
    const tours = [...new Set(gms.map(g => g.tournament).filter(t => t))].sort();
    el("tourList").innerHTML = "";
    tours.forEach(t => {
      const d = document.createElement("div"); d.className="item";
      d.innerHTML = `<b>🏆 ${t}</b><div class="pill">보기</div>`;
      d.onclick = () => { currentTournament = t; el("statsHeader").textContent = `📊 ${t} 성적`; showView("viewStats"); loadPlayerTournamentStats(pId, t); };
      el("tourList").appendChild(d);
    });
  }

  async function loadPlayerTournamentStats(pId, tour){
    const { data: games } = await client.from("baseball_games").select("*").eq("tournament", tour).order("game_date");
    const gIds = games.map(g => g.id);
    const { data: records } = await client.from("baseball_game_player_records").select("*").eq("player_id", pId).in("game_id", gIds);
    const recMap = new Map(records.map(r => [r.game_id, r]));

    let s = { ab:0, h:0, rbi:0, r:0, bb:0, so:0, hbp:0, sb:0, d2:0, d3:0, hr:0, sf:0, sh:0, gb:0, fb:0, ip:0, er:0, pk:0, pbb:0, ph:0, pit:0, max_v:0, e:0, memos:[] };
    records.forEach(r => {
      s.ab+=num(r.ab); s.h+=num(r.h); s.rbi+=num(r.rbi); s.r+=num(r.r); s.bb+=num(r.bb); s.so+=num(r.so);
      s.hbp+=num(r.hbp); s.sb+=num(r.sb); s.d2+=num(r.doubles); s.d3+=num(r.triples); s.hr+=num(r.hr);
      s.sf+=num(r.sf); s.sh+=num(r.sh); s.gb+=num(r.gb); s.fb+=num(r.fb);
      s.ip+=num(r.ip); s.er+=num(r.er); s.pk+=num(r.pk); s.pbb+=num(r.pbb); s.ph+=num(r.ph); s.pit+=num(r.pitches);
      if(num(r.max_vel) > s.max_v) s.max_v = num(r.max_vel);
      s.e+=num(r.e); if(r.player_memo) s.memos.push(r.player_memo);
    });

    // 지표 계산 (상단 8개용)
    const avg = s.ab > 0 ? s.h/s.ab : NaN;
    const obp = (s.ab+s.bb+s.hbp+s.sf) > 0 ? (s.h+s.bb+s.hbp)/(s.ab+s.bb+s.hbp+s.sf) : NaN;
    const slg = s.ab > 0 ? ((s.h-s.d2-s.d3-s.hr) + s.d2*2 + s.d3*3 + s.hr*4)/s.ab : NaN;
    const era = s.ip > 0 ? (s.er*9)/s.ip : NaN;
    const whip = s.ip > 0 ? (s.pbb + s.ph)/s.ip : NaN;

    // 상단 8개 업데이트
    el("kpiAVG").textContent = fmtRate(avg);
    el("kpiOBP").textContent = fmtRate(obp);
    el("kpiSLG").textContent = fmtRate(slg);
    el("kpiOPS").textContent = (Number.isFinite(obp)&&Number.isFinite(slg)) ? (obp+slg).toFixed(3) : ".000";
    el("kpiERA").textContent = s.ip > 0 ? era.toFixed(2) : "-";
    el("kpiWHIP").textContent = s.ip > 0 ? whip.toFixed(2) : "-";
    el("kpiSO").textContent = s.pk;
    el("kpiG").textContent = records.length;

    // 상세 그리드 업데이트
    const b = (k, v) => `<div class="statBox"><div class="v">${v}</div><div class="k">${k}</div></div>`;
    el("batKV").innerHTML = b("타수",s.ab)+b("안타",s.h)+b("타점",s.rbi)+b("득점",s.r)+b("볼넷",s.bb)+b("삼진",s.so)+b("사구",s.hbp)+b("도루",s.sb)+b("2루타",s.d2)+b("3루타",s.d3)+b("홈런",s.hr)+b("희플",s.sf)+b("희번",s.sh)+b("땅볼",s.gb)+b("플라이",s.fb);
    el("pitKV").innerHTML = b("이닝",s.ip.toFixed(1))+b("자책",s.er)+b("삼진",s.pk)+b("볼넷",s.pbb)+b("피안타",s.ph)+b("투구수",s.pit)+b("최고구속",s.max_v > 0 ? s.max_v : "-");
    el("fldKV").innerHTML = `<div class="kv"><b>실책</b><b>${s.e}</b></div><div class="kv"><b>메모 요약</b><small>${[...new Set(s.memos)].join(' / ') || '-'}</small></div>`;

    // 경기별 기록 (상대팀 옆 스코어)
    el("gamesList").innerHTML = "";
    games.filter(g => recMap.has(g.id)).forEach(g => {
      const r = recMap.get(g.id);
      const d = document.createElement("div"); d.className = "item";
      d.innerHTML = `<div><b>vs ${g.opponent} <span style="color:var(--brand);">${num(g.our_score)}:${num(g.opp_score)}</span></b><br><small>${g.game_date} • ${r.ab}타수 ${r.h}안타</small></div><div class="pill">${g.result}</div>`;
      d.onclick = () => { selectedGameId = g.id; [...el("gamesList").children].forEach(c=>c.classList.remove("selected")); d.classList.add("selected"); };
      el("gamesList").appendChild(d);
    });
  }

  window.onpopstate = (e) => {
    if(!e.state) { showView("viewPlayers", false); return; }
    currentPlayer = e.state.player;
    currentTournament = e.state.tournament;
    showView(e.state.view, false);
    if(e.state.view === "viewTournaments") loadPlayerTournaments(currentPlayer.id);
    if(e.state.view === "viewStats") loadPlayerTournamentStats(currentPlayer.id, currentTournament);
  };

  el("playerSearch").oninput = (e) => renderPlayersList(e.target.value);
  el("btnGoGameReport").onclick = () => { if(!selectedGameId) return alert("경기를 선택해주세요."); location.href=`report.html?game=${selectedGameId}`; };

  (async function init(){
    const session = await requireLogin();
    if (!session) return;
    history.replaceState({ view: "viewPlayers" }, "", "");
    await loadPlayers();
  })();
</script>
</body>
</html>
