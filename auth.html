<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>로그인 / 회원가입</title>
<style>
  :root{
    --bg:#eef3f8; --card:#fff; --line:#dbe3ee; --text:#0f172a; --muted:#64748b;
    --brand:#1d4ed8; --brand2:#1e40af; --shadow:0 8px 24px rgba(15,23,42,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
  .container{max-width:420px;margin:0 auto;padding:18px 14px 28px}
  .title{font-size:26px;font-weight:1000;line-height:1.15;margin-top:16px}
  .sub{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.45}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-top:14px}
  .tabs{display:flex;gap:8px;margin-bottom:10px}
  .tab{flex:1;padding:12px;border-radius:12px;border:1px solid var(--line);background:#fff;font-weight:900}
  .tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  label{display:block;margin-top:12px;font-size:13px;font-weight:900}
  input,select{width:100%;margin-top:6px;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:#fff}
  .btn{width:100%;margin-top:16px;padding:15px;border:none;border-radius:14px;background:var(--brand);color:#fff;font-size:16px;font-weight:1000}
  .btn:active{background:var(--brand2)}
  .hidden{display:none!important}
  .msg{margin-top:10px;font-size:13px;line-height:1.45;color:var(--muted)}
  .small{font-size:12px;color:var(--muted);margin-top:6px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
  <div class="title">야구기록 로그인</div>
  <div class="sub">학교를 선택하고 선수 정보를 함께 등록하면 가입이 완료됩니다.</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" type="button">로그인</button>
      <button class="tab" id="tabSignup" type="button">회원가입</button>
    </div>

    <div id="loginView">
      <label>이메일</label>
      <input id="loginEmail" type="email" placeholder="example@email.com" />
      <label>비밀번호</label>
      <input id="loginPassword" type="password" placeholder="비밀번호" />
      <button class="btn" id="btnLogin">로그인</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <div id="signupView" class="hidden">
      <label>보호자/회원 이름</label>
      <input id="displayName" placeholder="예: 김민준 어머니" />
      <label>학교 선택</label>
      <select id="schoolSel"></select>
      <label>이메일</label>
      <input id="signupEmail" type="email" placeholder="example@email.com" />
      <label>비밀번호</label>
      <input id="signupPassword" type="password" placeholder="비밀번호(6자 이상)" />

      <label>선수 이름</label>
      <input id="playerName" placeholder="예: 김민준" />
      <div style="display:flex;gap:10px">
        <div style="flex:1">
          <label>등번호</label>
          <input id="jerseyNumber" type="number" min="0" step="1" />
        </div>
        <div style="flex:1">
          <label>학년</label>
          <input id="grade" placeholder="예: 6" />
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <div style="flex:1">
          <label>생년</label>
          <input id="birthYear" type="number" min="2000" max="2100" placeholder="예: 2013" />
        </div>
        <div style="flex:1">
          <label>주 포지션</label>
          <input id="primaryPos" placeholder="예: SS" />
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <div style="flex:1">
          <label>투</label>
          <select id="throws"><option value="우">우</option><option value="좌">좌</option><option value="양">양</option></select>
        </div>
        <div style="flex:1">
          <label>타</label>
          <select id="bats"><option value="우">우</option><option value="좌">좌</option><option value="양">양</option></select>
        </div>
      </div>
      <button class="btn" id="btnSignup">회원가입</button>
      <div class="msg" id="signupMsg"></div>
      <div class="small">회원가입 시 선택한 학교로 가입되고, 선수도 자동 생성됩니다.</div>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://dmxkznmliiyffoltdcxd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRteGt6bm1saWl5ZmZvbHRkY3hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMwNTc2NzksImV4cCI6MjA1ODYzMzY3OX0.NUQgOp8NGHEZ0RDQ4sbuH7YCJpfYqF3UyEK3sPtu5-o';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const el = (id) => document.getElementById(id);

function showTab(mode){
  const login = mode === 'login';
  el('tabLogin').classList.toggle('active', login);
  el('tabSignup').classList.toggle('active', !login);
  el('loginView').classList.toggle('hidden', !login);
  el('signupView').classList.toggle('hidden', login);
}

async function loadSchools(){
  const { data, error } = await sb.from('baseball_schools').select('id,name').order('name');
  const sel = el('schoolSel');
  sel.innerHTML = '<option value="">학교 선택</option>';
  if (error) {
    el('signupMsg').textContent = '학교 목록을 불러오지 못했어요: ' + error.message;
    return;
  }
  (data || []).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

function nextUrl(){
  const next = new URLSearchParams(location.search).get('next');
  return next || 'index.html';
}

el('tabLogin').onclick = () => showTab('login');
el('tabSignup').onclick = () => showTab('signup');

el('btnLogin').onclick = async () => {
  el('loginMsg').textContent = '로그인 중...';
  const { error } = await sb.auth.signInWithPassword({
    email: el('loginEmail').value.trim(),
    password: el('loginPassword').value,
  });
  if (error) {
    el('loginMsg').textContent = error.message;
    return;
  }
  location.href = nextUrl();
};

el('btnSignup').onclick = async () => {
  el('signupMsg').textContent = '회원가입 중...';
  const schoolId = Number(el('schoolSel').value);
  if (!schoolId) { el('signupMsg').textContent = '학교를 선택해주세요.'; return; }

  const payload = {
    display_name: el('displayName').value.trim(),
    school_id: schoolId,
    player_name: el('playerName').value.trim(),
    jersey_number: el('jerseyNumber').value === '' ? null : Number(el('jerseyNumber').value),
    grade: el('grade').value.trim(),
    birth_year: el('birthYear').value === '' ? null : Number(el('birthYear').value),
    primary_position: el('primaryPos').value.trim(),
    throws: el('throws').value,
    bats: el('bats').value,
  };

  if (!payload.display_name || !payload.player_name || !payload.grade || !payload.primary_position) {
    el('signupMsg').textContent = '이름, 선수 이름, 학년, 주 포지션은 필수예요.';
    return;
  }

  const { data, error } = await sb.auth.signUp({
    email: el('signupEmail').value.trim(),
    password: el('signupPassword').value,
    options: { data: payload }
  });

  if (error) {
    el('signupMsg').textContent = error.message;
    return;
  }

  if (data.session) {
    location.href = nextUrl();
    return;
  }

  el('signupMsg').textContent = '회원가입이 완료됐어요. 이메일 인증이 켜져 있다면 메일 확인 후 로그인해주세요.';
};

(async function init(){
  await loadSchools();
  const { data: { user } } = await sb.auth.getUser();
  if (user) location.href = nextUrl();
})();
</script>
</body>
</html>
