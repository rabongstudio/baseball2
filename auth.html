<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>로그인 · ELITEREC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0c10; --panel:#181c24; --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
  --text:#f0f2f5; --muted:#7a8294; --brand:#e8ff47; --brand-dim:rgba(232,255,71,.12);
  --ok:#4ade80; --err:#f87171; --warn:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);min-height:100vh;padding-bottom:40px}

.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{max-width:480px;margin:0 auto;height:56px;display:flex;align-items:center}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--brand);line-height:1}
.logo span{color:var(--text)}

.container{max-width:420px;margin:0 auto;padding:28px 16px 40px}
.hero-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--brand);margin-bottom:10px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;margin-bottom:8px}
.hero-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px}

.card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;margin-top:16px}

.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.tab.active{background:var(--brand);color:var(--black);border-color:var(--brand)}

label{display:block;margin-top:16px;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase}

.input-wrap{position:relative;margin-top:6px}
.input-wrap input{width:100%;padding:14px 16px;border:1px solid var(--border2);border-radius:12px;font-size:15px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:border-color .15s}
.input-wrap input:focus{outline:none;border-color:var(--brand)}
.input-wrap input.ok{border-color:var(--ok)}
.input-wrap input.err{border-color:var(--err)}
.input-wrap .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:0;line-height:1}

.id-wrap{display:flex;gap:8px;margin-top:6px}
.id-wrap input{flex:1;padding:14px 16px;border:1px solid var(--border2);border-radius:12px;font-size:15px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:border-color .15s}
.id-wrap input:focus{outline:none;border-color:var(--brand)}
.id-wrap input.ok{border-color:var(--ok)}
.id-wrap input.err{border-color:var(--err)}
.check-btn{padding:0 16px;border-radius:12px;border:1px solid var(--brand);background:var(--brand-dim);color:var(--brand);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.check-btn:hover{background:var(--brand);color:var(--black)}
.check-btn:disabled{opacity:.4;cursor:not-allowed}

input:not(.id-wrap input):not(.input-wrap input),select,textarea{
  width:100%;margin-top:6px;padding:14px 16px;border:1px solid var(--border2);border-radius:12px;
  font-size:15px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif
}
select option{background:var(--panel);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
textarea{resize:vertical;min-height:88px}

.hint{font-size:12px;margin-top:4px;min-height:16px}
.hint.ok{color:var(--ok)}
.hint.err{color:var(--err)}
.hint.warn{color:var(--warn)}

.btn{width:100%;margin-top:20px;padding:15px;border:none;border-radius:14px;background:var(--brand);color:var(--black);font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:hover{background:#d4ea3a}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{width:100%;margin-top:10px;padding:13px;border:1px solid var(--border2);border-radius:14px;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand)}

.msg{margin-top:10px;font-size:13px;line-height:1.5}
.msg.err{color:var(--err)}
.msg.ok{color:var(--ok)}
.msg.warn{color:var(--warn)}
.small{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.hidden{display:none!important}
.divider{height:1px;background:var(--border);margin:16px 0}

/* 임시 비밀번호 박스 */
.temp-pw-box{
  margin-top:16px;padding:18px 20px;
  background:var(--brand-dim);border:1px solid var(--brand);border-radius:14px;
  text-align:center;
}
.temp-pw-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--brand);text-transform:uppercase;margin-bottom:8px}
.temp-pw-value{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--brand)}
.temp-pw-notice{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}

/* 비밀번호 찾기 단계 표시 */
.step-indicator{display:flex;align-items:center;gap:6px;margin-bottom:20px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .3s}
.step-dot.active{background:var(--brand);box-shadow:0 0 8px rgba(232,255,71,.5)}
.step-dot.done{background:var(--ok)}
.step-label{font-size:12px;color:var(--muted);margin-left:4px}

/* 보안 질문 select 특별 처리 */
#securityQuestion{
  width:100%;margin-top:6px;padding:14px 16px;border:1px solid var(--border2);border-radius:12px;
  font-size:15px;background:rgba(255,255,255,.05);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
}
#securityQuestion:focus{outline:none;border-color:var(--brand)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">ELITE<span> BASEBALL</span></div>
  </div>
</header>

<div class="container">
  <div class="hero-label">엘리트 야구 기록 시스템</div>
  <div class="hero-title">선수의 기록을<br>시작하세요</div>
  <div class="hero-sub">회원가입 후 내 선수 프로필을 만들고<br>경기와 기록을 직접 관리할 수 있어요.</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" type="button">로그인</button>
      <button class="tab" id="tabSignup" type="button">회원가입</button>
    </div>

    <!-- ===================== 로그인 ===================== -->
    <div id="loginView">
      <label>아이디</label>
      <div class="input-wrap">
        <input id="loginUsername" placeholder="아이디 입력" autocomplete="username" />
      </div>

      <label>비밀번호</label>
      <div class="input-wrap">
        <input id="loginPassword" type="password" placeholder="비밀번호" autocomplete="current-password" />
        <button class="eye-btn" id="eyeLogin" type="button">👁</button>
      </div>

      <button class="btn" id="btnLogin">로그인</button>
      <button class="btn-ghost" id="btnGoForgot" type="button">비밀번호를 잊어버렸어요</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- ===================== 회원가입 ===================== -->
    <div id="signupView" class="hidden">
      <label>아이디</label>
      <div class="id-wrap">
        <input id="signupUsername" placeholder="영문 소문자·숫자·_ (3~20자)" autocomplete="username" />
        <button class="check-btn" id="btnCheckId" type="button">중복확인</button>
      </div>
      <div class="hint" id="hintUsername"></div>

      <label>비밀번호</label>
      <div class="input-wrap">
        <input id="signupPassword" type="password" placeholder="6자 이상" autocomplete="new-password" />
        <button class="eye-btn" id="eyePw" type="button">👁</button>
      </div>
      <div class="hint" id="hintPassword"></div>

      <label>비밀번호 확인</label>
      <div class="input-wrap">
        <input id="signupPasswordConfirm" type="password" placeholder="비밀번호 재입력" autocomplete="new-password" />
        <button class="eye-btn" id="eyePwConfirm" type="button">👁</button>
      </div>
      <div class="hint" id="hintPasswordConfirm"></div>

      <div class="divider"></div>

      <!-- 보안 질문 (회원가입 시 등록) -->
      <label>보안 질문 <span style="color:var(--brand);font-size:10px">비밀번호 찾기에 사용</span></label>
      <select id="securityQuestion">
        <option value="">질문 선택</option>
        <option value="내가 처음 사용한 글러브 브랜드는?">내가 처음 사용한 글러브 브랜드는?</option>
        <option value="내가 처음 출전한 대회 이름은?">내가 처음 출전한 대회 이름은?</option>
        <option value="나의 등번호로 가장 오래 쓴 번호는?">나의 등번호로 가장 오래 쓴 번호는?</option>
        <option value="내가 존경하는 야구 선수는?">내가 존경하는 야구 선수는?</option>
        <option value="내 첫 번째 팀 이름은?">내 첫 번째 팀 이름은?</option>
        <option value="어린 시절 살던 동네 이름은?">어린 시절 살던 동네 이름은?</option>
        <option value="나의 가장 친한 친구 이름은?">나의 가장 친한 친구 이름은?</option>
        <option value="초등학교 담임 선생님 성함은?">초등학교 담임 선생님 성함은?</option>
      </select>
      <div class="hint" id="hintQuestion"></div>

      <label>보안 답변</label>
      <div class="input-wrap">
        <input id="securityAnswer" placeholder="답변을 입력하세요 (대소문자 무관)" autocomplete="off" />
      </div>
      <div class="hint" style="color:var(--muted);font-size:11px;margin-top:4px">
        💡 답변은 암호화되어 저장돼요. 비밀번호를 잊었을 때 본인 확인에 사용돼요.
      </div>

      <div class="divider"></div>

      <label>회원 이름/보호자이름</label>
      <input id="displayName" placeholder="예: 홍길동선수, 홍길동 어머니" />

      <label>학교 구분</label>
      <select id="categorySel">
        <option value="">선택</option>
        <option value="초등학교">초등학교</option>
        <option value="리틀">리틀/클럽</option>
        <option value="중학교">중학교</option>
        <option value="고등학교">고등학교</option>
        <option value="대학교">대학교/일반</option>
      </select>

      <label>학교 선택</label>
      <select id="schoolSel" disabled>
        <option value="">구분을 먼저 선택해주세요</option>
      </select>

      <div class="divider"></div>

      <label>선수 이름</label>
      <input id="playerName" placeholder="예: 홍길동" />

      <div class="row2">
        <div>
          <label>등번호</label>
          <input id="jerseyNumber" type="number" min="0" step="1" />
        </div>
        <div>
          <label>생년</label>
          <input id="birthYear" type="number" min="2000" max="2100" placeholder="예: 2013" />
        </div>
      </div>

      <div class="row2">
        <div>
          <label>학교구분</label>
          <select id="gradeLevel">
            <option value="">선택</option>
            <option value="초">초등학교</option>
            <option value="중">중학교</option>
            <option value="고">고등학교</option>
            <option value="대">대학교/일반</option>
          </select>
        </div>
        <div>
          <label>학년</label>
          <select id="gradeYear">
            <option value="">선택</option>
          </select>
        </div>
      </div>
      <div class="hint" id="hintGrade"></div>

      <div class="row2">
        <div>
          <label>주 포지션</label>
          <select id="primaryPos">
            <option value="">선택</option>
            <option value="P">P · 투수</option>
            <option value="C">C · 포수</option>
            <option value="1B">1B · 1루수</option>
            <option value="2B">2B · 2루수</option>
            <option value="3B">3B · 3루수</option>
            <option value="SS">SS · 유격수</option>
            <option value="LF">LF · 좌익수</option>
            <option value="CF">CF · 중견수</option>
            <option value="RF">RF · 우익수</option>
            <option value="DH">DH · 지명타자</option>
          </select>
        </div>
        <div>
          <label>등/투타</label>
          <div class="row2" style="margin-top:6px">
            <div>
              <select id="throws">
                <option value="우">우투</option>
                <option value="좌">좌투</option>
                <option value="양">양투</option>
              </select>
            </div>
            <div>
              <select id="bats">
                <option value="우">우타</option>
                <option value="좌">좌타</option>
                <option value="양">양타</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="row2">
        <div>
          <label>키(cm)</label>
          <input id="heightCm" type="number" min="50" max="250" step="0.1" placeholder="예: 145" />
        </div>
        <div>
          <label>몸무게(kg)</label>
          <input id="weightKg" type="number" min="10" max="200" step="0.1" placeholder="예: 38" />
        </div>
      </div>

      <label>부가정보 / 메모</label>
      <textarea id="playerNote" placeholder="예: 최근 포지션 변경, 성장기록 메모 등"></textarea>

      <button class="btn" id="btnSignup">회원가입</button>
      <div class="msg" id="signupMsg"></div>
      <div class="small">회원가입 후 바로 로그인해서 내 선수 프로필과 경기 기록을 직접 관리할 수 있어요.</div>
    </div>

    <!-- ===================== 비밀번호 찾기 ===================== -->
    <div id="forgotView" class="hidden">

      <!-- Step 1: 아이디 입력 -->
      <div id="forgotStep1">
        <div class="step-indicator">
          <div class="step-dot active" id="dot1"></div>
          <div class="step-dot" id="dot2"></div>
          <div class="step-dot" id="dot3"></div>
          <span class="step-label">아이디 확인</span>
        </div>

        <label>아이디</label>
        <div class="input-wrap">
          <input id="forgotUsername" placeholder="아이디를 입력하세요" autocomplete="username" />
        </div>

        <button class="btn" id="btnForgotNext">다음</button>
        <div class="msg" id="forgotMsg1"></div>
      </div>

      <!-- Step 2: 보안 질문 답변 -->
      <div id="forgotStep2" class="hidden">
        <div class="step-indicator">
          <div class="step-dot done" id="dot1b"></div>
          <div class="step-dot active" id="dot2b"></div>
          <div class="step-dot" id="dot3b"></div>
          <span class="step-label">본인 확인</span>
        </div>

        <div style="padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:12px;margin-bottom:4px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">보안 질문</div>
          <div id="displayedQuestion" style="font-size:15px;font-weight:600;line-height:1.5;color:var(--text)"></div>
        </div>

        <label>답변</label>
        <div class="input-wrap">
          <input id="forgotAnswer" placeholder="답변을 입력하세요" autocomplete="off" />
        </div>
        <div class="hint" style="color:var(--muted);font-size:11px;margin-top:4px">대소문자 구분 없이 입력하세요</div>

        <button class="btn" id="btnForgotVerify">확인</button>
        <button class="btn-ghost" id="btnForgotBack" type="button">← 이전으로</button>
        <div class="msg" id="forgotMsg2"></div>
      </div>

      <!-- Step 3: 임시 비밀번호 발급 완료 -->
      <div id="forgotStep3" class="hidden">
        <div class="step-indicator">
          <div class="step-dot done"></div>
          <div class="step-dot done"></div>
          <div class="step-dot active"></div>
          <span class="step-label">임시 비밀번호 발급</span>
        </div>

        <div class="temp-pw-box">
          <div class="temp-pw-label">임시 비밀번호</div>
          <div class="temp-pw-value" id="tempPwDisplay"></div>
          <div class="temp-pw-notice">
            이 비밀번호로 로그인 후<br>
            <strong style="color:var(--warn)">반드시 비밀번호를 변경</strong>해주세요.<br>
            화면을 벗어나면 다시 확인할 수 없어요.
          </div>
        </div>

        <button class="btn" id="btnGoLogin" type="button">로그인하러 가기</button>
      </div>

    </div>
  </div>
</div>

<script>
const el = (id) => document.getElementById(id);
const FAKE_DOMAIN = '@baseball.app';
const ID_REGEX = /^[a-z0-9_]{3,20}$/;
const SCHOOL_CACHE_KEY = 'baseball_school_category_cache_v1';
const schoolCategoryCache = new Map();

function toEmail(u){ return u.trim().toLowerCase() + FAKE_DOMAIN; }

// ─── 탭 전환 ───────────────────────────────────────────────
function showTab(mode){
  ['login','signup'].forEach(m => {
    el('tab' + m.charAt(0).toUpperCase() + m.slice(1)).classList.toggle('active', m === mode);
  });
  ['login','signup','forgot'].forEach(m => {
    el(m + 'View').classList.toggle('hidden', m !== mode);
  });
  if(mode === 'forgot') resetForgotSteps();
}
el('tabLogin').onclick    = () => showTab('login');
el('tabSignup').onclick   = () => showTab('signup');
el('btnGoForgot').onclick = () => showTab('forgot');
el('btnGoLogin').onclick  = () => showTab('login');

// ─── 눈 버튼 ───────────────────────────────────────────────
function toggleEye(inputId, btn){
  const input = el(inputId);
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}
el('eyeLogin').onclick    = () => toggleEye('loginPassword', el('eyeLogin'));
el('eyePw').onclick       = () => toggleEye('signupPassword', el('eyePw'));
el('eyePwConfirm').onclick = () => toggleEye('signupPasswordConfirm', el('eyePwConfirm'));

// ─── 비밀번호 찾기 단계 리셋 ────────────────────────────────
function resetForgotSteps(){
  el('forgotStep1').classList.remove('hidden');
  el('forgotStep2').classList.add('hidden');
  el('forgotStep3').classList.add('hidden');
  el('forgotUsername').value = '';
  el('forgotAnswer').value = '';
  el('forgotMsg1').textContent = '';
  el('forgotMsg2').textContent = '';
}

// ─── 비밀번호 찾기 Step 1: 아이디로 보안질문 조회 ────────────
el('btnForgotNext').onclick = async () => {
  const msg  = el('forgotMsg1');
  const username = el('forgotUsername').value.trim();
  msg.className = 'msg';
  msg.textContent = '';

  if(!username){
    msg.className = 'msg err';
    msg.textContent = '아이디를 입력해주세요.';
    return;
  }

  el('btnForgotNext').disabled = true;
  msg.textContent = '확인 중...';

  const { data, error } = await sb.rpc('baseball_get_security_question', {
    p_username: username
  });

  el('btnForgotNext').disabled = false;

  if(error || !data){
    msg.className = 'msg err';
    msg.textContent = '오류가 발생했어요. 잠시 후 다시 시도해주세요.';
    return;
  }

  if(!data.ok){
    msg.className = 'msg err';
    msg.textContent = data.msg || '존재하지 않는 아이디예요.';
    return;
  }

  // Step 2로 이동
  el('displayedQuestion').textContent = data.question;
  el('forgotStep1').classList.add('hidden');
  el('forgotStep2').classList.remove('hidden');
};

// ─── 비밀번호 찾기 Step 2: 답변 검증 ────────────────────────

  });

// ─── 로그인 ────────────────────────────────────────────────
el('btnLogin').onclick = async () => {
  const msg = el('loginMsg');
  msg.className = 'msg';
  msg.textContent = '로그인 중...';

  const username = el('loginUsername').value.trim();
  if(!username){
    msg.className = 'msg err';
    msg.textContent = '아이디를 입력해주세요.';

  }

  });

// ─── 학교 목록 ─────────────────────────────────────────────
function loadSchoolCacheFromSession(){
  try{
    const raw = sessionStorage.getItem(SCHOOL_CACHE_KEY);
    if(!raw) return;
    const obj = JSON.parse(raw);
    Object.entries(obj).forEach(([k, v]) => { if(Array.isArray(v)) schoolCategoryCache.set(k, v); });
  }catch(e){}
}
function saveSchoolCacheToSession(){
  try{
    const obj = Object.fromEntries(schoolCategoryCache.entries());
    sessionStorage.setItem(SCHOOL_CACHE_KEY, JSON.stringify(obj));
  }catch(e){}
}
async function ensureSchoolCategory(cat){
  if(!cat) return [];
  if(schoolCategoryCache.has(cat)) return schoolCategoryCache.get(cat);
  const { data, error } = await sb.from('baseball_schools').select('id,name').eq('category', cat).order('name');
  if(error) throw error;
  const rows = data || [];
  schoolCategoryCache.set(cat, rows);
  saveSchoolCacheToSession();
  return rows;
}
function renderSchoolOptions(rows){
  const sel = el('schoolSel');
  sel.innerHTML = '<option value="">학교 선택</option>';
  (rows || []).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
  sel.disabled = false;
}
async function loadSchools(){
  el('categorySel').addEventListener('change', async () => {
    const cat = el('categorySel').value;
    const sel = el('schoolSel');
    sel.innerHTML = '<option value="">학교 선택</option>';
    if(!cat){ sel.disabled = true; return; }
    try{
      sel.disabled = false;
      sel.innerHTML = '<option value="">불러오는 중...</option>';
      const rows = await ensureSchoolCategory(cat);
      renderSchoolOptions(rows);
    }catch(err){
      sel.disabled = true;
      sel.innerHTML = '<option value="">학교 선택</option>';
      el('signupMsg').className = 'msg err';
      el('signupMsg').textContent = '학교 목록 오류: ' + err.message;
    }
  });
}

// ─── 학년 ──────────────────────────────────────────────────
function getSchoolYearBase(){
  const now = new Date();
  return now.getMonth() + 1 >= 3 ? now.getFullYear() : now.getFullYear() - 1;
}
function fillGradeYearOptions(level){
  const sel = el('gradeYear');
  const current = sel.value;
  sel.innerHTML = '<option value="">선택</option>';
  const maxMap = {'초':6,'중':3,'고':3,'대':4};
  const max = maxMap[level] || 0;
  for(let i = 1; i <= max; i++){
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = `${i}학년`;
    sel.appendChild(opt);
  }
  if(current && Number(current) <= max) sel.value = current;
}
function buildGradeText(){
  const level = el('gradeLevel').value;
  const year  = el('gradeYear').value;
  return (!level || !year) ? '' : `${level}${year}`;
}
function suggestGradeFromBirthYear(){
  const raw = el('birthYear').value.trim();
  const hint = el('hintGrade');
  if(!raw){ hint.className='hint'; hint.textContent=''; return; }
  const birthYear = Number(raw);
  if(!Number.isFinite(birthYear)){ hint.className='hint warn'; hint.textContent='생년을 정확히 입력해주세요.'; return; }
  const baseYear = getSchoolYearBase();
  const korAge   = baseYear - birthYear + 1;
  let level='', grade=0;
  if(korAge>=8&&korAge<=13){level='초';grade=korAge-7;}
  else if(korAge>=14&&korAge<=16){level='중';grade=korAge-13;}
  else if(korAge>=17&&korAge<=19){level='고';grade=korAge-16;}
  else if(korAge>=20&&korAge<=23){level='대';grade=korAge-19;}
  else{ hint.className='hint warn'; hint.textContent='자동 추천 대상이 아니에요. 직접 선택해주세요.'; return; }
  el('gradeLevel').value = level;
  fillGradeYearOptions(level);
  el('gradeYear').value = String(grade);
  hint.className='hint ok'; hint.textContent=`생년 기준으로 ${level}${grade} 자동 추천했어요`;
}
el('gradeLevel').addEventListener('change', () => fillGradeYearOptions(el('gradeLevel').value));
el('birthYear').addEventListener('input', suggestGradeFromBirthYear);

// ─── 아이디 중복 확인 ──────────────────────────────────────
let idChecked = false;
el('signupUsername').addEventListener('input', () => {
  idChecked = false;
  const val = el('signupUsername').value.trim();
  const hint = el('hintUsername');
  const input = el('signupUsername');
  if(!val){ hint.className='hint'; hint.textContent=''; input.className=''; return; }
  if(!ID_REGEX.test(val)){ hint.className='hint err'; hint.textContent='영문 소문자, 숫자, _ 만 가능 (3~20자)'; input.className='err'; return; }
  hint.className='hint warn'; hint.textContent='중복확인을 눌러주세요'; input.className='';
});
el('btnCheckId').onclick = async () => {
  const username = el('signupUsername').value.trim();
  const hint = el('hintUsername');
  const input = el('signupUsername');
  idChecked = false;
  if(!ID_REGEX.test(username)){ hint.className='hint err'; hint.textContent='올바른 아이디 형식이 아니에요'; return; }
  el('btnCheckId').disabled = true;
  hint.className='hint'; hint.textContent='확인 중...';
  const { data, error } = await sb.rpc('baseball_check_username', { p_username: username });
  el('btnCheckId').disabled = false;
  if(error){ hint.className='hint err'; hint.textContent='확인 중 오류가 발생했어요'; return; }
  if(data === true){
    hint.className='hint err'; hint.textContent='이미 사용 중인 아이디예요'; input.className='err'; idChecked = false;
  } else {
    hint.className='hint ok'; hint.textContent='사용 가능한 아이디예요 ✓'; input.className='ok'; idChecked = true;
  }
};

// ─── 비밀번호 일치 확인 ────────────────────────────────────
el('signupPassword').addEventListener('input', checkPasswordMatch);
el('signupPasswordConfirm').addEventListener('input', checkPasswordMatch);
function checkPasswordMatch(){
  const pw  = el('signupPassword').value;
  const pw2 = el('signupPasswordConfirm').value;
  const hintPw   = el('hintPassword');
  const hintConf = el('hintPasswordConfirm');
  if(pw.length > 0 && pw.length < 6){ hintPw.className='hint err'; hintPw.textContent='6자 이상 입력해주세요'; }
  else{ hintPw.className='hint'; hintPw.textContent=''; }
  if(!pw2){ hintConf.className='hint'; hintConf.textContent=''; el('signupPasswordConfirm').className=''; return; }
  if(pw === pw2){ hintConf.className='hint ok'; hintConf.textContent='비밀번호가 일치해요 ✓'; el('signupPasswordConfirm').className='ok'; }
  else{ hintConf.className='hint err'; hintConf.textContent='비밀번호가 일치하지 않아요'; el('signupPasswordConfirm').className='err'; }
}

// ─── 회원가입 ──────────────────────────────────────────────
el('btnSignup').onclick = async () => {
  const msg = el('signupMsg');
  msg.className = 'msg';
  msg.textContent = '';

  const username = el('signupUsername').value.trim();
  const password = el('signupPassword').value;
  const password2 = el('signupPasswordConfirm').value;
  const schoolId  = el('schoolSel').value ? Number(el('schoolSel').value) : null;
  const gradeText = buildGradeText();
  const secQuestion = el('securityQuestion').value;
  const secAnswer   = el('securityAnswer').value.trim();

  if(!username){ msg.className='msg err'; msg.textContent='아이디를 입력해주세요.'; return; }
  if(!idChecked){ msg.className='msg err'; msg.textContent='아이디 중복확인을 해주세요.'; return; }
  if(password.length < 6){ msg.className='msg err'; msg.textContent='비밀번호는 6자 이상이어야 해요.'; return; }
  if(password !== password2){ msg.className='msg err'; msg.textContent='비밀번호가 일치하지 않아요.'; return; }
  if(!secQuestion || !secAnswer){ msg.className='msg err'; msg.textContent='보안 질문과 답변을 입력해주세요. (비밀번호 찾기에 사용돼요)'; return; }

  const payload = {
    username,
    display_name:    el('displayName').value.trim(),
    school_id:       schoolId,
    player_name:     el('playerName').value.trim(),
    jersey_number:   el('jerseyNumber').value === '' ? null : Number(el('jerseyNumber').value),
    grade:           gradeText,
    birth_year:      el('birthYear').value === '' ? null : Number(el('birthYear').value),
    primary_position: el('primaryPos').value,
    throws:          el('throws').value,
    bats:            el('bats').value,
    height_cm:       el('heightCm').value === '' ? null : Number(el('heightCm').value),
    weight_kg:       el('weightKg').value === '' ? null : Number(el('weightKg').value),
    note:            el('playerNote').value.trim()
  };

  if(!payload.display_name || !payload.player_name || !payload.grade || !payload.primary_position){
    msg.className='msg err'; msg.textContent='이름, 선수 이름, 학교구분/학년, 주 포지션은 필수예요.'; return;
  }

  el('btnSignup').disabled = true;
  msg.textContent = '회원가입 중...';

  try{
    const { data, error } = await sb.auth.signUp({
      email: toEmail(username),
      password,
      options: { data: payload }
    });

    if(error){ msg.className='msg err'; msg.textContent=error.message; return; }
    if(!data?.user){ msg.className='msg err'; msg.textContent='회원가입이 정상적으로 완료되지 않았어요.'; return; }
    if(Array.isArray(data.user.identities) && data.user.identities.length === 0){
      msg.className='msg err'; msg.textContent='계정 생성이 완료되지 않았어요. 다른 아이디로 다시 시도해주세요.'; return;
    }

    // 보안 질문/답변 저장 (로그인된 상태에서 RPC 호출)
    const { error: sqErr } = await sb.rpc('baseball_set_security_question', {
      p_question: secQuestion,
      p_answer:   secAnswer
    });

    if(sqErr){
      console.warn('보안 질문 저장 실패:', sqErr);
      // 회원가입 자체는 성공했으므로 경고만 표시
    }

    if(data.session){
      location.href = nextUrl();
      return;
    }

    msg.className='msg ok';
    msg.textContent='회원가입이 완료됐어요! 이제 로그인해서 바로 사용할 수 있어요.';
    showTab('login');
  }catch(err){
    console.error(err);
    msg.className='msg err'; msg.textContent='회원가입 처리 중 예상치 못한 오류가 발생했어요.';
  }finally{
    el('btnSignup').disabled = false;
  }
};

function nextUrl(){
  const next = new URLSearchParams(location.search).get('next');
  return next || 'index.html';
}

(async function init(){
  fillGradeYearOptions('');
  loadSchoolCacheFromSession();
  await loadSchools();
  const { data:{ user } } = await sb.auth.getUser();
  if(user) location.href = nextUrl();
})();
</script>
